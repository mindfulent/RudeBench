<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>String Reverser</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#7c5cff;
      --muted:#9aa4b2;
      --glass: rgba(255,255,255,0.04);
      --success:#22c55e;
      --danger:#ef4444;
      --radius:12px;
    }
    /* Reset-ish */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,0.12), transparent 6%),
        radial-gradient(1000px 400px at 90% 90%, rgba(34,197,94,0.06), transparent 6%),
        var(--bg);
      color:#e6eef8;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
    }

    .card{
      width:100%;
      max-width:720px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      padding:28px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.7);
      border:1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(6px) saturate(110%);
    }

    .header{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:18px;
    }
    .logo{
      width:48px;
      height:48px;
      border-radius:10px;
      background: linear-gradient(135deg,var(--accent), #4ad9a1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:white;
      box-shadow: 0 6px 18px rgba(124,92,255,0.14), inset 0 -6px 18px rgba(255,255,255,0.04);
      flex:0 0 48px;
    }
    h1{
      font-size:18px;
      margin:0;
      letter-spacing:0.2px;
    }
    p.lead{
      margin:6px 0 0 0;
      font-size:13px;
      color:var(--muted);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
      margin-top:18px;
    }

    label.input-wrap{
      display:block;
      background:var(--glass);
      border-radius:10px;
      padding:12px;
      border:1px solid rgba(255,255,255,0.03);
    }
    textarea#source{
      width:100%;
      min-height:88px;
      resize:vertical;
      max-height:240px;
      border:0;
      outline:0;
      background:transparent;
      color:inherit;
      font-size:15px;
      line-height:1.45;
      caret-color:var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
    }

    .controls{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      margin-top:8px;
    }
    .btn{
      appearance:none;
      border:0;
      background:rgba(255,255,255,0.04);
      color:inherit;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      font-size:13px;
      transition:all .18s ease;
    }
    .btn:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.06) }
    .btn:active{ transform:translateY(0) }
    .muted{
      color:var(--muted);
      font-size:13px;
      margin-right:auto;
    }

    .result-area{
      background:linear-gradient(180deg, rgba(255,255,255,0.015), transparent);
      border-radius:10px;
      padding:16px;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px dashed rgba(255,255,255,0.03);
      position:relative;
      overflow:hidden;
    }

    .result-line{
      display:inline-flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
      font-size:18px;
      letter-spacing:0.6px;
      color:var(--accent);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .char{
      display:inline-block;
      padding:2px 6px;
      border-radius:6px;
      background:rgba(124,92,255,0.08);
      color: #eef2ff;
      transform-origin:center;
      opacity:0;
      transform:translateY(10px) scale(0.96);
      transition:opacity .18s ease, transform .22s cubic-bezier(.2,.9,.3,1), background .18s;
    }

    .char.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    .char.highlight{
      background:linear-gradient(90deg, rgba(255,255,255,0.06), rgba(124,92,255,0.16));
      box-shadow: 0 6px 18px rgba(124,92,255,0.08);
      transform:translateY(-6px) scale(1.03);
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    footer.note{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }

    @media (max-width:520px){
      .card{ padding:18px }
      .logo{ width:42px; height:42px; flex:0 0 42px }
      .result-line{ font-size:16px }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <header class="header">
      <div class="logo" aria-hidden="true">R</div>
      <div>
        <h1 id="title">String Reverser</h1>
        <p class="lead">Type text below — the reversed result appears instantly with a character animation.</p>
      </div>
    </header>

    <section class="grid" aria-live="polite">
      <label class="input-wrap" for="source">
        <div style="display:flex;align-items:center;gap:8px;justify-content:space-between">
          <div class="small">Enter text</div>
          <div class="muted small" id="length">0 characters</div>
        </div>
        <textarea id="source" placeholder="Type or paste text here..." aria-label="Text to reverse"></textarea>
      </label>

      <div class="controls" aria-hidden="false">
        <div class="small">Result updates as you type</div>
        <button class="btn" id="copy">Copy</button>
        <button class="btn" id="clear">Clear</button>
      </div>

      <div class="result-area" aria-live="polite" aria-atomic="true" id="resultArea">
        <div class="result-line" id="resultLine" aria-hidden="false"></div>
      </div>

      <footer class="note">Characters animate in one-by-one from left to right as the reversed string is shown.</footer>
    </section>
  </main>

  <script>
    // Simple, self-contained string reverser with character animation.
    (function(){
      const src = document.getElementById('source');
      const resultLine = document.getElementById('resultLine');
      const lengthEl = document.getElementById('length');
      const copyBtn = document.getElementById('copy');
      const clearBtn = document.getElementById('clear');
      const resultArea = document.getElementById('resultArea');

      let lastText = '';
      let animToken = 0;

      function reverseString(s){
        // Properly reverse grapheme clusters (handles surrogate pairs and combining marks)
        // Use Intl.Segmenter if available for grapheme clusters; fallback to Array.from.
        try{
          if (typeof Intl !== 'undefined' && Intl.Segmenter){
            const seg = new Intl.Segmenter(undefined, { granularity: 'grapheme' });
            const parts = Array.from(seg.segment(s), segI => segI.segment);
            return parts.reverse().join('');
          }
        }catch(e){}
        return Array.from(s).reverse().join('');
      }

      function setLength(n){
        lengthEl.textContent = n + (n === 1 ? ' character' : ' characters');
      }

      function renderAnimated(rev){
        animToken++;
        const token = animToken;
        // Clear existing nodes quickly
        resultLine.innerHTML = '';
        if (!rev){
          // show placeholder small muted
          const ph = document.createElement('span');
          ph.className = 'small';
          ph.textContent = '— empty —';
          resultLine.appendChild(ph);
          return;
        }

        // Create char elements
        const graphemes = (typeof Intl !== 'undefined' && Intl.Segmenter)
          ? Array.from(new Intl.Segmenter(undefined, {granularity:'grapheme'}).segment(rev), s => s.segment)
          : Array.from(rev);

        graphemes.forEach((ch, i) => {
          const sp = document.createElement('span');
          sp.className = 'char';
          sp.textContent = ch;
          resultLine.appendChild(sp);

          // Staggered appearance
          const baseDelay = Math.min(12, Math.max(4, graphemes.length)) ; // control pacing
          const delay = i * 26 + Math.max(0, 220 - baseDelay * 10); // ms
          // show after short delay
          setTimeout(() => {
            if (token !== animToken) return; // cancelled by newer render
            sp.classList.add('show');
            // highlight briefly then remove highlight
            sp.classList.add('highlight');
            setTimeout(() => {
              if (token !== animToken) return;
              sp.classList.remove('highlight');
            }, 260);
          }, delay);
        });

        // Accessibility: ensure container announces the full reversed string after animation completes
        const totalDuration = graphemes.length * 26 + 400;
        setTimeout(() => {
          if (token !== animToken) return;
          resultArea.setAttribute('aria-label', 'Reversed: ' + rev);
        }, totalDuration);
      }

      function update(){
        const val = src.value || '';
        if (val === lastText) return;
        lastText = val;
        setLength(val.length);
        const rev = reverseString(val);
        renderAnimated(rev);
      }

      // Debounce input slightly to keep animation smooth when typing quickly.
      let inputTimer = null;
      src.addEventListener('input', () => {
        clearTimeout(inputTimer);
        inputTimer = setTimeout(update, 80);
      });

      // Buttons
      copyBtn.addEventListener('click', async () => {
        try{
          const rev = reverseString(src.value || '');
          await navigator.clipboard.writeText(rev);
          copyBtn.textContent = 'Copied';
          setTimeout(()=> copyBtn.textContent = 'Copy', 900);
        }catch(e){
          // fallback: select result text
          const rev = reverseString(src.value || '');
          const ta = document.createElement('textarea');
          ta.value = rev;
          document.body.appendChild(ta);
          ta.select();
          try{ document.execCommand('copy'); copyBtn.textContent = 'Copied'; }
          catch(e){ copyBtn.textContent = 'Failed'; }
          ta.remove();
          setTimeout(()=> copyBtn.textContent = 'Copy', 900);
        }
      });

      clearBtn.addEventListener('click', () => {
        src.value = '';
        src.focus();
        update();
      });

      // Initialize
      setLength(0);
      renderAnimated('');
      // accessibility: focus textarea on load for convenience
      setTimeout(()=> src.focus(), 350);
    })();
  </script>
</body>
</html>
