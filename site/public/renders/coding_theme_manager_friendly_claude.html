<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Singleton Theme Manager</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS custom properties – light defaults ── */
    :root {
      --bg-primary:    #f0f4f8;
      --bg-secondary:  #ffffff;
      --bg-card:       #ffffff;
      --bg-code:       #e8edf2;
      --text-primary:  #1a202c;
      --text-secondary:#4a5568;
      --text-muted:    #718096;
      --accent:        #4f46e5;
      --accent-hover:  #4338ca;
      --accent-light:  #eef2ff;
      --border:        #e2e8f0;
      --shadow:        rgba(0,0,0,0.08);
      --success:       #059669;
      --warning:       #d97706;
      --danger:        #dc2626;
      --tag-bg:        #dbeafe;
      --tag-text:      #1e40af;
      --toggle-track:  #cbd5e0;
      --toggle-thumb:  #ffffff;
      --transition:    0.35s ease;
    }

    /* ── Dark theme overrides ── */
    [data-theme="dark"] {
      --bg-primary:    #0f172a;
      --bg-secondary:  #1e293b;
      --bg-card:       #1e293b;
      --bg-code:       #0f172a;
      --text-primary:  #f1f5f9;
      --text-secondary:#cbd5e1;
      --text-muted:    #94a3b8;
      --accent:        #818cf8;
      --accent-hover:  #a5b4fc;
      --accent-light:  #1e1b4b;
      --border:        #334155;
      --shadow:        rgba(0,0,0,0.4);
      --success:       #34d399;
      --warning:       #fbbf24;
      --danger:        #f87171;
      --tag-bg:        #1e3a5f;
      --tag-text:      #93c5fd;
      --toggle-track:  #4f46e5;
      --toggle-thumb:  #ffffff;
    }

    /* ── Layout ── */
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.25rem 2rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
      transition: background var(--transition), border-color var(--transition);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .logo-icon { font-size: 1.5rem; }

    /* ── Toggle Switch ── */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .toggle-label { user-select: none; }

    .toggle {
      position: relative;
      width: 52px;
      height: 28px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--toggle-track);
      border-radius: 999px;
      transition: background var(--transition);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: var(--toggle-thumb);
      border-radius: 50%;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(24px);
    }

    /* ── Section titles ── */
    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    section { margin-top: 2.5rem; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background var(--transition), border-color var(--transition),
                  box-shadow var(--transition), transform 0.2s;
    }

    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .card p {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* ── Stat card ── */
    .stat-card {
      text-align: center;
      padding: 1.75rem 1.25rem;
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.4rem;
    }

      font-size: 0.85rem;
      color: var(--text-m
