<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Reverser Tool</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
  }
  .container {
    text-align: center;
  }
  #input-field {
    padding: 10px;
    font-size: 18px;
    border: 1px solid #ddd;
  }
  #output-field {
    font-size: 18px;
    white-space: pre;
  }
  .highlight {
    background-color: #dff0d8;
    padding: 0 2px;
  }
</style>
</head>
<body>
<div class="container">
  <input id="input-field" type="text" placeholder="Type text here...">
  <div id="output-field"></div>
</div>

<script>
  const inputField = document.getElementById('input-field');
  const outputField = document.getElementById('output-field');

  inputField.addEventListener('input', updateReversedText);

  function updateReversedText() {
    const inputText = inputField.value;
    const reversedText = inputText.split('').reverse().join('');
    outputField.innerHTML = ''; // Clear previous output

    // Function to add highlighted characters one by one
    function addHighlightedText(text, index = 0) {
      if (index < text.length) {
        const span = document.createElement('span');
        span.textContent = text[index];
        span.classList.add('highlight');
        outputField.appendChild(span);
        setTimeout(() => {
          span.classList.remove('highlight');
          addHighlightedText(text, index + 1);
        }, 50); // Adjust speed here
      }
    }

    addHighlightedText(reversedText);
  }
</script>
</body>
</html>
