<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linked List Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 30px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
    width: 100%;
    max-width: 700px;
  }

  .control-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  input[type="text"] {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 0.9rem;
    width: 90px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: #60a5fa;
  }

  button {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  button:active { transform: scale(0.96); }

  .btn-insert-head { background: #3b82f6; color: white; }
  .btn-insert-head:hover { background: #2563eb; }

  .btn-insert-tail { background: #8b5cf6; color: white; }
  .btn-insert-tail:hover { background: #7c3aed; }

  .btn-delete { background: #ef4444; color: white; }
  .btn-delete:hover { background: #dc2626; }

  .btn-search { background: #10b981; color: white; }
  .btn-search:hover { background: #059669; }

  .btn-clear { background: #475569; color: white; }
  .btn-clear:hover { background: #334155; }

  .message {
    height: 24px;
    font-size: 0.85rem;
    margin-bottom: 20px;
    color: #94a3b8;
    transition: color 0.3s;
  }

  .message.success { color: #34d399; }
  .message.error   { color: #f87171; }
  .message.info    { color: #60a5fa; }

  /* ── Canvas area ── */
  .canvas-wrapper {
    width: 100%;
    overflow-x: auto;
    overflow-y: visible;
    padding: 20px 10px 30px;
  }

  .canvas {
    display: flex;
    align-items: center;
    min-height: 120px;
    width: max-content;
    margin: 0 auto;
    position: relative;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: #334155;
    padding: 30px 60px;
    border: 2px dashed #1e293b;
    border-radius: 16px;
  }

  .empty-state svg { opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; }

  /* ── Node ── */
  .node-wrapper {
    display: flex;
    align-items: center;
    position: relative;
  }

  .node {
    display: flex;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #334155;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .node.highlight {
    border-color: #fbbf24;
    box-shadow: 0 0 0 3px rgba(251,191,36,0.35);
    transform: translateY(-4px);
  }

  .node.found {
    border-color: #34d399;
    box-shadow: 0 0 0 3px rgba(52,211,153,0.35);
    transform: translateY(-4px);
  }

  .node.not-found {
    border-color: #f87171;
    box-shadow: 0 0 0 3px rgba(248,113,113,0.25);
  }

  .node-value {
    background: #1e293b;
    padding: 14px 16px;
    font-size: 1rem;
    font-weight: 700;
    min-width: 52px;
    text-align: center;
    color: #e2e8f0;
  }

  .node-next {
    background: #0f172a;
    padding: 14px 12px;
    font-size: 0.65rem;
    color: #475569;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.05em;
    font-weight: 600;
    min-width: 42px;
  }

  /* ── Arrow between nodes ── */
  .arrow {
    display: flex;
    align-items: center;
    padding: 0 2px;
    position: relative;
  }

  .arrow-line {
    width: 36px;
    height: 2px;
    background: #334155;
    position: relative;
  }

  .arrow-line::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border-left: 8px solid #334155;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  /* ── NULL terminal ── */
  .null-node {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    border: 2px dashed #334155;
    border-radius: 8px;
    color: #475569;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
