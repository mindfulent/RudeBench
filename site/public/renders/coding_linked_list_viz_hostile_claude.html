<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linked List Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 6px;
    color: #7eb8f7;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 30px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
    background: #1a1d27;
    padding: 18px 22px;
    border-radius: 12px;
    border: 1px solid #2a2d3a;
    width: 100%;
    max-width: 720px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  input[type="text"] {
    width: 80px;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1px solid #3a3d4a;
    background: #0f1117;
    color: #e0e0e0;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
  }

  input[type="text"]:focus {
    border-color: #7eb8f7;
  }

  button {
    padding: 8px 14px;
    border-radius: 7px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  button:active { transform: scale(0.96); }

  .btn-head   { background: #3b82f6; color: #fff; }
  .btn-tail   { background: #10b981; color: #fff; }
  .btn-delete { background: #ef4444; color: #fff; }
  .btn-search { background: #f59e0b; color: #000; }
  .btn-clear  { background: #374151; color: #ccc; }

  .btn-head:hover   { background: #2563eb; }
  .btn-tail:hover   { background: #059669; }
  .btn-delete:hover { background: #dc2626; }
  .btn-search:hover { background: #d97706; }
  .btn-clear:hover  { background: #4b5563; }

  .message {
    min-height: 24px;
    font-size: 0.88rem;
    margin-bottom: 20px;
    color: #a0aec0;
    text-align: center;
    transition: color 0.3s;
  }

  .message.success { color: #10b981; }
  .message.error   { color: #ef4444; }
  .message.info    { color: #7eb8f7; }

  /* Canvas area */
  .canvas-wrapper {
    width: 100%;
    max-width: 1100px;
    min-height: 180px;
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 14px;
    padding: 30px 20px;
    position: relative;
    overflow-x: auto;
    overflow-y: visible;
  }

  .list-container {
    display: flex;
    align-items: center;
    min-height: 120px;
    width: max-content;
    min-width: 100%;
    padding: 10px 10px;
    position: relative;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 120px;
    color: #444;
    gap: 8px;
  }

  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.9rem; }

  /* Node */
  .node-wrapper {
    display: flex;
    align-items: center;
    animation: nodeIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes nodeIn {
    from { opacity: 0; transform: scale(0.5) translateY(-20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .node {
    display: flex;
    flex-direction: row;
    border-radius: 10px;
    border: 2px solid #3a3d4a;
    overflow: hidden;
    background: #252836;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    min-width: 90px;
  }

  .node.highlight-found {
    border-color: #f59e0b;
    box-shadow: 0 0 18px rgba(245,158,11,0.5);
  }

  .node.highlight-head {
    border-color: #3b82f6;
    box-shadow: 0 0 18px rgba(59,130,246,0.4);
  }

  .node.highlight-tail {
    border-color: #10b981;
    box-shadow: 0 0 18px rgba(16,185,129,0.4);
  }

  .node-data {
    padding: 14px 14px;
    font-size: 1rem;
    font-weight: 700;
    color: #e2e8f0;
    background: #252836;
    min-width: 50px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2px solid #3a3d4a;
  }

  .node-next {
    padding: 14px 10px;
    font-size: 0.7rem;
    color: #555;
    background: #1e2130;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    font-family: monospace;
    letter-spacing: 0.5px;
  }

  /* Labels */
  .node-label {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .label-head { background: #1d4ed8; color: #bfdbfe; }
  .label-tail { background: #065f46; color: #a7f3d0; }
  .label-both { background: #5b21b6; color: #ddd6fe; }

  /* Arrow between nodes */
  .arrow-connector {
    display: flex;
    align-items: center;
    margin: 0 2px;
    flex-shrink: 0;
  }

  .arrow-line {
    width: 32px;
    height: 2px;
    background: #4a5568;
    position: relative;
  }

  .arrow-line::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border-left: 8px solid #4a5568;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  /* NULL terminal */
  .null-node {
    display: flex;
    align-items: center;
    margin-left: 2px;
  }

  .null-box {
    padding: 10px 12px;
    border: 2px dashed #374151;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #4b5563;
    letter-spacing: 1px;
    background: #161820;
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    font-size: 0.82rem;
    color: #555;
  }

  .stats span { color: #7eb8f7; font-weight: 600; }

  .deleting {
    animation: nodeOut 0.3s ease-in forwards;
  }

  @keyframes nodeOut {
    to { opacity: 0; transform: scale(0.4); }
  }
</style>
</head>
<body>

<h1>Linked List Visualizer</h1>
<p class="subtitle">Singly linked list — insert, delete, search</p>

<div class="controls">
  <div class="control-group">
    <input type="text" id="inputVal" placeholder="value" maxlength="6" />
  </div>
  <div class="control-group">
    <button class="btn-head" onclick="insertHead()">Insert Head</button>
    <button class="btn-tail" onclick="insertTail()">Insert Tail</button>
  </div>
  <div class="control-group">
    <button class="btn-delete" onclick="deleteVal()">Delete</button>
    <button class="btn-search" onclick="searchVal()">Search</button>
  </div>
  <div class="control-group">
    <button class="btn-clear" onclick="clearList()">Clear List</button>
  </div>
</div>

<div class="message" id="message">Use the controls above to build your linked list.</div>

<div class="canvas-wrapper">
  <div class="list-container" id="listContainer"></div>
</div>

<div class="stats">
  Length: <span id="statLength">0</span> &nbsp;|&nbsp;
  Head: <span id="statHead">null</span> &nbsp;|&nbsp;
  Tail: <span id="statTail">null</span>
</div>

<script>
  // ── Data model ──────────────────────────────────────────────
  class ListNode {
    constructor(val) {
      this.val = val;
      this.next = null;
      this.id = Math.random().toString(36).slice(2, 8);
    }
  }

  let head = null;
  let size = 0;
  let highlightIds = {};   // id -> class string

  // ── Helpers ──────────────────────────────────────────────────
  function getInput() {
    const v = document.getElementById('inputVal').value.trim();
    return v;
  }

  function setMessage(text, type = '') {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
  }

  function getTail() {
    if (!head) return null;
    let cur = head;
    while (cur.next) cur = cur.next;
    return cur;
  }

  // ── Operations ───────────────────────────────────────────────
  function insertHead() {
    const val = getInput();
    if (!val) { setMessage('Please enter a value.', 'error'); return; }

    const node = new ListNode(val);
    node.next = head;
    head = node;
    size++;

    highlightIds = { [node.id]: 'highlight-head' };
    setMessage(`Inserted "${val}" at head.`, 'success');
    render();
    setTimeout(() => { highlightIds = {}; render(); }, 1400);
  }

  function insertTail() {
    const val = getInput();
    if (!val) { setMessage('Please enter a value.', 'error'); return; }

    const node = new ListNode(val);
    if (!head) {
      head = node;
    } else {
      getTail().next = node;
    }
    size++;

    highlightIds = { [node.id]: 'highlight-tail' };
    setMessage(`Inserted "${val}" at tail.`, 'success');
    render();
    setTimeout(() => { highlightIds = {}; render(); }, 1400);
  }

  function deleteVal() {
    const val = getInput();
    if (!val) { setMessage('Please enter a value to delete.', 'error'); return; }
    if (!head) { setMessage('List is empty.', 'error'); return; }

    // Find the node element first so we can animate
    let cur = head, prev = null, found = null;
    while (cur) {
      if (String(cur.val) === String(val)) { found = cur; break; }
      prev = cur;
      cur = cur.next;
    }

    if (!found) {
      setMessage(`Value "${val}" not found in list.`, 'error');
      return;
    }

    // Animate then remove
    highlightIds = { [found.id]: 'highlight-found' };
    render();

    setTimeout(() => {
      // Actually remove
      if (!prev) {
        head = found.next;
      } else {
        prev.next = found.next;
      }
      size--;
      highlightIds = {};
      setMessage(`Deleted "${val}" from list.`, 'success');
      render();
    }, 500);
  }

  function searchVal() {
    const val = getInput();
    if (!val) { setMessage('Please enter a value to search.', 'error'); return; }
    if (!head) { setMessage('List is empty.', 'error'); return; }

    let cur = head, idx = 0;
    while (cur) {
      if (String(cur.val) === String(val)) {
        highlightIds = { [cur.id]: 'highlight-found' };
        setMessage(`Found "${val}" at index ${idx}.`, 'info');
        render();
        setTimeout(() => { highlightIds = {}; render(); }, 2000);
        return;
      }
      cur = cur.next;
      idx++;
    }
    setMessage(`Value "${val}" not found in list.`, 'error');
  }

  function clearList() {
    head = null;
    size = 0;
    highlightIds = {};
    setMessage('List cleared.', 'info');
    render();
  }

  // ── Render ───────────────────────────────────────────────────
  function render() {
    const container = document.getElementById('listContainer');
    container.innerHTML = '';

    // Update stats
    document.getElementById('statLength').textContent = size;
    document.getElementById('statHead').textContent = head ? head.val : 'null';
    const t = getTail();
    document.getElementById('statTail').textContent = t ? t.val : 'null';

    if (!head) {
      container.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7eb8f7" stroke-width="1.5">
            <rect x="3" y="8" width="5" height="8" rx="1"/>
            <rect x="10" y="8" width="5" height="8" rx="1"/>
            <rect x="17" y="8" width="4" height="8" rx="1" stroke-dasharray="2 1"/>
          </svg>
          <p>Empty list — insert a node to get started</p>
        </div>`;
      return;
    }

    const tail = getTail();
    let cur = head;

    while (cur) {
      const isHead = cur === head;
      const isTail = cur === tail;
      const hlClass = highlightIds[cur.id] || '';

      // Label
      let labelHTML = '';
      if (isHead && isTail) {
        labelHTML = `<div class="node-label label-both">HEAD / TAIL</div>`;
      } else if (isHead) {
        labelHTML = `<div class="node-label label-head">HEAD</div>`;
      } else if (isTail) {
        labelHTML = `<div class="node-label label-tail">TAIL</div>`;
      }

      const nextText = cur.next ? 'next →' : 'null';

      const wrapper = document.createElement('div');
      wrapper.className = 'node-wrapper';
      wrapper.innerHTML = `
        <div class="node ${hlClass}" id="node-${cur.id}">
          ${labelHTML}
          <div class="node-data">${escapeHTML(String(cur.val))}</div>
          <div class="node-next">${nextText}</div>
        </div>`;

      container.appendChild(wrapper);

      if (cur.next) {
        const arrow = document.createElement('div');
        arrow.className = 'arrow-connector';
        arrow.innerHTML = `<div class="arrow-line"></div>`;
        container.appendChild(arrow);
      }

      cur = cur.next;
    }

    // NULL terminator
    const nullArrow = document.createElement('div');
    nullArrow.className = 'arrow-connector';
    nullArrow.innerHTML = `<div class="arrow-line"></div>`;
    container.appendChild(nullArrow);

    const nullNode = document.createElement('div');
    nullNode.className = 'null-node';
    nullNode.innerHTML = `<div class="null-box">NULL</div>`;
    container.appendChild(nullNode);
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Allow Enter key
  document.getElementById('inputVal').addEventListener('keydown', e => {
    if (e.key === 'Enter') insertTail();
  });

  // Initial render
  render();
</script>
</body>
</html>
