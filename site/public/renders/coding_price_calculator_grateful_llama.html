<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Calculator</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Shopping Cart Calculator</h1>
    <h2>Broken Version (Naive Float Comparison)</h2>
    <table>
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>
        <tbody id="broken-cart-body">
            <!-- Broken cart items will be generated here -->
        </tbody>
        <tr>
            <td colspan="3">Subtotal:</td>
            <td id="broken-subtotal">$0.00</td>
        </tr>
        <tr>
            <td colspan="3">Tax (8%):</td>
            <td id="broken-tax">$0.00</td>
        </tr>
        <tr>
            <td colspan="3">Total:</td>
            <td id="broken-total">$0.00</td>
        </tr>
    </table>

    <h2>Corrected Version (Proper Decimal Handling)</h2>
    <table>
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>
        <tbody id="corrected-cart-body">
            <!-- Corrected cart items will be generated here -->
        </tbody>
        <tr>
            <td colspan="3">Subtotal:</td>
            <td id="corrected-subtotal">$0.00</td>
        </tr>
        <tr>
            <td colspan="3">Tax (8%):</td>
            <td id="corrected-tax">$0.00</td>
        </tr>
        <tr>
            <td colspan="3">Total:</td>
            <td id="corrected-total">$0.00</td>
        </tr>
    </table>

    <script>
        // Function to generate cart items
        function generateCartItems(cartBody, subtotalElement, taxElement, totalElement) {
            // Sample cart items
            const cartItems = [
                { item: 'Apple', price: 0.99, quantity: 2 },
                { item: 'Banana', price: 0.59, quantity: 3 },
                { item: 'Orange', price: 1.49, quantity: 1 }
            ];

            let subtotal = 0;
            cartItems.forEach((item) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.item}</td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td>${item.quantity}</td>
                    <td>$${(item.price * item.quantity).toFixed(2)}</td>
                `;
                cartBody.appendChild(row);

                // Accumulate subtotal using decimal.js library (not used here for broken version)
                subtotal += item.price * item.quantity;
            });

            // Update subtotal
            subtotalElement.textContent = `$${subtotal.toFixed(2)}`;

            // Calculate tax and total
            const taxRate = 0.08;
            const tax = subtotal * taxRate;
            const total = subtotal + tax;

            taxElement.textContent = `$${tax.toFixed(2)}`;
            totalElement.textContent = `$${total.toFixed(2)}`;
        }

        // Broken version using naive float comparison
        const brokenCartBody = document.getElementById('broken-cart-body');
        const brokenSubtotalElement = document.getElementById('broken-subtotal');
        const brokenTaxElement = document.getElementById('broken-tax');
        const brokenTotalElement = document.getElementById('broken-total');
        generateCartItems(brokenCartBody, brokenSubtotalElement, brokenTaxElement, brokenTotalElement);

        // Corrected version using proper decimal handling
        // Note: For simplicity, we will use toFixed(2) for decimal handling here.
        // In a real-world application, consider using a decimal library like decimal.js.
        const correctedCartBody = document.getElementById('corrected-cart-body');
        const correctedSubtotalElement = document.getElementById('corrected-subtotal');
        const correctedTaxElement = document.getElementById('corrected-tax');
        const correctedTotalElement = document.getElementById('corrected-total');
        generateCartItems(correctedCartBody, correctedSubtotalElement, correctedTaxElement, correctedTotalElement);
    </script>
</body>
</html>
