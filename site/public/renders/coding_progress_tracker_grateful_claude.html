<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared State Concurrency Bug Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #e0e0ff;
            text-shadow: 0 0 20px rgba(100, 100, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #a0a0cc;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .container {
            display: flex;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            min-width: 320px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .panel.buggy {
            border-color: rgba(255, 80, 80, 0.4);
            box-shadow: 0 0 30px rgba(255, 80, 80, 0.1);
        }

        .panel.fixed {
            border-color: rgba(80, 255, 150, 0.4);
            box-shadow: 0 0 30px rgba(80, 255, 150, 0.1);
        }

        .panel-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel.buggy .panel-title { color: #ff6b6b; }
        .panel.fixed .panel-title { color: #6bffb0; }

        .badge {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .panel.buggy .badge {
            background: rgba(255, 80, 80, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 80, 80, 0.4);
        }

        .panel.fixed .badge {
            background: rgba(80, 255, 150, 0.2);
            color: #6bffb0;
            border: 1px solid rgba(80, 255, 150, 0.4);
        }

        .panel-desc {
            color: #a0a0cc;
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .task-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #c0c0dd;
            margin-bottom: 6px;
        }

        .progress-bar-wrapper {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            height: 22px;
            overflow: hidden;
            position: relative;
            margin-bottom: 4px;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.1s ease, background-color 0.3s ease;
            position: relative;
            min-width: 0;
        }

        .buggy .progress-bar-fill {
            background: linear-gradient(90deg, #ff4444, #ff8800);
        }

        .buggy .progress-bar-fill.overflow {
            background: linear-gradient(90deg, #ff0000, #ff00ff);
            animation: glitch 0.3s infinite;
        }

        .fixed .progress-bar-fill {
            background: linear-gradient(90deg, #00b4d8, #06d6a0);
        }

        @keyframes glitch {
            0% { filter: hue-rotate(0deg) brightness(1.5); }
            50% { filter: hue-rotate(90deg) brightness(2); }
            100% { filter: hue-rotate(0deg) brightness(1.5); }
        }

        .percent-label {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            z-index: 2;
            pointer-events: none;
        }

        .overflow-warning {
            color: #ff4444;
            font-size: 0.75rem;
            font-weight: bold;
            display: none;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .total-section {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .total-label {
            font-size: 0.85rem;
            color: #c0c0dd;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .total-value {
            font-size: 2rem;
            font-weight: bold;
            transition: color 0.3s;
        }

        .buggy .total-value { color: #ff6b6b; }
        .fixed .total-value { color: #6bffb0; }

        .buggy .total-value.overflow-val { color: #ff00ff; }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .buggy button {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
        }

        .buggy button:hover {
            background: linear-gradient(135deg, #e74c3c, #ff6b6b);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 80, 80, 0.4);
        }

        .fixed button {
            background: linear-gradient(135deg, #06d6a0, #00b4d8);
            color: #0a0a1a;
        }
