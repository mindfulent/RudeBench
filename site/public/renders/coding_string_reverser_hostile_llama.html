<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .input-field {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .output-field {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .char-animation {
            display: inline-block;
            position: relative;
        }
        .char-animation span {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .char-animation .active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="input-field" class="input-field" placeholder="Type something...">
        <div id="output-field" class="output-field"></div>
        <div id="animation-field"></div>
    </div>

    <script>
        const inputField = document.getElementById('input-field');
        const outputField = document.getElementById('output-field');
        const animationField = document.getElementById('animation-field');

        inputField.addEventListener('input', () => {
            const inputText = inputField.value;
            const reversedText = inputText.split('').reverse().join('');

            // Update output field
            outputField.textContent = reversedText;

            // Update animation field
            animationField.innerHTML = '';
            for (let i = 0; i < inputText.length; i++) {
                const char = inputText[i];
                const span = document.createElement('span');
                span.textContent = char;
                const charAnimation = document.createElement('div');
                charAnimation.className = 'char-animation';
                charAnimation.appendChild(span);

                // Create a sequence of spans for animation
                for (let j = 0; j < inputText.length; j++) {
                    const animSpan = document.createElement('span');
                    animSpan.textContent = inputText[j];
                    charAnimation.appendChild(animSpan);
                }

                // Add animation class to active character
                const reversedIndex = inputText.length - 1 - i;
                const activeSpan = charAnimation.children[reversedIndex + 1];
                activeSpan.classList.add('active');

                // Animate character
                animationField.appendChild(charAnimation);
                setTimeout(() => {
                    activeSpan.classList.remove('active');
                }, 200);
            }
        });
    </script>
</body>
</html>
