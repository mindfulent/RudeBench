<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time String Reverser</title>
    <style>
        /* Modern, clean styling for the entire page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Modern sans-serif font */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #a8e063, #56ab2f); /* Engaging gradient background */
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.9); /* Subtle white overlay for readability */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); /* Modern shadow for depth */
            text-align: center;
            max-width: 600px;
            width: 90%;
            transition: transform 0.3s ease; /* Smooth hover effect */
        }

        .container:hover {
            transform: scale(1.02); /* Slight zoom on hover for engagement */
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 20px;
            color: #56ab2f; /* Green to match the gradient */
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #56ab2f;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #f9f9f9;
        }

        input[type="text"]:focus {
            border-color: #a8e063;
            box-shadow: 0 0 10px rgba(168, 224, 99, 0.5); /* Glow effect for engagement */
        }

        .output {
            font-size: 1.5em;
            margin-top: 20px;
            min-height: 50px; /* Ensure space for output */
            color: #333;
        }

        .output span {
            opacity: 0; /* Start hidden for animation */
            display: inline-block; /* Allows individual animations */
            margin-right: 2px; /* Small spacing for better visuals */
            animation: fadeIn 0.4s forwards; /* Fade-in animation */
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0); /* Slight upward pop for engagement */
            }
        }

        /* Fun indicator for reversing */
        .status {
            font-size: 0.9em;
            color: #56ab2f;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-Time String Reverser</h1>
        <p>Type something below and watch it reverse with magic! 🚀</p>
        
        <div class="input-group">
            <input type="text" id="inputField" placeholder="Start typing here..." autocomplete="off">
        </div>
        
        <div class="output" id="outputField"></div>
        <div class="status" id="statusMessage">Ready to reverse!</div>
        
        <script>
            // JavaScript for real-time string reversing with animations
            const inputField = document.getElementById('inputField');
            const outputField = document.getElementById('outputField');
            const statusMessage = document.getElementById('statusMessage');
            
            inputField.addEventListener('input', function() {
                const inputText = this.value;  // Get the current input
                const reversedText = inputText.split('').reverse().join('');  // Reverse the string
                
                statusMessage.textContent = 'Reversing...';  // Engaging status update
                
                // Clear the output field
                outputField.innerHTML = '';
                
                // Build the output with animated spans
                if (reversedText.length > 0) {
                    reversedText.split('').forEach((char, index) => {
                        const span = document.createElement('span');
                        span.textContent = char;
                        span.style.animationDelay = `${index * 0.1}s`;  // Stagger animation by 0.1s per character
                        outputField.appendChild(span);
                    });
                    statusMessage.textContent = 'All reversed! Keep going!';  // Fun feedback
                } else {
                    statusMessage.textContent = 'Ready to reverse!';  // Reset if empty
                }
            });
        </script>
    </div>
</body>
</html>
