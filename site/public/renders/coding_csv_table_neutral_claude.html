<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSV to Table</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      color: #2c3e50;
      letter-spacing: 0.5px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      padding: 1.5rem 2rem;
      max-width: 960px;
      margin: 0 auto 2rem auto;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #555;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      height: 180px;
      border: 1.5px solid #cdd3da;
      border-radius: 7px;
      padding: 0.75rem 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.88rem;
      resize: vertical;
      transition: border-color 0.2s;
      color: #2c3e50;
      background: #f8f9fa;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #4a90e2;
      background: #fff;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .controls label {
      margin: 0;
      font-weight: 500;
      font-size: 0.9rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    select {
      padding: 0.4rem 0.6rem;
      border: 1.5px solid #cdd3da;
      border-radius: 6px;
      font-size: 0.88rem;
      background: #f8f9fa;
      color: #333;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #4a90e2; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #parseBtn {
      background: #4a90e2;
      color: #fff;
    }

    #parseBtn:hover { background: #357abd; }

    #clearBtn {
      background: #e8eaed;
      color: #555;
    }

    #clearBtn:hover { background: #d0d3d8; }

    #sampleBtn {
      background: #27ae60;
      color: #fff;
    }

    #sampleBtn:hover { background: #1e8449; }

    .error-box {
      background: #fff3f3;
      border: 1.5px solid #e57373;
      color: #c0392b;
      border-radius: 7px;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    #stats {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    /* Table output area */
    #output {
      max-width: 960px;
      margin: 0 auto;
      overflow-x: auto;
    }

    .table-wrapper {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr {
      background: #2c3e50;
      color: #fff;
    }

    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-right: 1px solid #3d5166;
      white-space: nowrap;
    }

    thead th:last-child { border-right: none; }

    tbody tr:nth-child(odd)  { background: #f7f9fc; }
    tbody tr:nth-child(even) { background: #eef2f7; }

    tbody tr:hover { background: #dce8f8; transition: background 0.15s; }

    tbody td {
      padding: 0.6rem 1rem;
      border-right: 1px solid #dce1e8;
      border-bottom: 1px solid #dce1e8;
      vertical-align: top;
      word-break: break-word;
      max-width: 320px;
    }

    tbody td:last-child { border-right: none; }

    tbody tr:last-child td { border-bottom: none; }

    .cell-empty {
      color: #bbb;
      font-style: italic;
      font-size: 0.82rem;
    }

    .row-num {
      color: #aaa;
      font-size: 0.8rem;
      text-align: right;
      user-select: none;
      min-width: 2.5rem;
      background: #f0f2f5 !important;
      border-right: 2px solid #dce1e8 !important;
    }

    thead .row-num-header {
      background: #253446;
      color: #aaa;
      font-size: 0.78rem;
      min-width: 2.5rem;
    }
  </style>
</head>
<body>

<h1>📊 CSV → HTML Table</h1>

<div class="card">
  <label for="csvInput">Paste your CSV data below:</label>
  <textarea id="csvInput" placeholder="name, age, city&#10;&quot;Smith, John&quot;, 30, &quot;New York&quot;&#10;Jane &quot;&quot;Doe&quot;&quot;, 25, London"></textarea>

  <div class="controls">
    <label>
      Delimiter:
      <select id="delimiter">
        <option value="auto">Auto-detect</option>
        <option value=",">Comma ( , )</option>
        <option value=";">Semicolon ( ; )</option>
        <option value="	">Tab ( \t )</option>
        <option value="|">Pipe ( | )</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="firstRowHeader" checked />
      First row as header
    </label>
    <label>
      <input type="checkbox" id="trimWhitespace" checked />
      Trim whitespace
    </label>
    <label>
      <input type="checkbox" id="showRowNumbers" />
      Show row numbers
    </label>
  </div>

  <div class="btn-row">
    <button id="parseBtn">⚡ Parse CSV</button>
    <button id="sampleBtn">📋 Load Sample</button>
    <button id="clearBtn">🗑 Clear</button>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div id="stats"></div>
</div>

<div id="output"></div>

<script>
  /* ── CSV Parser ─────────────────────────────────────────────────────────── */
  function parseCSV(text, delimiter) {
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;
    let i = 0;

    // Normalise line endings
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    while (i < text.length) {
      const ch = text[i];

      if (inQuotes) {
        if (ch === '"') {
          // Peek at next character
          if (i + 1 < text.length && text[i + 1] === '"') {
            // Escaped quote ("")
            field += '"';
            i += 2;
          } else {
            // Closing quote
            inQuotes = false;
            i++;
          }
        } else {
          field += ch;
          i++;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
          i++;
        } else if (ch === delimiter) {
          row.push(field);
          field = '';
          i++;
        } else if (ch === '\n') {
          row.push(field);
          field = '';
          rows.push(row);
          row = [];
          i++;
        } else {
          field += ch;
          i++;
        }
      }
    }

    // Push the last field and row (handles files without trailing newline)
    row.push(field);
    if (row.some(f => f !== '') || rows.length === 0) {
      rows.push(row);
    }

    // Remove completely empty trailing rows
    while (rows.length && rows[rows.length - 1].every(f => f === '')) {
      rows.pop();
    }

    return rows;
  }

  /* ── Auto-detect delimiter ──────────────────────────────────────────────── */
  function detectDelimiter(text) {
    const candidates = [',', ';', '\t', '|'];
    const firstLine = text.split(/\r?\n/)[0];
    let best = ',';
    let bestCount = 0;
    for (const d of candidates) {
      // Simple count outside quotes
      let count = 0, inQ = false;
      for (const ch of firstLine) {
        if (ch === '"') inQ = !inQ;
        else if (!inQ && ch === d) count++;
      }
      if (count > bestCount) { bestCount = count; best = d; }
    }
    return best;
  }

  /* ── Build HTML Table ───────────────────────────────────────────────────── */
  function buildTable(rows, { firstRowHeader, trimWhitespace, showRowNumbers }) {
    if (rows.length === 0) return null;

    // Trim whitespace if requested
    if (trimWhitespace) {
      rows = rows.map(r => r.map(f => f.trim()));
    }

    // Determine max column count
    const maxCols = Math.max(...rows.map(r => r.length));

    // Pad rows with fewer columns
    rows = rows.map(r => {
      while (r.length < maxCols) r.push('');
      return r;
    });

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const tbody = document.createElement('tbody');

    const headerRow = document.createElement('tr');

    // Row-number header cell
    if (showRowNumbers) {
      const rh = document.createElement('th');
      rh.className = 'row-num-header';
      rh.textContent = '#';
      headerRow.appendChild(rh);
    }

    const headerData = firstRowHeader ? rows[0] : rows[0].map((_, i) => `Column ${i + 1}`);
    headerData.forEach(text => {
      const th = document.createElement('th');
      th.textContent = text;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const dataRows = firstRowHeader ? rows.slice(1) : rows;
    dataRows.forEach((cols, rowIdx) => {
      const tr = document.createElement('tr');

      if (showRowNumbers) {
        const rn = document.createElement('td');
        rn.className = 'row-num';
        rn.textContent = rowIdx + 1;
        tr.appendChild(rn);
      }

      cols.forEach(val => {
        const td = document.createElement('td');
        if (val === '') {
          td.innerHTML = '<span class="cell-empty">—</span>';
        } else {
          td.textContent = val;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    return { table, rowCount: dataRows.length, colCount: maxCols };
  }

  /* ── Main parse handler ─────────────────────────────────────────────────── */
  function handleParse() {
    const raw = document.getElementById('csvInput').value;
    const errorBox = document.getElementById('errorBox');
    const output = document.getElementById('output');
    const stats = document.getElementById('stats');

    errorBox.style.display = 'none';
    errorBox.textContent = '';
    output.innerHTML = '';
    stats.textContent = '';

    if (!raw.trim()) {
      showError('Please paste some CSV data first.');
      return;
    }

    let delimiter = document.getElementById('delimiter').value;
    if (delimiter === 'auto') delimiter = detectDelimiter(raw);

    let rows;
    try {
      rows = parseCSV(raw, delimiter);
    } catch (e) {
      showError('Parsing error: ' + e.message);
      return;
    }

    if (rows.length === 0) {
      showError('No data found. Please check your input.');
      return;
    }

    const options = {
      firstRowHeader: document.getElementById('firstRowHeader').checked,
      trimWhitespace: document.getElementById('trimWhitespace').checked,
      showRowNumbers: document.getElementById('showRowNumbers').checked,
    };

    const result = buildTable(rows, options);
    if (!result) {
      showError('Could not build table from the provided data.');
      return;
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'table-wrapper';
    wrapper.appendChild(result.table);
    output.appendChild(wrapper);

    const delimLabel = delimiter === '\t' ? 'Tab' : `"${delimiter}"`;
    stats.textContent =
      `✅ Parsed ${result.rowCount} data row(s) × ${result.colCount} column(s) — delimiter: ${delimLabel}`;

    output.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(msg) {
    const errorBox = document.getElementById('errorBox');
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  /* ── Sample data ────────────────────────────────────────────────────────── */
  const SAMPLE = `name,age,city,occupation,notes
"Smith, John",30,"New York",Engineer,"Loves ""coffee"" and coding"
Jane Doe,25,London,Designer,
"O'Brien, Pat",42,"San Francisco",Manager,"Works on ""AI"" projects"
李明,28,Beijing,Researcher,Specialises in NLP
,,,Incomplete Row,Missing first three fields
Maria García,35,"São Paulo",Analyst,"Enjoys hiking, cycling, and travel"`;

  document.getElementById('sampleBtn').addEventListener('click', () => {
    document.getElementById('csvInput').value = SAMPLE;
    document.getElementById('delimiter').value = 'auto';
    document.getElementById('firstRowHeader').checked = true;
    document.getElementById('trimWhitespace').checked = true;
    document.getElementById('showRowNumbers').checked = true;
  });

  document.getElementById('parseBtn').addEventListener('click', handleParse);

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('csvInput').value = '';
    document.getElementById('output').innerHTML = '';
    document.getElementById('stats').textContent = '';
    document.getElementById('errorBox').style.display = 'none';
  });

  // Allow Ctrl+Enter to parse
  document.getElementById('csvInput').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') handleParse();
  });
</script>
</body>
</html>
