<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV to Table</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    header p {
      color: #666;
      font-size: 0.95rem;
    }

    /* ── Input Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.75rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }

    .card label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      height: 180px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      color: #2d3748;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafbfc;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.18);
      background: #fff;
    }

    textarea::placeholder { color: #aab; }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 3px 12px rgba(102,126,234,0.35);
    }

    .btn-primary:hover { box-shadow: 0 5px 18px rgba(102,126,234,0.45); }

    .btn-secondary {
      background: #f1f3f5;
      color: #555;
    }

    .btn-secondary:hover { background: #e2e8f0; }

    .btn-sample {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .btn-sample:hover { background: #c8e6c9; }

    /* ── Delimiter selector ── */
    .delimiter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
      font-size: 0.875rem;
      color: #555;
    }

    .delimiter-group select {
      padding: 0.45rem 0.7rem;
      border: 2px solid #e2e8f0;
      border-radius: 7px;
      font-size: 0.875rem;
      background: #fafbfc;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .delimiter-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    /* ── Error / Info Banner ── */
    .banner {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1.1rem;
      border-radius: 9px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.25s ease;
    }

    .banner.error  { display: flex; background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
    .banner.info   { display: flex; background: #f0f7ff; color: #1a6bb5; border: 1px solid #bee3f8; }

    /* ── Stats Bar ── */
    .stats {
      display: none;
      gap: 1.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .stats.visible { display: flex; }

    .stat-pill {
      background: #fff;
      border-radius: 20px;
      padding: 0.35rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .stat-pill span { color: #667eea; }

    /* ── Table Wrapper ── */
    .table-wrapper {
      display: none;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    .table-wrapper.visible { display: block; }

    .table-scroll { overflow-x: auto; }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    thead th {
      padding: 0.85rem 1.1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.15);
      position: sticky;
      top: 0;
    }

    thead th:last-child { border-right
