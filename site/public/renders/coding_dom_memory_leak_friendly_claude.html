<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Dashboard Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        /* ── Explanation Banner ── */
        .explanation {
            background: #1e293b;
            border: 1px solid #334155;
            border-left: 4px solid #f59e0b;
            border-radius: 8px;
            padding: 18px 22px;
            margin-bottom: 28px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .explanation h2 {
            color: #f59e0b;
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation p {
            color: #cbd5e1;
            font-size: 0.875rem;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .explanation p:last-child { margin-bottom: 0; }

        .highlight-wrong  { color: #f87171; font-weight: 600; }
        .highlight-right  { color: #34d399; font-weight: 600; }
        .highlight-code   {
            background: #0f172a;
            color: #93c5fd;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.82rem;
        }

        /* ── Memory Stats Bar ── */
        .stats-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 22px;
            text-align: center;
            min-width: 160px;
            flex: 1;
        }

        .stat-card .label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-card .sub {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 3px;
        }

        .val-leak    { color: #f87171; }
        .val-fixed   { color: #34d399; }
        .val-neutral { color: #93c5fd; }
        .val-warn    { color: #f59e0b; }

        /* ── Two-column layout ── */
        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto 32px;
        }

        @media (max-width: 720px) {
            .columns { grid-template-columns: 1fr; }
        }

        /* ── Panel ── */
        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }

        .panel-header h2 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-leak  {
            background: #450a0a;
            color: #f87171;
            border: 1px solid #f87171;
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-fixed {
            background: #052e16;
            color: #34d399;
            border: 1px solid #34d399;
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel-controls {
            padding: 12px 18px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
        }

        /* ── Buttons ── */
        .btn {
            border: none;
            border-radius: 7px;
            padding: 7px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover  { opacity: 0.85; }
        .btn:active { transform: scale(0.97); }

        .btn-add    { background: #3b82f6; color: #fff; }
        .btn-remove { background: #ef4444; color: #fff; }
        .btn-burst  { background: #8b5cf6; color: #fff; }
        .btn-clear  { background: #475569; color: #fff; }

        /* ── Widget list ── */
        .widget-list {
            padding: 12px;
            min-height: 220px;
            max-height: 340px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .widget-list::-webkit-scrollbar { width: 6px; }
        .widget-list::-webkit-scrollbar-track { background: transparent; }
        .widget-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        .empty-msg {
            color: #475569;
            font-size: 0.82rem;
            text-align: center;
            margin: auto;
            padding: 20px;
        }

        /*
