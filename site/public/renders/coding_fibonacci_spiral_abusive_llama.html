<!DOCTYPE html>
<html>
<head>
    <title>Buggy and Fixed Fibonacci Spiral Animation</title>
    <style>
        /* Add some basic styling to our canvas elements */
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h2>Buggy Fibonacci Spiral Animation</h2>
    <canvas id="buggy-canvas" width="400" height="400"></canvas>
    <script>
        // Buggy Fibonacci spiral animation
        const buggyCanvas = document.getElementById('buggy-canvas');
        const buggyCtx = buggyCanvas.getContext('2d');
        buggyCtx.translate(200, 200); // Center the canvas

        let buggyAngle = 0;
        let buggyFibA = 1;
        let buggyFibB = 1;

        for (let i = 0; i < 20; i++) {
            buggyCtx.beginPath();
            buggyCtx.arc(0, 0, buggyFibA, 0, 2 * Math.PI * (i + 1) / 20); // Incorrect math: using i+1/20 instead of a proper angle
            buggyCtx.stroke();

            let temp = buggyFibA;
            buggyFibA = buggyFibB;
            buggyFibB = temp + buggyFibB;
        }
    </script>

    <h2>Fixed Fibonacci Spiral Animation</h2>
    <canvas id="fixed-canvas" width="400" height="400"></canvas>
    <script>
        // Fixed Fibonacci spiral animation
        const fixedCanvas = document.getElementById('fixed-canvas');
        const fixedCtx = fixedCanvas.getContext('2d');
        fixedCtx.translate(200, 200); // Center the canvas

        let fixedAngle = 0;
        let fixedFibA = 1;
        let fixedFibB = 1;

        for (let i = 0; i < 20; i++) {
            fixedCtx.beginPath();
            fixedCtx.arc(0, 0, fixedFibB, fixedAngle, fixedAngle + Math.PI / 10); // Correct math: incrementing angle and using Fibonacci number as radius
            fixedCtx.stroke();

            fixedAngle += Math.PI / 10;
            let temp = fixedFibA;
            fixedFibA = fixedFibB;
            fixedFibB = temp + fixedFibB;
        }
    </script>
</body>
</html>
