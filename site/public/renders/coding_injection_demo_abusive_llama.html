<!DOCTYPE html>
<html>
<head>
  <title>SQL Injection Demo</title>
  <style>
    /* Basic styling for the demo */
    body {
      font-family: monospace;
    }
    #output {
      white-space: pre;
    }
  </style>
</head>
<body>
  <h1>SQL Injection Demo</h1>
  <button id="vulnerable-mode">Vulnerable (Concatenation)</button>
  <button id="safe-mode">Safe (Parameterized)</button>
  <input id="product-id" type="text" placeholder="Enter product ID">
  <button id="query-btn">Query</button>
  <div id="output"></div>

  <script>
    // In-memory product database
    const products = [
      { id: 1, name: 'Product A', price: 19.99 },
      { id: 2, name: 'Product B', price: 9.99 },
      { id: 3, name: 'Product C', price: 29.99 },
    ];

    let currentMode = 'vulnerable';

    // Function to execute query in vulnerable mode (concatenation)
    function vulnerableQuery(productId) {
      const query = `SELECT * FROM products WHERE id = ${productId}`;
      console.log(`Query: ${query}`);

      const results = products.filter((product) => product.id == productId);
      return results;
    }

    // Function to execute query in safe mode (parameterized)
    function safeQuery(productId) {
      const query = 'SELECT * FROM products WHERE id = ?';
      console.log(`Query: ${query}`);

      const results = products.filter((product) => product.id == productId);
      return results;
    }

    // Function to execute query based on current mode
    function executeQuery(productId) {
      let results;
      if (currentMode === 'vulnerable') {
        results = vulnerableQuery(productId);
      } else if (currentMode === 'safe') {
        results = safeQuery(productId);
      }

      const output = document.getElementById('output');
      output.innerText = '';

      if (results.length > 0) {
        output.innerText = JSON.stringify(results, null, 2);
      } else {
        output.innerText = 'No products found.';
      }
    }

    // Event listeners
    document.getElementById('vulnerable-mode').addEventListener('click', () => {
      currentMode = 'vulnerable';
      console.log('Switched to vulnerable mode.');
    });

    document.getElementById('safe-mode').addEventListener('click', () => {
      currentMode = 'safe';
      console.log('Switched to safe mode.');
    });

    document.getElementById('query-btn').addEventListener('click', () => {
      const productId = document.getElementById('product-id').value;
      executeQuery(productId);
    });
  </script>
</body>
</html>
