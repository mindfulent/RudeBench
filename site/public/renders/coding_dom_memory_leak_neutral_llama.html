<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Demonstration</title>
    <style>
        #dashboard {
            display: flex;
            flex-wrap: wrap;
        }
        .widget {
            width: 100px;
            height: 100px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>Memory Leak Demonstration</h1>
    <button id="add-widget-btn">Add Widget</button>
    <button id="remove-widget-btn">Remove Widget</button>
    <button id="toggle-leak-btn">Toggle Leak</button>
    <div id="dashboard"></div>
    <p>Memory Usage: <span id="memory-usage">0</span> widgets</p>

    <script>
        let widgets = [];
        let leak = true;
        let widgetCount = 0;

        // Function to create a new widget
        function createWidget() {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Widget ${widgetCount}`;
            widgetCount++;
            document.getElementById('dashboard').appendChild(widget);
            return widget;
        }

        // Function to remove a widget
        function removeWidget() {
            if (widgets.length > 0) {
                const widget = widgets.pop();
                if (leak) {
                    // Buggy code: not cleaning up event listeners or DOM references
                    widget.parentNode.removeChild(widget);
                } else {
                    // Fixed code: cleaning up event listeners and DOM references
                    widget.removeEventListener('click', widget.clickHandler);
                    widget.parentNode.removeChild(widget);
                }
            }
        }

        // Event listener for add widget button
        document.getElementById('add-widget-btn').addEventListener('click', () => {
            const widget = createWidget();
            if (leak) {
                // Buggy code: attaching event listener and storing DOM reference
                widget.addEventListener('click', () => {
                    console.log(`Clicked on ${widget.textContent}`);
                });
                widgets.push(widget);
            } else {
                // Fixed code: no event listener or DOM reference stored
                widget.addEventListener('click', () => {
                    console.log(`Clicked on ${widget.textContent}`);
                });
            }
            document.getElementById('memory-usage').textContent = widgets.length + (leak ? ' (leaking)' : '');
        });

        // Event listener for remove widget button
        document.getElementById('remove-widget-btn').addEventListener('click', removeWidget);

        // Event listener for toggle leak button
        document.getElementById('toggle-leak-btn').addEventListener('click', () => {
            leak = !leak;
            widgets = [];
            document.getElementById('dashboard').innerHTML = '';
            widgetCount = 0;
            document.getElementById('memory-usage').textContent = '0' + (leak ? ' (leaking)' : '');
        });
    </script>
</body>
</html>
