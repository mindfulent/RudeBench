<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Demonstration</title>
    <style>
        .widget {
            padding: 10px;
            border: 1px solid #ccc;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Memory Leak Demonstration</h1>
    <button id="add-widget-btn">Add Widget</button>
    <button id="remove-widget-btn">Remove Widget</button>
    <button id="add-fixed-widget-btn">Add Fixed Widget</button>
    <button id="remove-fixed-widget-btn">Remove Fixed Widget</button>
    <div id="leaking-widgets"></div>
    <div id="fixed-widgets"></div>
    <p>Leaking Widgets Count: <span id="leaking-widgets-count">0</span></p>
    <p>Fixed Widgets Count: <span id="fixed-widgets-count">0</span></p>

    <script>
        // Leaking version
        let leakingWidgets = [];
        let leakingWidgetCount = 0;

        document.getElementById('add-widget-btn').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Leaking Widget ${leakingWidgetCount}`;
            document.getElementById('leaking-widgets').appendChild(widget);
            leakingWidgets.push(widget);

            // Attach event listener
            widget.addEventListener('click', () => {
                console.log(`Leaking Widget ${leakingWidgetCount} clicked`);
            });

            leakingWidgetCount++;
            document.getElementById('leaking-widgets-count').textContent = leakingWidgetCount;
        });

        document.getElementById('remove-widget-btn').addEventListener('click', () => {
            if (leakingWidgets.length > 0) {
                const widget = leakingWidgets.shift();
                widget.parentNode.removeChild(widget);
                leakingWidgetCount--;
                document.getElementById('leaking-widgets-count').textContent = leakingWidgetCount;
            }
        });

        // Fixed version
        let fixedWidgets = [];
        let fixedWidgetCount = 0;

        document.getElementById('add-fixed-widget-btn').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Fixed Widget ${fixedWidgetCount}`;
            document.getElementById('fixed-widgets').appendChild(widget);
            fixedWidgets.push(widget);

            // Attach event listener
            const clickHandler = () => {
                console.log(`Fixed Widget ${fixedWidgetCount} clicked`);
            };
            widget.addEventListener('click', clickHandler);

            // Store the click handler for later removal
            widget.dataset.clickHandler = clickHandler.toString();

            fixedWidgetCount++;
            document.getElementById('fixed-widgets-count').textContent = fixedWidgetCount;
        });

        document.getElementById('remove-fixed-widget-btn').addEventListener('click', () => {
            if (fixedWidgets.length > 0) {
                const widget = fixedWidgets.shift();
                // Remove event listener
                widget.removeEventListener('click', widget.dataset.clickHandler);
                widget.parentNode.removeChild(widget);
                fixedWidgetCount--;
                document.getElementById('fixed-widgets-count').textContent = fixedWidgetCount;
            }
        });
    </script>
</body>
</html>
