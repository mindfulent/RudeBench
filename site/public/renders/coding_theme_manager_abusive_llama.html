<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singleton Pattern: Theme Toggle</title>
    <style>
        .dark-theme {
            background-color: #333;
            color: #fff;
        }
        
        .light-theme {
            background-color: #fff;
            color: #333;
        }
        
        .theme-toggle {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 id="header">Theme Toggle Example</h1>
    <p id="paragraph">This is a paragraph of text.</p>
    <button class="theme-toggle" id="toggle-button">Toggle Theme</button>
    <div id="another-element">Another element</div>

    <script>
        // Singleton Pattern Implementation
        class ThemeManager {
            static instance;

            constructor() {
                if (ThemeManager.instance) {
                    return ThemeManager.instance;
                }
                ThemeManager.instance = this;
                this.theme = 'light';
                this.elements = [];

                // Bind event listener
                document.getElementById('toggle-button').addEventListener('click', this.toggleTheme.bind(this));
            }

            addElement(element) {
                this.elements.push(element);
            }

            toggleTheme() {
                this.theme = this.theme === 'light' ? 'dark' : 'light';
                this.applyTheme();
            }

            applyTheme() {
                document.body.classList.remove('light-theme', 'dark-theme');
                document.body.classList.add(`${this.theme}-theme`);

                this.elements.forEach(element => {
                    element.classList.remove('light-theme', 'dark-theme');
                    element.classList.add(`${this.theme}-theme`);
                });
            }
        }

        // Usage
        const themeManager = new ThemeManager();

        // Add elements to theme manager
        themeManager.addElement(document.getElementById('header'));
        themeManager.addElement(document.getElementById('paragraph'));
        themeManager.addElement(document.getElementById('another-element'));

        // Apply initial theme
        themeManager.applyTheme();
    </script>
</body>
</html>
