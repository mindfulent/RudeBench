<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Leak Demo: GC Is Not The Problem</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: #f0f4ff;
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  /* ── Explanation banner ── */
  .explanation {
    background: #1e2535;
    border: 1px solid #334155;
    border-left: 4px solid #f59e0b;
    border-radius: 8px;
    padding: 18px 22px;
    margin-bottom: 28px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .explanation h2 {
    color: #f59e0b;
    font-size: 1rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .explanation p {
    color: #cbd5e1;
    font-size: 0.85rem;
    line-height: 1.7;
    margin-bottom: 8px;
  }

  .explanation p:last-child { margin-bottom: 0; }

  .explanation strong { color: #fbbf24; }

  /* ── Two-column layout ── */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto 28px;
  }

  @media (max-width: 720px) {
    .columns { grid-template-columns: 1fr; }
  }

  /* ── Panel ── */
  .panel {
    background: #1a1f2e;
    border: 1px solid #2d3748;
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2d3748;
  }

  .panel-header.buggy  { background: #2d1b1b; border-bottom-color: #7f1d1d; }
  .panel-header.fixed  { background: #1b2d1b; border-bottom-color: #14532d; }

  .panel-title {
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .badge-red   { background: #7f1d1d; color: #fca5a5; }
  .badge-green { background: #14532d; color: #86efac; }

  .panel-controls {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-bottom: 1px solid #2d3748;
    background: #151a27;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    transition: opacity 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.96); }
  button:hover  { opacity: 0.85; }

  .btn-add    { background: #3b82f6; color: #fff; }
  .btn-remove { background: #ef4444; color: #fff; }
  .btn-stress { background: #8b5cf6; color: #fff; }
  .btn-reset  { background: #475569; color: #fff; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #2d3748;
  }

  .stat {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid #2d3748;
    background: #111827;
  }

  .stat:last-child { border-right: none; }

  .stat-label {
    font-size: 0.65rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }

  .stat-value {
    font-size: 1.1rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-value.red    { color: #f87171; }
  .stat-value.green  { color: #4ade80; }
  .stat-value.yellow { color: #fbbf24; }
  .stat-value.blue   { color: #60a5fa; }

  /* ── Widget list ── */
  .widget-list {
    padding: 12px;
    min-height: 180px;
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .widget-list::-webkit-scrollbar { width: 6px; }
  .widget-list::-webkit-scrollbar-track { background: #1a1f2e; }
  .widget-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .widget-card {
    background: #1e2535;
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .widget-info { display: flex; flex-direction: column; gap: 2px; }

  .widget-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: #e2e8f0;
  }

  .widget-meta {
    font-size: 0.7rem;
    color: #64748b;
  }

  .widget-value {
    font-size: 1rem;
    font-weight: 700;
    color: #60a5fa;
    font-variant-numeric: tabular-nums;
    min-width: 50px;
    text-align: right;
  }

  .btn-widget-remove {
    background: #374151;
    color: #9ca3af;
    padding: 4px 9px;
    font-size: 0
