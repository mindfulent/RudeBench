<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REST API Review & Documentation</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      #2e3350;
      --accent:      #6c63ff;
      --accent2:     #a78bfa;
      --text:        #e2e8f0;
      --muted:       #8892a4;
      --get:         #10b981;
      --post:        #3b82f6;
      --put:         #f59e0b;
      --delete:      #ef4444;
      --patch:       #8b5cf6;
      --bad:         #ef4444;
      --good:        #10b981;
      --warn:        #f59e0b;
      --radius:      12px;
      --radius-sm:   6px;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(108,99,255,.25) 0%, transparent 65%);
      pointer-events: none;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -.5px;
      background: linear-gradient(90deg, #a78bfa, #6c63ff, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: .5rem;
      color: var(--muted);
      font-size: .95rem;
    }
    .badge-row {
      display: flex;
      gap: .5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .badge {
      padding: .25rem .75rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .badge-version { background: rgba(108,99,255,.2); color: var(--accent2); border: 1px solid rgba(108,99,255,.4); }
    .badge-rest    { background: rgba(16,185,129,.15); color: var(--get);    border: 1px solid rgba(16,185,129,.35); }
    .badge-review  { background: rgba(245,158,11,.15); color: var(--warn);   border: 1px solid rgba(245,158,11,.35); }

    /* ── Layout ── */
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── Section Cards ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      user-select: none;
      transition: background .2s;
      gap: 1rem;
    }
    .section-header:hover { background: var(--surface2); }
    .section-header-left {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .section-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .icon-problems { background: rgba(239,68,68,.15); }
    .icon-fixed    { background: rgba(16,185,129,.15); }
    .icon-codes    { background: rgba(108,99,255,.15); }
    .icon-summary  { background: rgba(96,165,250,.15); }

    .section-title {
      font-size: 1.05rem;
      font-weight: 600;
    }
    .section-count {
      font-size: .75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: .15rem .55rem;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .chevron {
      color: var(--muted);
      font-size: 1rem;
      transition: transform .3s;
      flex-shrink: 0;
    }
    .chevron.open { transform: rotate(180deg); }

    .section-body {
      display: none;
      padding: 0 1.4rem 1.4rem;
      border-top: 1px solid var(--border);
    }
    .section-body.open { display: block; }

    /* ── Problems ── */
    .problem-list { display: flex; flex-direction: column; gap: .85rem; margin-top: 1rem; }
    .problem-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--bad);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
    }
    .problem-item-header {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      margin-bottom: .4rem;
    }
    .problem-number {
      background: rgba(239,68,68,.2);
      color: var(--bad);
      font-size: .7rem;
      font-weight: 700;
      padding: .15rem .45rem;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: .15rem;
    }
    .problem-title { font-weight: 600; font-size: .95rem; }
    .problem-endpoint {
      font-family: 'Courier New', monospace;
      font-size: .82rem;
      background: rgba(0,0,0,.35);
      padding: .3rem .7rem;
      border-radius: 4px;
      margin: .4rem 0;
      color: #fca5a5;
      display: inline-block;
    }
    .problem-desc { font-size: .875
