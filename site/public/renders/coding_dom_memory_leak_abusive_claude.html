<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Dashboard - GC Myth Buster</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #7c6af7;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        /* ── Explanation Banner ── */
        .explanation {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #7c6af7;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .explanation h2 {
            color: #f06292;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .explanation p { color: #ccc; font-size: 0.88rem; margin-bottom: 10px; }

        .explanation ul {
            list-style: none;
            padding-left: 0;
        }

        .explanation ul li {
            padding: 6px 0 6px 24px;
            position: relative;
            font-size: 0.87rem;
            color: #ccc;
        }

        .explanation ul li::before {
            content: '▶';
            position: absolute;
            left: 0;
            color: #f06292;
            font-size: 0.7rem;
            top: 9px;
        }

        .gc-myth {
            background: #2a1a1a;
            border-left: 4px solid #f06292;
            border-radius: 0 8px 8px 0;
            padding: 12px 16px;
            margin-top: 14px;
            font-size: 0.87rem;
            color: #ffb3b3;
        }

        .gc-myth strong { color: #ff6b6b; }

        /* ── Layout ── */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 800px) {
            .panels { grid-template-columns: 1fr; }
        }

        .panel {
            background: #13131f;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a3e;
        }

        .panel.leaking  { border-color: #ff4d4d55; }
        .panel.fixed    { border-color: #4dff9155; }

        .panel-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel.leaking .panel-title  { color: #ff6b6b; }
        .panel.fixed   .panel-title  { color: #69ff96; }

        .panel-desc {
            font-size: 0.78rem;
            color: #777;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        /* ── Stats Bar ── */
        .stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .stat {
            flex: 1;
            min-width: 90px;
            background: #1c1c2e;
            border-radius: 8px;
            padding: 10px 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.68rem;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel.leaking  .stat-value { color: #ff6b6b; }
        .panel.fixed    .stat-value { color: #69ff96; }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn:hover  { opacity: 0.85; }
        .btn:active { transform: scale(0.97); }

        .btn-add    { background: #7c6af7; color: #fff; }
        .btn-delete { background: #444; color: #ccc; }
        .btn-spam   { background: #c0392b; color: #fff; }
        .btn-clear  { background: #2c3e50; color: #ccc; }

        /* ── Widget Grid ── */
        .widget-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            min-height: 80px;
        }

        .widget {
            background: #1e1e30;
            border-radius: 8px;
            padding: 10px;
            position: relative;
            border: 1px solid #2e2e45;
            transition: border-color 0.2s;
        }

        .widget:hover { border-color: #555; }

        .widget-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .widget-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e0e0e0;
        }

        .widget-bar {
            height: 4px;
            background: #2a2a3e;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .widget-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .widget-del {
            position: absolute;
            top: 4px;
            right: 4px;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 0.8rem;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15
