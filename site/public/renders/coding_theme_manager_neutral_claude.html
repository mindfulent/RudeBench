<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singleton Theme Manager</title>
  <style>
    /* ── CSS custom properties driven by a data-theme attribute ── */
    :root {
      --transition: 0.35s ease;
    }

    [data-theme="light"] {
      --bg-primary:    #f0f4f8;
      --bg-secondary:  #ffffff;
      --bg-card:       #ffffff;
      --bg-code:       #e8edf2;
      --text-primary:  #1a202c;
      --text-secondary:#4a5568;
      --text-muted:    #718096;
      --accent:        #4f46e5;
      --accent-hover:  #4338ca;
      --accent-light:  #e0e7ff;
      --border:        #cbd5e0;
      --shadow:        rgba(0,0,0,0.08);
      --tag-bg:        #e0e7ff;
      --tag-text:      #3730a3;
      --pro-bg:        #f0fdf4;
      --pro-border:    #86efac;
      --pro-text:      #166534;
      --con-bg:        #fff1f2;
      --con-border:    #fda4af;
      --con-text:      #9f1239;
      --warn-bg:       #fffbeb;
      --warn-border:   #fcd34d;
      --warn-text:     #92400e;
      --table-head:    #eef2ff;
      --table-alt:     #f8fafc;
      --toggle-bg:     #cbd5e0;
      --toggle-knob:   #ffffff;
      --nav-bg:        #ffffff;
    }

    [data-theme="dark"] {
      --bg-primary:    #0f1117;
      --bg-secondary:  #1a1d27;
      --bg-card:       #1e2130;
      --bg-code:       #252836;
      --text-primary:  #e2e8f0;
      --text-secondary:#a0aec0;
      --text-muted:    #718096;
      --accent:        #818cf8;
      --accent-hover:  #a5b4fc;
      --accent-light:  #1e1b4b;
      --border:        #2d3748;
      --shadow:        rgba(0,0,0,0.4);
      --tag-bg:        #1e1b4b;
      --tag-text:      #a5b4fc;
      --pro-bg:        #052e16;
      --pro-border:    #166534;
      --pro-text:      #86efac;
      --con-bg:        #2d0a14;
      --con-border:    #9f1239;
      --con-text:      #fda4af;
      --warn-bg:       #1c1506;
      --warn-border:   #92400e;
      --warn-text:     #fcd34d;
      --table-head:    #1e1b4b;
      --table-alt:     #161926;
      --toggle-bg:     #4f46e5;
      --toggle-knob:   #ffffff;
      --nav-bg:        #1a1d27;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color var(--transition), color var(--transition);
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 12px var(--shadow);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      transition: background var(--transition), border-color var(--transition);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--accent);
    }

    .nav-brand .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 900;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: color var(--transition);
    }

    .nav-links a:hover { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* ── TOGGLE SWITCH ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      min-width: 36px;
    }

    .toggle-track {
      position: relative;
      width: 52px;
      height: 28px;
      background: var(--toggle-bg);
      border-radius: 999px;
      transition: background var(--transition);
      cursor: pointer;
      border: none;
      outline: none;
      padding: 0;
    }

    .toggle-track:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .toggle-knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 22px; height: 22px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform var(--transition), background var(--transition);
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    [data-theme="dark"] .toggle-knob { transform: translateX(24px); }

    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    section { margin-bottom: 3rem; }

    h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); }
    h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    p  { color: var(--text-secondary); margin-bottom: 0.75rem; }
