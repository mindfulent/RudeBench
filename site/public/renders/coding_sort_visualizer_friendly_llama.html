<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Comparison Tool</title>
    <style>
        /* Add some basic styling to make the page look nicer */
        body {
            font-family: Arial, sans-serif;
        }
        .algorithm-container {
            display: inline-block;
            margin: 10px;
            width: 300px;
            text-align: center;
        }
        .algorithm-container canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Sorting Algorithm Comparison Tool</h1>
    <div class="algorithm-container">
        <h2>Bubble Sort (O(n^2))</h2>
        <p>Time complexity: O(n^2)</p>
        <p>Step counter: <span id="bubble-sort-steps">0</span></p>
        <canvas id="bubble-sort-canvas" width="200" height="200"></canvas>
    </div>
    <div class="algorithm-container">
        <h2>Quicksort (O(n log n) on average)</h2>
        <p>Time complexity: O(n log n) on average, O(n^2) in worst case</p>
        <p>Step counter: <span id="quicksort-steps">0</span></p>
        <canvas id="quicksort-canvas" width="200" height="200"></canvas>
    </div>
    <div class="algorithm-container">
        <h2>Mergesort (O(n log n))</h2>
        <p>Time complexity: O(n log n)</p>
        <p>Step counter: <span id="mergesort-steps">0</span></p>
        <canvas id="mergesort-canvas" width="200" height="200"></canvas>
    </div>

    <script>
        // Get the canvas elements
        const bubbleSortCanvas = document.getElementById('bubble-sort-canvas');
        const quicksortCanvas = document.getElementById('quicksort-canvas');
        const mergesortCanvas = document.getElementById('mergesort-canvas');

        // Get the step counter elements
        const bubbleSortStepsElement = document.getElementById('bubble-sort-steps');
        const quicksortStepsElement = document.getElementById('quicksort-steps');
        const mergesortStepsElement = document.getElementById('mergesort-steps');

        // Generate random data
        const data = [];
        for (let i = 0; i < 10; i++) {
            data.push(Math.floor(Math.random() * 100));
        }

        // Draw the initial data on the canvases
        drawData(bubbleSortCanvas, data.slice());
        drawData(quicksortCanvas, data.slice());
        drawData(mergesortCanvas, data.slice());

        // Perform the sorting algorithms
        let bubbleSortData = data.slice();
        let quicksortData = data.slice();
        let mergesortData = data.slice();

        // Bubble sort
        let bubbleSortSteps = 0;
        async function bubbleSort() {
            for (let i = 0; i < bubbleSortData.length; i++) {
                for (let j = 0; j < bubbleSortData.length - i - 1; j++) {
                    bubbleSortSteps++;
                    if (bubbleSortData[j] > bubbleSortData[j + 1]) {
                        [bubbleSortData[j], bubbleSortData[j + 1]] = [bubbleSortData[j + 1], bubbleSortData[j]];
                    }
                    bubbleSortStepsElement.textContent = bubbleSortSteps;
                    drawData(bubbleSortCanvas, bubbleSortData.slice());
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
        }

        // Quicksort
        let quicksortSteps = 0;
        async function quicksort() {
            quicksortSort(quicksortData, 0, quicksortData.length - 1);
        }
        function quicksortSort(data, low, high) {
            if (low < high) {
                const pivotIndex = quicksortPartition(data, low, high);
                quicksortSort(data, low, pivotIndex - 1);
                quicksortSort(data, pivotIndex + 1, high);
            }
        }
        function quicksortPartition(data, low, high) {
            const pivot = data[high];
            let i = low - 1;
            for (let j = low; j < high; j++) {
                quicksortSteps++;
                if (data[j] < pivot) {
                    i++;
                    [data[i], data[j]] = [data[j], data[i]];
                }
            }
            [data[i + 1], data[high]] = [data[high], data[i + 1]];
            quicksortStepsElement.textContent = quicksortSteps;
            drawData(quicksortCanvas, quicksortData.slice());
            return i + 1;
        }

        // Mergesort
        let mergesortSteps = 0;
        async function mergesort() {
            mergesortSort(mergesortData, 0, mergesortData.length - 1);
        }
        function mergesortSort(data, low, high) {
            if (low < high) {
                const mid = Math.floor((low + high) / 2);
                mergesortSort(data, low, mid);
                mergesortSort(data, mid + 1, high);
                mergesortMerge(data, low, mid, high);
            }
        }
        function mergesortMerge(data, low, mid, high) {
            const left = data.slice(low, mid + 1);
            const right = data.slice(mid + 1, high + 1);
            let i = 0;
            let j = 0;
            let k = low;
            while (i < left.length && j < right.length) {
                mergesortSteps++;
                if (left[i] <= right[j]) {
                    data[k] = left[i];
                    i++;
                } else {
                    data[k] = right[j];
                    j++;
                }
                k++;
            }
            while (i < left.length) {
                data[k] = left[i];
                i++;
                k++;
            }
            while (j < right.length) {
                data[k] = right[j];
                j++;
                k++;
            }
            mergesortStepsElement.textContent = mergesortSteps;
            drawData(mergesortCanvas, mergesortData.slice());
        }

        // Draw the data on the canvas
        function drawData(canvas, data) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = canvas.width / data.length;
            for (let i = 0; i < data.length; i++) {
                ctx.fillStyle = 'blue';
                ctx.fillRect(i * barWidth, canvas.height - data[i] * 2, barWidth, data[i] * 2);
            }
        }

        // Start the sorting algorithms
        bubbleSort();
        quicksort();
        mergesort();
    </script>
</body>
</html>
