<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singleton Theme Toggle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s ease;
        }
        .light-theme {
            background-color: #f0f0f0;
            color: #333;
        }
        .dark-theme {
            background-color: #333;
            color: #f0f0f0;
        }
        .theme-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body class="light-theme">
    <button class="theme-toggle" onclick="ThemeManager.getInstance().toggleTheme()">Toggle Theme</button>
    <h1>Singleton Theme Toggle</h1>
    <p>This is a paragraph with some text.</p>
    <div style="padding: 20px; background-color: #ccc; border: 1px solid #ddd; margin-top: 20px;">
        <p>This is a div with some text.</p>
    </div>

    <script>
        // Singleton Theme Manager
        class ThemeManager {
            static instance;

            constructor() {
                if (ThemeManager.instance) {
                    throw new Error("ThemeManager is a singleton. Use getInstance() to get the instance.");
                }
                ThemeManager.instance = this;
                this.theme = 'light';
                this.init();
            }

            static getInstance() {
                if (!ThemeManager.instance) {
                    ThemeManager.instance = new ThemeManager();
                }
                return ThemeManager.instance;
            }

            init() {
                document.addEventListener('DOMContentLoaded', () => {
                    this.applyTheme();
                });
            }

            toggleTheme() {
                this.theme = this.theme === 'light' ? 'dark' : 'light';
                this.applyTheme();
            }

            applyTheme() {
                document.body.className = this.theme === 'light' ? 'light-theme' : 'dark-theme';
            }
        }

        // Get the ThemeManager instance
        ThemeManager.getInstance();
    </script>
</body>
</html>
