<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singleton Theme Toggle</title>
    <style>
        body {
            transition: background-color 0.3s ease-in-out;
        }
        .dark-theme {
            background-color: #333;
            color: #fff;
        }
        .light-theme {
            background-color: #fff;
            color: #000;
        }
        .theme-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body class="light-theme">
    <button class="theme-toggle" onclick="ThemeManager.toggleTheme()">Toggle Theme</button>
    <h1>Singleton Theme Toggle Example</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    <div style="background-color: #f0f0f0; padding: 10px; margin-top: 20px;">
        <h2>Nested Element</h2>
        <p>This element has a different background color.</p>
    </div>

    <script>
        // Singleton Theme Manager
        class ThemeManager {
            static instance;

            constructor() {
                if (ThemeManager.instance) {
                    return ThemeManager.instance;
                }
                ThemeManager.instance = this;
                this.theme = 'light-theme';
                this.init();
            }

            init() {
                document.body.classList.add(this.theme);
            }

            toggleTheme() {
                document.body.classList.toggle('dark-theme');
                document.body.classList.toggle('light-theme');
                this.theme = document.body.classList.contains('dark-theme') ? 'dark-theme' : 'light-theme';
            }
        }

        // Create a single instance of the ThemeManager
        const themeManager = new ThemeManager();

        // Use the theme manager to toggle the theme
        // (already done in the button's onclick event)
    </script>
</body>
</html>
