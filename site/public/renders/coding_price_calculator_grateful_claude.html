<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart: Float vs Decimal Demo</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: #f8fafc;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* ── Layout ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    /* ── Cards ── */
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #334155;
    }

    .card.broken  { border-top: 4px solid #ef4444; }
    .card.fixed   { border-top: 4px solid #22c55e; }
    .card.explain { border-top: 4px solid #f59e0b; max-width: 1200px; margin: 0 auto 40px; }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .broken h2 .badge  { background: #7f1d1d; color: #fca5a5; }
    .fixed  h2 .badge  { background: #14532d; color: #86efac; }

    .card .desc {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ── Product Grid ── */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .product-btn {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      transition: border-color .2s, transform .1s;
      text-align: center;
      color: #e2e8f0;
    }

    .product-btn:hover {
      border-color: #60a5fa;
      transform: translateY(-2px);
    }

    .product-btn .p-name  { font-size: 0.8rem; display: block; margin-bottom: 4px; }
    .product-btn .p-price { font-size: 1rem; font-weight: 700; color: #60a5fa; }

    /* ── Cart Items ── */
    .cart-list {
      list-style: none;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .cart-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 4px;
      background: #0f172a;
      gap: 8px;
    }

    .cart-list li .item-name { flex: 1; color: #cbd5e1; }
    .cart-list li .item-price { color: #93c5fd; font-weight: 600; white-space: nowrap; }

    .remove-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      line-height: 1;
    }

    /* ── Totals & Checks ── */
    .totals-box {
      background: #0f172a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      font-size: 0.88rem;
      line-height: 2;
    }

    .totals-box .row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
    }

    .totals-box .row:last-child { border-bottom: none; }
    .totals-box .row .label { color: #94a3b8; }
    .totals-box .row .value { font-weight: 600; }

    .value.ok   { color: #4ade80; }
    .value.bad  { color: #f87171; }
    .value.warn { color: #fbbf24; }

    /* ── Check Rows ── */
    .checks { font-size: 0.82rem; line-height: 1.9; }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px dashed #1e293b;
    }

    .check-row:last-child { border-bottom: none; }
    .check-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .check-text { color: #94a3b8; flex: 1; }
    .check-result { font-family: monospace; font-size: 0.78rem; }
    .check-result.pass { color: #4ade80; }
    .check-result.fail { color: #f87171; }

    /* ── Action Buttons ── */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-red   { background: #dc2626; color: #fff; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-blue  { background: #2563eb; color: #fff; }

    /* ── Explanation Card ── */
    .explain h2 { color: #fbbf24; margin-bottom: 16px; }
