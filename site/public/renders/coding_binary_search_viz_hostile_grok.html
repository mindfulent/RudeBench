<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Binary Search Visualization</title>
    <style>
        /* Basic styling for the page */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        
        /* Container for the array visualization */
        #array-container {
            display: flex;
            justify-content: center;
            margin: 20px auto;
            width: 80%;
        }
        
        /* Individual array elements (boxes) */
        .array-element {
            width: 50px;
            height: 50px;
            border: 1px solid #000;
            margin: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background-color: #f0f0f0; /* Default color */
            transition: background-color 0.3s; /* Smooth highlight transition */
        }
        
        /* Highlight for the search range (low to high) */
        .highlight-range {
            background-color: #ADD8E6; /* Light blue */
        }
        
        /* Highlight for the middle element */
        .highlight-mid {
            background-color: #90EE90; /* Light green */
        }
        
        /* Input and button styling */
        #controls {
            margin: 20px;
        }
        
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        
        /* Status and result display */
        #status {
            font-size: 18px;
            margin: 20px;
            color: #333;
        }
        
        #result {
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Interactive Binary Search Visualization</h1>
    <p>Enter a target number to search in the sorted array: [1, 3, 5, 7, 9, 11, 13, 15]</p>
    
    <div id="controls">
        <input type="number" id="target-input" placeholder="Enter target (e.g., 7)">
        <button id="start-button">Start Search</button>
        <button id="step-button" disabled>Step</button>
        <button id="reset-button">Reset</button>
    </div>
    
    <div id="status">Status: Ready to start.</div>
    <div id="result"></div>
    
    <div id="array-container">
        <!-- Array elements will be generated here by JavaScript -->
    </div>
    
    <script>
        // Sorted array to visualize
        const array = [1, 3, 5, 7, 9, 11, 13, 15];
        let low = 0;
        let high = array.length - 1;
        let mid = null;
        let target = null;
        let isSearching = false;
        let arrayElements = [];  // To store DOM elements for easy access
        
        // Function to render the array
        function renderArray() {
            const container = document.getElementById('array-container');
            container.innerHTML = '';  // Clear existing elements
            array.forEach((value, index) => {
                const element = document.createElement('div');
                element.className = 'array-element';
                element.textContent = value;
                element.dataset.index = index;  // Store index for reference
                container.appendChild(element);
                arrayElements[index] = element;  // Store for later highlighting
            });
        }
        
        // Function to highlight elements
        function highlightElements() {
            // Reset all highlights
            arrayElements.forEach(el => {
                el.classList.remove('highlight-range', 'highlight-mid');
            });
            
            if (isSearching) {
                // Highlight the range (low to high)
                for (let i = low; i <= high; i++) {
                    if (arrayElements[i]) arrayElements[i].classList.add('highlight-range');
                }
                
                // Highlight the middle element
                if (mid !== null && arrayElements[mid]) {
                    arrayElements[mid].classList.add('highlight-mid');
                }
            }
        }
        
        // Function to perform one step of binary search
        function stepSearch() {
            if (low > high) {
                // Search ended
                document.getElementById('status').textContent = 'Search complete: Target not found.';
                document.getElementById('result').textContent = 'Not found';
                document.getElementById('step-button').disabled = true;
                isSearching = false;
                return;
            }
            
            mid = Math.floor((low + high) / 2);
            document.getElementById('status').textContent = `Low: ${low}, High: ${high}, Mid: ${mid}, Value at Mid: ${array[mid]}`;
            
            if (array[mid] === target) {
                document.getElementById('status').textContent = `Found at index ${mid}!`;
                document.getElementById('result').textContent = `Found at index ${mid}`;
                highlightElements();  // Final highlight
                document.getElementById('step-button').disabled = true;
                isSearching = false;
                return;
            } else if (array[mid] < target) {
                low = mid + 1;
            } else {
                high = mid - 1;
            }
            
            highlightElements();  // Update highlights for next step
        }
        
        // Event listeners
        document.getElementById('start-button').addEventListener('click', () => {
            target = parseInt(document.getElementById('target-input').value);
            if (isNaN(target)) {
                alert('Please enter a valid number.');
                return;
            }
            
            low = 0;
            high = array.length - 1;
            isSearching = true;
            document.getElementById('step-button').disabled = false;
            document.getElementById('status').textContent = 'Search started. Click Step to proceed.';
            document.getElementById('result').textContent = '';
            highlightElements();  // Initial highlight
        });
        
        document.getElementById('step-button').addEventListener('click', stepSearch);
        
        document.getElementById('reset-button').addEventListener('click', () => {
            low = 0;
            high = array.length - 1;
            mid = null;
            isSearching = false;
            document.getElementById('step-button').disabled = true;
            document.getElementById('status').textContent = 'Reset. Enter a new target and start again.';
            document.getElementById('result').textContent = '';
            highlightElements();  // Clear highlights
        });
        
        // Initial render
        renderArray();
    </script>
</body>
</html>
