<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugging Fibonacci Spiral</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Buggy Fibonacci Spiral (Incorrect Base Cases)</h1>
    <canvas id="buggy-canvas" width="400" height="400"></canvas>
    <h1>Corrected Fibonacci Spiral</h1>
    <canvas id="corrected-canvas" width="400" height="400"></canvas>

    <script>
        // Function to generate Fibonacci sequence
        function* fibonacci() {
            let a = 0;
            let b = 1;
            yield a;
            yield b;
            while (true) {
                [a, b] = [b, a + b];
                yield b;
            }
        }

        // Draw Fibonacci spiral on canvas
        function drawFibonacciSpiral(ctx, canvasWidth, canvasHeight, maxFib) {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            ctx.beginPath();
            ctx.translate(canvasWidth / 2, canvasHeight / 2);
            ctx.strokeStyle = 'black';

            const fibGen = fibonacci();
            let prevAngle = 0;
            let radius = 0;

            for (let i = 0; i < maxFib; i++) {
                const fibNum = fibGen.next().value;
                radius += fibNum;

                ctx.arc(0, 0, radius, prevAngle, prevAngle + Math.PI / 2);
                prevAngle += Math.PI / 2;
            }

            ctx.stroke();
        }

        // Get canvases and contexts
        const buggyCanvas = document.getElementById('buggy-canvas');
        const buggyCtx = buggyCanvas.getContext('2d');
        const correctedCanvas = document.getElementById('corrected-canvas');
        const correctedCtx = correctedCanvas.getContext('2d');

        // Draw buggy Fibonacci spiral with incorrect base cases
        buggyCtx.beginPath();
        buggyCtx.translate(buggyCanvas.width / 2, buggyCanvas.height / 2);
        buggyCtx.strokeStyle = 'red';
        const buggyFibGen = fibonacci();
        buggyFibGen.next(); // Skip first 0
        buggyFibGen.next(); // Skip 1, but actually use 1 as radius
        let buggyRadius = 10; // Incorrect base case
        buggyCtx.moveTo(buggyRadius, 0);
        for (let i = 0; i < 10; i++) {
            const fibNum = buggyFibGen.next().value;
            buggyRadius += fibNum;
            buggyCtx.lineTo(buggyRadius, 0);
            buggyCtx.rotate(Math.PI / 2);
        }
        buggyCtx.stroke();

        // Draw corrected Fibonacci spiral
        drawFibonacciSpiral(correctedCtx, correctedCanvas.width, correctedCanvas.height, 16);
    </script>
</body>
</html>
