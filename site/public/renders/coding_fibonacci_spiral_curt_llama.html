<!DOCTYPE html>
<html>
<head>
    <title>Debugging Fibonacci Spiral</title>
    <style>
        /* Add some basic styling to our canvas */
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Buggy Fibonacci Spiral (Incorrect Base Cases)</h1>
    <canvas id="buggy-canvas" width="400" height="400"></canvas>

    <h1>Corrected Fibonacci Spiral</h1>
    <canvas id="corrected-canvas" width="400" height="400"></canvas>

    <script>
        // Function to generate Fibonacci sequence
        function* fibonacci() {
            let a = 0;
            let b = 1;
            yield a;
            yield b;
            while (true) {
                [a, b] = [b, a + b];
                yield b;
            }
        }

        // Function to draw a Fibonacci spiral on a canvas
        function drawFibonacciSpiral(ctx, canvasWidth, canvasHeight, numPoints) {
            const fibGen = fibonacci();
            let angle = 0;
            let radius = 0;

            // Move to the starting point
            ctx.beginPath();
            ctx.moveTo(canvasWidth / 2, canvasHeight / 2);

            for (let i = 0; i < numPoints; i++) {
                radius = fibGen.next().value;
                ctx.arc(canvasWidth / 2, canvasHeight / 2, radius, angle, angle + Math.PI / 2);
                angle += Math.PI / 2;
            }

            ctx.stroke();
        }

        // Get the canvas elements
        const buggyCanvas = document.getElementById('buggy-canvas');
        const correctedCanvas = document.getElementById('corrected-canvas');

        // Get the 2D drawing contexts
        const buggyCtx = buggyCanvas.getContext('2d');
        const correctedCtx = correctedCanvas.getContext('2d');

        // Draw the buggy Fibonacci spiral with incorrect base cases
        buggyCtx.strokeStyle = 'red';
        buggyCtx.lineWidth = 2;
        // Incorrect base cases: start with 1 and 2 instead of 0 and 1
        function* buggyFibonacci() {
            let a = 1;
            let b = 2;
            yield a;
            yield b;
            while (true) {
                [a, b] = [b, a + b];
                yield b;
            }
        }
        function drawBuggyFibonacciSpiral(ctx, canvasWidth, canvasHeight, numPoints) {
            const fibGen = buggyFibonacci();
            let angle = 0;
            let radius = 0;

            // Move to the starting point
            ctx.beginPath();
            ctx.moveTo(canvasWidth / 2, canvasHeight / 2);

            for (let i = 0; i < numPoints; i++) {
                radius = fibGen.next().value;
                ctx.arc(canvasWidth / 2, canvasHeight / 2, radius, angle, angle + Math.PI / 2);
                angle += Math.PI / 2;
            }

            ctx.stroke();
        }
        drawBuggyFibonacciSpiral(buggyCtx, buggyCanvas.width, buggyCanvas.height, 10);

        // Draw the corrected Fibonacci spiral
        correctedCtx.strokeStyle = 'blue';
        correctedCtx.lineWidth = 2;
        drawFibonacciSpiral(correctedCtx, correctedCanvas.width, correctedCanvas.height, 10);
    </script>
</body>
</html>
