<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Table</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        #csv-data {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<textarea id="csv-data" placeholder="Paste CSV data here..."></textarea>
<button onclick="parseCSV()">Parse CSV</button>
<div id="table-container"></div>

<script>
    function parseCSV() {
        const csvData = document.getElementById('csv-data').value;
        const rows = csvData.trim().split('\n');
        const tableData = [];

        rows.forEach(row => {
            if (row.trim() !== '') {
                tableData.push(parseRow(row));
            }
        });

        renderTable(tableData);
    }

    function parseRow(row) {
        const regex = /("([^"]|"")*"|[^,]*)(,|$)/g;
        let match;
        const result = [];

        while ((match = regex.exec(row)) !== null) {
            let value = match[1].trim();
            if (value.startsWith('"') && value.endsWith('"')) {
                value = value.slice(1, -1).replace(/""/g, '"');
            }
            result.push(value);
        }

        return result;
    }

    function renderTable(tableData) {
        if (tableData.length === 0) return;

        const maxColumns = Math.max(...tableData.map(row => row.length));
        const tableRows = [];

        tableData.forEach(row => {
            // Normalize row length
            while (row.length < maxColumns) {
                row.push('');
            }
            tableRows.push(row);
        });

        const tableContainer = document.getElementById('table-container');
        tableContainer.innerHTML = '';

        const table = document.createElement('table');
        tableRows.forEach((row, rowIndex) => {
            const tr = document.createElement('tr');
            row.forEach((cell, cellIndex) => {
                const cellElement = document.createElement(rowIndex === 0 ? 'th' : 'td');
                cellElement.textContent = cell;
                tr.appendChild(cellElement);
            });
            table.appendChild(tr);
        });
        tableContainer.appendChild(table);
    }
</script>

</body>
</html>
