<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to HTML Table Parser</title>
    <style>
        /* Style for the table */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        
        th, td {
            border: 1px solid black; /* Clear borders */
            padding: 8px;
            text-align: left;
        }
        
        tr:nth-child(even) {
            background-color: #f2f2f2; /* Alternating row colors */
        }
        
        /* Style for the textarea and button */
        textarea {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>CSV to HTML Table Parser</h1>
    <p>Paste your CSV data into the textarea below and click the button to parse it into a table.</p>
    
    <textarea id="csvInput" placeholder='Example:
Name,Age,"City, State"
Alice,30,"New York, NY"
Bob,25,"San Francisco, CA"
Charlie,35,"Boston, MA with ""quotes"""'></textarea>
    
    <button id="parseButton">Parse CSV</button>
    
    <div id="output"></div>
    
    <script>
        // Function to escape HTML characters to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Function to parse a single CSV line
        function parseCSVLine(line) {
            const fields = [];
            let field = '';
            let inQuotes = false;
            let i = 0;
            
            while (i < line.length) {
                let char = line[i];
                
                if (char === '"') {
                    i++;  // Skip the quote
                    if (inQuotes && i < line.length && line[i] === '"') {
                        // Escaped quote (e.g., "")
                        field += '"';
                        i++;  // Skip the next quote
                    } else if (!inQuotes) {
                        inQuotes = true;  // Start of quoted field
                    } else {
                        inQuotes = false;  // End of quoted field
                    }
                } else if (char === ',' && !inQuotes) {
                    // End of field
                    fields.push(field);
                    field = '';
                    i++;
                } else {
                    field += char;
                    i++;
                }
            }
            
            if (field !== '') {
                fields.push(field);  // Add the last field
            }
            
            return fields;
        }
        
        // Event listener for the button
        document.getElementById('parseButton').addEventListener('click', function() {
            const csvText = document.getElementById('csvInput').value.trim();
            const lines = csvText.split('\n');  // Split into rows
            let tableHtml = '<table><tbody>';  // Start of table
            
            lines.forEach((line) => {
                const fields = parseCSVLine(line.trim());  // Parse each line
                tableHtml += '<tr>';  // Start of row
                fields.forEach((field) => {
                    tableHtml += '<td>' + escapeHtml(field) + '</td>';  // Add each field as a cell
                });
                tableHtml += '</tr>';  // End of row
            });
            
            tableHtml += '</tbody></table>';  // End of table
            document.getElementById('output').innerHTML = tableHtml;  // Display the table
        });
    </script>
</body>
</html>
