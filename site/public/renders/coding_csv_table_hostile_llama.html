<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Parser</title>
<style>
  body { font-family: Arial, sans-serif; }
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
  }
  th {
    background-color: #f0f0f0;
  }
  tr:nth-child(even) {
    background-color: #f9f9f9;
  }
  #textarea-container {
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div id="textarea-container">
  <textarea id="csvInput" rows="10" cols="50"></textarea>
  <button onclick="parseCSV()">Parse</button>
</div>
<div id="table-container"></div>

<script>
function parseCSV() {
  const csvInput = document.getElementById('csvInput').value;
  const rows = csvInput.trim().split('\n');
  const tableContainer = document.getElementById('table-container');
  tableContainer.innerHTML = ''; // Clear previous results

  if (!csvInput) return; // Exit if input is empty

  const table = document.createElement('table');
  tableContainer.appendChild(table);

  let headers = null;
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i].trim();
    if (!row) continue; // Skip empty lines

    const cells = parseRow(row);
    if (!headers) {
      headers = cells;
      const thead = document.createElement('thead');
      const tr = document.createElement('tr');
      thead.appendChild(tr);
      table.appendChild(thead);
      cells.forEach(cell => {
        const th = document.createElement('th');
        th.textContent = cell;
        tr.appendChild(th);
      });
    } else {
      const tbody = table.querySelector('tbody');
      if (!tbody) {
        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        table.insertBefore(tbody, table.querySelector('thead'));
      }
      const tr = document.createElement('tr');
      tbody.appendChild(tr);
      cells.forEach(cell => {
        const td = document.createElement('td');
        td.textContent = cell;
        tr.appendChild(td);
      });
    }
  }
}

function parseRow(row) {
  const escaped = row.match(/"((?:\\.|[^"])*)"/g);
  let offset = 0;
  const cells = [];

  while (offset < row.length) {
    if (row[offset] === '"') {
      const match = row.substring(offset).match(/^"((?:\\.|[^"])*)"(,|$)/);
      if (match) {
        cells.push(unescape(match[1].replace(/\\(.)/g, '$1')));
        offset += match[0].length;
      } else {
        throw new Error('Malformed CSV');
      }
    } else {
      const cellMatch = row.substring(offset).match(/^[^,]*($|,)/);
      cells.push(cellMatch[0].replace(/,$/, ''));
      offset += cellMatch[0].length;
    }
  }

  return cells;
}

function unescape(str) {
  return str.replace(/\\(.)/g, '$1');
}
</script>

</body>
</html>
