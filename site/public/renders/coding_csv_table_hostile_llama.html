<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Parser</title>
<style>
  body { font-family: Arial, sans-serif; }
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
  }
  th {
    background-color: #f0f0f0;
  }
  tr:nth-child(even) {
    background-color: #f9f9f9;
  }
  textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
  }
</style>
</head>
<body>

<textarea id="csvInput" placeholder="Enter your CSV data here..."></textarea>
<button id="parseBtn">Parse CSV</button>
<div id="output"></div>

<script>
  function parseCSV(csvText) {
    const csvRows = csvText.trim().split('\n');
    const parsedData = [];
    for (let row of csvRows) {
      if (row.trim() === '') continue; // Skip empty lines
      parsedData.push(parseRow(row));
    }
    return parsedData;
  }

  function parseRow(row) {
    const quoted = row.includes('"');
    if (!quoted) {
      return row.split(',').map(item => item.trim());
    }

    const result = [];
    let currentItem = '';
    let inQuote = false;
    let escaped = false;

    for (let i = 0; i < row.length; i++) {
      let char = row[i];

      if (escaped) {
        currentItem += char;
        escaped = false;
      } else if (char === '\\') {
        escaped = true;
      } else if (char === '"') {
        inQuote = !inQuote;
      } else if (!inQuote && char === ',') {
        result.push(currentItem.trim());
        currentItem = '';
      } else {
        currentItem += char;
      }
    }

    if (currentItem || row.endsWith(',')) {
      result.push(currentItem.trim());
    }

    return result;
  }

  document.getElementById('parseBtn').addEventListener('click', function() {
    const csvInput = document.getElementById('csvInput').value;
    const parsedData = parseCSV(csvInput);

    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = '';

    if (parsedData.length === 0) return;

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const tbody = document.createElement('tbody');

    table.appendChild(thead);
    table.appendChild(tbody);

    if (parsedData[0].length > 0) {
      const headerRow = document.createElement('tr');
      parsedData[0].forEach(headerText => {
        const th = document.createElement('th');
        th.textContent = headerText;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
    }

    parsedData.slice(1).forEach(rowData => {
      const row = document.createElement('tr');
      rowData.forEach(data => {
        const cell = document.createElement('td');
        cell.textContent = data;
        row.appendChild(cell);
      });
      tbody.appendChild(row);
    });

    outputDiv.appendChild(table);
  });
</script>

</body>
</html>
