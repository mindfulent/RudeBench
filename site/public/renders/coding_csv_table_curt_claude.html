<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Table Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #e94560;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        header p {
            margin-top: 8px;
            color: #a0aec0;
            font-size: 0.95rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .input-section label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #a0aec0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.88rem;
            padding: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
        }

        textarea::placeholder {
            color: #4a5568;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .delimiter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delimiter-group label {
            font-size: 0.85rem;
            color: #a0aec0;
            margin-bottom: 0;
            text-transform: none;
            letter-spacing: 0;
        }

        .delimiter-group select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .delimiter-group select:focus {
            border-color: #e94560;
        }

        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #a0aec0;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #e0e0e0;
        }

        .btn-load {
            background: rgba(52, 152, 219, 0.2);
            color: #5dade2;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .btn-load:hover {
            background: rgba(52, 152, 219, 0.3);
        }

        .output-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 25px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .output-section.visible {
            display: block;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .output-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e0e0e0;
        }

        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem;
            color: #e94560;
            font-weight: 600;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            min-width: 400px;
        }

        thead tr {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.25), rgba(192, 57, 43, 0.2));
        }

        thead th {
            padding: 13px 16px;
            text-align: left;
            font-weight: 700;
            color: #f0a0ae;
            border-bottom: 2px solid rgba(233, 69, 96, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.07);
            white-space: nowrap;
            letter-spacing: 0.3px;
            position: relative;
        }

        thead th:last-child {
            border-right: none;
        }

        thead th .col-index {
            display: inline-block;
            background: rgba(233, 69, 96, 0.3);
            color: #e94560;
            font-size: 0.7rem;
            border-radius: 4px;
            padding: 1px 5px;
            margin-right: 6px;
            font-weight: 600;
        }

        tbody tr:nth-child(odd) {
            background: rgba(255, 255, 255, 0.03);
        }

        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.07);
        }

        tbody tr:hover {
            background: rgba(233, 69, 96, 0.1);
            transition: background 0.2s;
        }

        tbody td {
            padding: 11px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            color: #cbd5e0;
            vertical-align: top;
            word-break: break-word;
            max-width: 300px;
        }

        tbody td:last-child {
            border-right: none;
        }

        tbody td.empty-cell {
            color: #4a5568;
            font-style: italic;
            font-size: 0.8rem;
        }

        tbody td.extra-cell {
            background: rgba(255, 193, 7, 0.05);
            border-left: 2px solid rgba(255, 193, 7, 0.3);
        }

        tbody td.missing-cell {
            background: rgba(108, 117, 125, 0.05);
            color: #4a5568;
            font-style: italic;
            font-size: 0.8rem;
        }

        .error-box {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            padding: 15px 20px;
            color: #e94560;
            font-size: 0.9rem;
            display: none;
            margin-top: 15px;
        }

        .error-box.visible {
            display: block;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            color: #718096;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-dot.extra {
            background: rgba(255, 193, 7, 0.3);
            border: 1px solid rgba(255, 193, 7, 0.5);
        }

        .legend-dot.missing {
            background: rgba(108, 117, 125, 0.2);
            border: 1px solid rgba(108, 117, 125, 0.4);
        }

        .legend-dot.empty {
            background: transparent;
            border: 1px solid #4a5568;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            .controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .output-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CSV → Table Converter</h1>
            <p>Paste your CSV data below, then click Parse to render it as a styled table</p>
        </header>

        <div class="input-section">
            <label>CSV Input</label>
            <textarea id="csvInput" placeholder='Paste CSV data here...&#10;&#10;Example:&#10;Name, Age, "City, State", Notes&#10;"Alice ""The Great""", 30, "New York, NY", "Loves coding"&#10;Bob, 25, "Los Angeles, CA", ""&#10;Charlie, 35, "Chicago, IL"'></textarea>

            <div class="controls">
                <button class="btn btn-primary" onclick="parseCSV()">⚡ Parse CSV</button>
                <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
                <button class="btn btn-load" onclick="loadSample()">↓ Load Sample</button>
                <div class="delimiter-group">
                    <label>Delimiter:</label>
                    <select id="delimiter">
                        <option value=",">Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="	">Tab (\t)</option>
                        <option value="|">Pipe (|)</option>
                    </select>
                </div>
            </div>

            <div class="error-box" id="errorBox"></div>
        </div>

        <div class="output-section" id="outputSection">
            <div class="output-header">
                <h2>📊 Parsed Table</h2>
                <div class="stats" id="statsBar"></div>
            </div>
            <div class="table-wrapper">
                <table id="outputTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="legend" id="legend"></div>
        </div>
    </div>

    <script>
        // ─── CSV Parser ───────────────────────────────────────────────────────────
        function parseCSVData(text, delimiter) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            let i = 0;

            // Normalize line endings
            text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            while (i < text.length) {
                const ch = text[i];
                const next = text[i + 1];

                if (inQuotes) {
                    if (ch === '"') {
                        // Escaped quote: "" → "
                        if (next === '"') {
                            field += '"';
                            i += 2;
                            continue;
                        }
                        // Closing quote
                        inQuotes = false;
                        i++;
                        continue;
                    }
                    field += ch;
                    i++;
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                        i++;
                        continue;
                    }

                    if (ch === delimiter || (delimiter === '\t' && ch === '\t')) {
                        row.push(field);
                        field = '';
                        i++;
                        continue;
                    }

                    if (ch === '\n') {
                        row.push(field);
                        field = '';
                        // Skip empty trailing newlines only at end
                        rows.push(row);
                        row = [];
                        i++;
                        continue;
                    }

                    field += ch;
                    i++;
                }
            }

            // Last field / row
            if (field !== '' || row.length > 0) {
                row.push(field);
                rows.push(row);
            }

            // Remove completely empty trailing rows
            while (rows.length > 0 && rows[rows.length - 1].every(c => c.trim() === '')) {
                rows.pop();
            }

            return rows;
        }

        // ─── Main Parse & Render ─────────────────────────────────────────────────
        function parseCSV() {
            const raw = document.getElementById('csvInput').value;
            const delimiterSelect = document.getElementById('delimiter');
            const delimiter = delimiterSelect.value;

            const errorBox = document.getElementById('errorBox');
            errorBox.classList.remove('visible');

            if (!raw.trim()) {
                showError('Please paste some CSV data before parsing.');
                return;
            }

            let rows;
            try {
                rows = parseCSVData(raw, delimiter);
            } catch (e) {
                showError('Parsing error: ' + e.message);
                return;
            }

            if (rows.length === 0) {
                showError('No data found after parsing. Please check your input.');
                return;
            }

            // Determine max column count
            const maxCols = Math.max(...rows.map(r => r.length));

            const headerRow = rows[0];
            const dataRows = rows.slice(1);

            // Build header
            const thead = document.getElementById('tableHead');
            thead.innerHTML = '';
            const tr = document.createElement('tr');
            for (let c = 0; c < maxCols; c++) {
                const th = document.createElement('th');
                const indexSpan = document.createElement('span');
                indexSpan.className = 'col-index';
                indexSpan.textContent = c + 1;
                th.appendChild(indexSpan);

                const label = (headerRow[c] !== undefined && headerRow[c].trim() !== '')
                    ? headerRow[c]
                    : `Column ${c + 1}`;
                th.appendChild(document.createTextNode(label));
                tr.appendChild(th);
            }
            thead.appendChild(tr);

            // Build body
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let hasExtra = false;
            let hasMissing = false;

            dataRows.forEach((rowData, rowIdx) => {
                const tr = document.createElement('tr');
                for (let c = 0; c < maxCols; c++) {
                    const td = document.createElement('td');

                    if (c >= rowData.length) {
                        // Missing cell
                        td.textContent = '—';
                        td.classList.add('missing-cell');
                        hasMissing = true;
                    } else {
                        const value = rowData[c];
                        if (value === '') {
                            td.textContent = '(empty)';
                            td.classList.add('empty-cell');
                        } else {
                            td.textContent = value;
                        }

                        // Extra cell (beyond header column count)
                        if (c >= headerRow.length) {
                            td.classList.add('extra-cell');
                            hasExtra = true;
                        }
                    }

                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });

            // Stats
            const statsBar = document.getElementById('statsBar');
            statsBar.innerHTML = `
                <span class="stat-badge">Rows: ${dataRows.length}</span>
                <span class="stat-badge">Columns: ${maxCols}</span>
                <span class="stat-badge">Total Cells: ${dataRows.length * maxCols}</span>
            `;

            // Legend
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            const legendItems = [];
            if (hasExtra) {
                legendItems.push({ cls: 'extra', label: 'Extra column (beyond header)' });
            }
            if (hasMissing) {
                legendItems.push({ cls: 'missing', label: 'Missing value (row has fewer columns)' });
            }
            legendItems.push({ cls: 'empty', label: 'Empty string field' });

            legendItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'legend-item';
                div.innerHTML = `<span class="legend-dot ${item.cls}"></span>${item.label}`;
                legend.appendChild(div);
            });

            // Show output
            const outputSection = document.getElementById('outputSection');
            outputSection.classList.add('visible');
            outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ─── Helpers ─────────────────────────────────────────────────────────────
        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '⚠ ' + msg;
            errorBox.classList.add('visible');
            document.getElementById('outputSection').classList.remove('visible');
        }

        function clearAll() {
            document.getElementById('csvInput').value = '';
            document.getElementById('outputSection').classList.remove('visible');
            document.getElementById('errorBox').classList.remove('visible');
        }

        function loadSample() {
            const sample = `Name,Age,"City, State",Occupation,Notes
"Alice ""The Great""",30,"New York, NY",Engineer,"Loves coding, coffee"
Bob,25,"Los Angeles, CA",Designer,""
Charlie,35,"Chicago, IL",Manager,"Works remotely"
"Diana, PhD",28,"Austin, TX",Researcher,"Published ""3 papers"""
Eve,22,"Seattle, WA",Student
Frank,40,"Boston, MA",Director,"Joined in ""2010""","Extra column data"`;
            document.getElementById('csvInput').value = sample;
            document.getElementById('errorBox').classList.remove('visible');
        }

        // Allow Tab key in textarea
        document.getElementById('csvInput').addEventListener('keydown', function (e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '\t' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 1;
            }
        });

        // Parse on Ctrl+Enter
        document.getElementById('csvInput').addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                parseCSV();
            }
        });
    </script>
</body>
</html>
