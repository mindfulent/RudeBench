<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Table Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        header h1 span {
            color: #4fc3f7;
        }

        header p {
            margin-top: 8px;
            color: #90a4ae;
            font-size: 0.95rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 28px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #4fc3f7;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #4fc3f7;
            border-radius: 2px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.88rem;
            line-height: 1.6;
            padding: 14px 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15);
        }

        textarea::placeholder {
            color: #546e7a;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 28px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 195, 247, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #90a4ae;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #e0e0e0;
        }

        .delimiter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .delimiter-group label {
            font-size: 0.85rem;
            color: #90a4ae;
        }

        .delimiter-group select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 7px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .delimiter-group select:focus {
            border-color: #4fc3f7;
        }

        .delimiter-group select option {
            background: #1a1a2e;
        }

        .options-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            color: #90a4ae;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4fc3f7;
            cursor: pointer;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
        }

        .status-bar.success {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #81c784;
            display: flex;
        }

        .status-bar.error {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #e57373;
            display: flex;
        }

        .status-bar.warning {
            background: rgba(255, 193, 7, 0.12);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffd54f;
            display: flex;
        }

        .output-card {
            display: none;
        }

        .output-card.visible {
            display: block;
        }

        .table-meta {
            display: flex;
