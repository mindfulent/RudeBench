<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Search Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 32px;
    }

    label {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-right: 4px;
    }

    input[type="number"] {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 1rem;
      width: 100px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #38bdf8;
    }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #stepBtn {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
    }

    #stepBtn:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    #stepBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    #resetBtn {
      background: #334155;
      color: #e2e8f0;
    }

    #resetBtn:hover {
      background: #475569;
      transform: translateY(-1px);
    }

    /* Array display */
    .array-wrapper {
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 28px;
    }

    .array-row {
      display: flex;
      gap: 8px;
      min-width: max-content;
      padding: 8px 4px;
    }

    .box-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .box {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid transparent;
      transition: all 0.35s ease;
      position: relative;
      background: #0f172a;
      color: #94a3b8;
      border-color: #334155;
    }

    .box.in-range {
      background: #1e3a5f;
      color: #93c5fd;
      border-color: #3b82f6;
    }

    .box.mid {
      background: #f59e0b;
      color: #0f172a;
      border-color: #fbbf24;
      transform: scale(1.12);
      box-shadow: 0 0 18px rgba(245, 158, 11, 0.6);
    }

    .box.found {
      background: #22c55e;
      color: #0f172a;
      border-color: #4ade80;
      transform: scale(1.15);
      box-shadow: 0 0 22px rgba(34, 197, 94, 0.7);
    }

    .box.not-found-range {
      background: #450a0a;
      color: #fca5a5;
      border-color: #ef4444;
    }

    .index-label {
      font-size: 0.7rem;
      color: #64748b;
    }

    .pointer-label {
      font-size: 0.68rem;
      font-weight: 700;
      min-height: 16px;
      text-align: center;
      line-height: 1;
    }

    .ptr-low  { color: #34d399; }
    .ptr-mid  { color: #fbbf24; }
    .ptr-high { color: #f87171; }

    /* Info panel */
    .info-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .info-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
    }

    .info-box .info-label {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .info-box .info-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .info-box.low-box  .info-value { color: #34d399; }
    .info-box.mid-box  .info-value { color: #fbbf24; }
    .info-box.high-box .info-value { color: #f87171; }
    .info-box.step-box .info-value { color: #818cf8; }

    /* Log */
    .log-title {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .log {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 16px;
      min-height: 56px;
      max-height: 160px;
      overflow-y: auto;
      font-size: 0.88rem;
      line-height: 1.7;
    }
