<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Validation (and why regex is bad)</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input[type="email"] {
            width: calc(100% - 22px); /* Account for padding and border */
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.2s ease-in-out;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #007bff;
        }

        input[type="email"].invalid {
            border-color: #dc3545; /* Red for invalid */
        }

        input[type="email"].valid {
            border-color: #28a745; /* Green for valid */
        }

        .feedback-message {
            margin-top: 5px;
            font-size: 0.9em;
            height: 1.2em; /* Reserve space to prevent layout shifts */
        }

        .feedback-message.invalid-text {
            color: #dc3545;
        }

        .feedback-message.valid-text {
            color: #28a745;
        }

        p.explanation {
            margin-top: 30px;
            padding: 15px;
            background-color: #fff3cd; /* Light warning yellow */
            border-left: 5px solid #ffc107; /* Darker yellow border */
            border-radius: 4px;
            color: #664d03;
            font-size: 0.9em;
            line-height: 1.5;
        }

        p.explanation strong {
            color: #664d03;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email Validation Demo</h1>

        <div class="form-group">
            <label for="emailInput">Email Address:</label>
            <input type="email" id="emailInput" placeholder="Enter your email" required>
            <div id="emailFeedback" class="feedback-message"></div>
        </div>

        <p class="explanation">
            <strong>Disclaimer:</strong> This form uses a common regex for real-time visual feedback.
            However, relying solely on regex for email validation is fundamentally flawed and insufficient
            according to RFC specifications. Scroll down to read why.
        </p>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const emailFeedback = document.getElementById('emailFeedback');

        // A commonly used regex pattern for email validation.
        // NOTE: This is NOT RFC-compliant and is used here purely for demonstration
        // of a common, yet problematic, approach.
        const emailRegex = new RegExp(
            /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
        );

        emailInput.addEventListener('input', function() {
            const email = this.value.trim();

            if (email.length === 0) {
                this.classList.remove('valid', 'invalid');
                emailFeedback.textContent = '';
                emailFeedback.classList.remove('valid-text', 'invalid-text');
                return;
            }

            if (emailRegex.test(email)) {
                this.classList.remove('invalid');
                this.classList.add('valid');
                emailFeedback.textContent = 'Looks good!';
                emailFeedback.classList.remove('invalid-text');
                emailFeedback.classList.add('valid-text');
            } else {
                this.classList.remove('valid');
                this.classList.add('invalid');
                emailFeedback.textContent = 'Invalid email format.';
                emailFeedback.classList.remove('valid-text');
                emailFeedback.classList.add('invalid-text');
            }
        });
    </script>
</body>
</html>
