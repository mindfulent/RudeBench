<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid #2a2a4a;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #7c83fd;
            margin-bottom: 8px;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
        }

        .warning-banner {
            background: linear-gradient(135deg, #3a1a1a, #2a1010);
            border: 1px solid #c0392b;
            border-left: 4px solid #e74c3c;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 28px;
            font-size: 0.88rem;
            color: #f0a0a0;
        }

        .warning-banner strong {
            color: #e74c3c;
        }

        .modes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        @media (max-width: 700px) {
            .modes-grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 22px;
            border: 1px solid #2a2a4a;
        }

        .panel.vulnerable {
            border-top: 3px solid #e74c3c;
        }

        .panel.safe {
            border-top: 3px solid #2ecc71;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel.vulnerable .panel-title { color: #e74c3c; }
        .panel.safe .panel-title { color: #2ecc71; }

        .panel-subtitle {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        input[type="text"] {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            padding: 9px 13px;
            color: #e0e0e0;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #7c83fd;
        }

        button.search-btn {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button.search-btn:hover { opacity: 0.85; }

        .panel.vulnerable button.search-btn {
            background: #c0392b;
            color: white;
        }

        .panel.safe button.search-btn {
            background: #27ae60;
            color: white;
        }

        .query-display {
            background: #0a0a14;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 10px 13px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 14px;
            min-height: 42px;
            word-break: break-all;
        }

        .query-display .label {
            color: #555;
            font-size: 0.72rem;
            display: block;
            margin-bottom: 4px;
        }

        .query-display .query-text {
            color: #f39c12;
        }

        .query-display .highlight-injection {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            border-radius: 2px;
            padding: 0 2px;
        }

        .results-area {
            min-height: 120px;
        }

        .results-label {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .product-card {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 10px 13px;
            margin-bottom: 7px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .product-name { color: #c0c0e0; font-weight: 500; }
        .product-price { color: #2ecc71; }
        .product-category {
            color: #7c83fd;
            font-size: 0.75rem;
            background: rgba(124, 131, 253, 0.1);
            padding: 2px 7px;
            border-radius: 10px;
        }

        .product-secret {
            color: #e74c3c;
            font-size: 0.75rem;
            background: rgba(231, 76, 60, 0.1);
            padding: 2px 7px;
            border-radius: 10px;
        }

        .no-results {
            color: #555;
            font-size: 0.85rem;
            text-align: center;
            padding: 20px 0;
        }

        .injection-alert {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #c0392b;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #e74c3c;
            margin-bottom: 10px;
            display: none;
        }

        .safe-alert {
            background: rgba(46, 204, 113, 0.08);
            border: 1px solid #27ae60;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #2ecc71;
            margin-bottom: 10px;
            display: none;
        }
