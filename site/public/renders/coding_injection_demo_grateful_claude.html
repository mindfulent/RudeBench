<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Educational Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 12px;
            border: 1px solid #2a2a4a;
        }

        .header h1 {
            font-size: 2rem;
            color: #7eb8f7;
            margin-bottom: 10px;
        }

        .header p {
            color: #9090b0;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .warning-banner {
            background: linear-gradient(135deg, #2a1a00, #3a2000);
            border: 1px solid #f0a500;
            border-left: 4px solid #f0a500;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .warning-banner .icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .warning-banner p {
            color: #f0c060;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .warning-banner strong {
            color: #f0a500;
        }

        .database-section {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .database-section h2 {
            color: #7eb8f7;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .db-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .db-table th {
            background: #252545;
            color: #7eb8f7;
            padding: 10px 12px;
            text-align: left;
            border: 1px solid #3a3a5a;
        }

        .db-table td {
            padding: 9px 12px;
            border: 1px solid #2a2a4a;
            color: #c0c0d8;
        }

        .db-table tr:nth-child(even) td {
            background: #1e1e38;
        }

        .db-table tr:hover td {
            background: #252548;
        }

        .secret-row td {
            color: #ff6b6b !important;
        }

        .secret-badge {
            background: #3a0000;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.75rem;
            margin-left: 6px;
        }

        .panels-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 900px) {
            .panels-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header.vulnerable {
            background: linear-gradient(135deg, #2a0f0f, #3a1515);
            border-bottom: 2px solid #cc3333;
        }

        .panel-header.safe {
            background: linear-gradient(135deg, #0f2a0f, #153a15);
            border-bottom: 2px solid #33cc55;
        }

        .panel-header h2 {
            font-size: 1rem;
            flex: 1;
        }

        .panel-header.vulnerable h2 {
            color: #ff6b6b;
        }

        .panel-header.safe h2 {
            color: #6bff8a;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-badge.danger {
            background: #3a0000;
            color: #ff6b6b;
            border: 1px solid #cc3333;
        }

        .status-badge.safe {
            background: #003a10;
            color: #6bff8a;
            border: 1px solid #33cc55;
        }

        .panel-body {
            padding: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #9090b0;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .search-input {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #7eb8f7;
        }

        .search-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .search-btn.vulnerable {
            background: linear-gradient(135deg, #cc3333, #aa2222);
            color: white;
        }

        .search-btn.safe {
            background: linear-gradient(135deg, #33aa55, #228844);
            color: white;
        }

        .search-btn:hover {
            opacity: 0.88;
        }
