<!DOCTYPE html>
<html>
<head>
  <title>Shared State Concurrency Bug</title>
  <style>
    .progress-bar {
      width: 200px;
      height: 20px;
      border: 1px solid black;
      background-color: #ccc;
    }
    .progress-bar .fill {
      height: 20px;
      background-color: blue;
    }
  </style>
</head>
<body>
  <h1>Buggy Version</h1>
  <div id="buggy-progress-bar" class="progress-bar">
    <div id="buggy-progress-bar-fill" class="fill" style="width: 0%"></div>
  </div>
  <button id="buggy-start-button">Start</button>

  <h1>Fixed Version</h1>
  <div id="fixed-progress-bar" class="progress-bar">
    <div id="fixed-progress-bar-fill" class="fill" style="width: 0%"></div>
  </div>
  <button id="fixed-start-button">Start</button>

  <script>
    // Buggy Version
    let buggyProgress = 0;
    document.getElementById('buggy-start-button').addEventListener('click', () => {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          buggyProgress += 10;
          document.getElementById('buggy-progress-bar-fill').style.width = `${buggyProgress}%`;
        }, 100 * i);
      }
    });

    // Fixed Version
    let fixedProgress = 0;
    document.getElementById('fixed-start-button').addEventListener('click', () => {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          fixedProgress = Math.min(fixedProgress + 10, 100); // ensure progress doesn't exceed 100
          document.getElementById('fixed-progress-bar-fill').style.width = `${fixedProgress}%`;
        }, 100 * i);
      }
    });
  </script>
</body>
</html>
