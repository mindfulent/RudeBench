<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Parser</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      padding: 2rem;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 2rem;
      color: #2b6cb0;
      letter-spacing: 0.5px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto 2rem auto;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #4a5568;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 0.85rem 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.2s;
      color: #2d3748;
      background: #f7fafc;
    }

    textarea:focus {
      outline: none;
      border-color: #4299e1;
      background: #fff;
    }

    .button-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.65rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    #parseBtn {
      background: #4299e1;
      color: #fff;
    }

    #parseBtn:hover {
      background: #2b6cb0;
    }

    #clearBtn {
      background: #e2e8f0;
      color: #4a5568;
    }

    #clearBtn:hover {
      background: #cbd5e0;
    }

    #sampleBtn {
      background: #68d391;
      color: #1a202c;
    }

    #sampleBtn:hover {
      background: #48bb78;
    }

    .error-box {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.9rem;
      display: none;
    }

    .info-bar {
      display: none;
      margin-top: 1rem;
      font-size: 0.88rem;
      color: #718096;
    }

    .info-bar span {
      font-weight: 600;
      color: #4299e1;
    }

    /* Table section */
    .table-card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      display: none;
      overflow-x: auto;
    }

    .table-card h2 {
      font-size: 1.2rem;
      color: #2b6cb0;
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr {
      background: #2b6cb0;
      color: #ffffff;
    }

    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 700;
      border: 1px solid #2c5282;
      white-space: nowrap;
    }

    tbody tr:nth-child(odd) {
      background: #ebf8ff;
    }

    tbody tr:nth-child(even) {
      background: #ffffff;
    }

    tbody tr:hover {
      background: #bee3f8;
      transition: background 0.15s;
    }

    tbody td {
      padding: 0.65rem 1rem;
      border: 1px solid #bee3f8;
      vertical-align: top;
      word-break: break-word;
      max-width: 300px;
    }

    .cell-empty {
      color: #a0aec0;
      font-style: italic;
      font-size: 0.8rem;
    }

    .row-num {
      color: #a0aec0;
      font-size: 0.78rem;
      text-align: center !important;
      user-select: none;
      white-space: nowrap;
    }

    thead th.row-num-header {
      background: #1a4a7a;
      color: #90cdf4;
      font-size: 0.78rem;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .card, .table-card { padding: 1.25rem; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <h1>📊 CSV Parser</h1>

  <div class="card">
    <label for="csvInput">Paste your CSV data below:</label>
    <textarea id="csvInput" placeholder='e.g.
Name,Age,City
"Smith, John",30,"New York"
"Jane ""JJ"" Doe",25,London
Alice,,Paris'></textarea>

    <div class="button-row">
      <button id="parseBtn">▶ Parse CSV</button>
      <button id="sampleBtn">📋 Load Sample</button>
      <button id="clearBtn">✕ Clear</button>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div class="info-bar" id="infoBar"></div>
  </div>

  <div class="table-card" id="tableCard">
    <h2 id="tableTitle">Parsed Table</h2>
    <div id="tableWrapper"></div>
  </div>

  <script>
