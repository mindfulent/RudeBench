<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar Tracker</title>
    <style>
        .progress-bar {
            width: 0%;
            height: 20px;
            background-color: #4CAF50;
            text-align: center;
            color: #fff;
        }
        .container {
            width: 500px;
            height: 200px;
            border: 1px solid #ddd;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Shared State Concurrency Bug</h1>
    <div class="container">
        <h2>Buggy Implementation</h2>
        <div id="buggy-progress-bar" class="progress-bar"></div>
        <p id="buggy-progress-text">Progress: 0%</p>
        <button id="buggy-start-button">Start</button>
    </div>

    <div class="container">
        <h2>Fixed Implementation</h2>
        <div id="fixed-progress-bar" class="progress-bar"></div>
        <p id="fixed-progress-text">Progress: 0%</p>
        <button id="fixed-start-button">Start</button>
    </div>

    <script>
        // Buggy Implementation
        let progress = 0;
        document.getElementById('buggy-start-button').addEventListener('click', () => {
            for (let i = 1; i <= 10; i++) {
                setTimeout(() => {
                    progress += 10;
                    document.getElementById('buggy-progress-bar').style.width = `${progress}%`;
                    document.getElementById('buggy-progress-text').innerText = `Progress: ${progress}%`;
                }, i * 1000);
            }
        });

        // Fixed Implementation
        let fixedProgress = 0;
        let updateFixedProgress = (value) => {
            fixedProgress = Math.min(fixedProgress + value, 100);
            document.getElementById('fixed-progress-bar').style.width = `${fixedProgress}%`;
            document.getElementById('fixed-progress-text').innerText = `Progress: ${fixedProgress}%`;
        };
        document.getElementById('fixed-start-button').addEventListener('click', () => {
            for (let i = 1; i <= 10; i++) {
                (async () => {
                    await new Promise(resolve => setTimeout(resolve, i * 1000));
                    updateFixedProgress(10);
                })();
            }
        });
    </script>
</body>
</html>
