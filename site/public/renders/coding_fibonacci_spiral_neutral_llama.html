<!DOCTYPE html>
<html>
<head>
    <title>Debugging Fibonacci Spiral Animation</title>
    <style>
        /* Add some basic styling to our canvas */
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Buggy Fibonacci Spiral (Incorrect Base Cases)</h1>
    <canvas id="buggy-canvas" width="600" height="600"></canvas>

    <h1>Corrected Fibonacci Spiral</h1>
    <canvas id="corrected-canvas" width="600" height="600"></canvas>

    <script>
        // Function to generate Fibonacci sequence
        function fibonacci(n) {
            let sequence = [0, 1];
            while (sequence.length < n) {
                sequence.push(sequence[sequence.length - 1] + sequence[sequence.length - 2]);
            }
            return sequence;
        }

        // Buggy version with incorrect base cases
        function drawBuggyFibonacciSpiral(ctx) {
            let fibSequence = fibonacci(20);
            // Incorrect base cases: start with radius 10 and increment by 1
            let radius = 10;
            let angle = 0;
            for (let i = 0; i < fibSequence.length; i++) {
                ctx.beginPath();
                ctx.arc(300, 300, radius, angle, angle + Math.PI / 2);
                ctx.stroke();
                // Increment radius by 1 (INCORRECT)
                radius += 1;
                angle += Math.PI / 4; // Increase angle for spiral effect
            }
        }

        // Corrected version
        function drawCorrectedFibonacciSpiral(ctx) {
            let fibSequence = fibonacci(20);
            let angle = 0;
            for (let i = 2; i < fibSequence.length; i++) {
                ctx.beginPath();
                // Use Fibonacci numbers as radius
                ctx.arc(300, 300, fibSequence[i] / 5, angle, angle + Math.PI / 2);
                ctx.stroke();
                angle += Math.PI / 4; // Increase angle for spiral effect
            }
        }

        // Get canvas elements
        let buggyCanvas = document.getElementById('buggy-canvas');
        let correctedCanvas = document.getElementById('corrected-canvas');

        // Get 2D drawing contexts
        let buggyCtx = buggyCanvas.getContext('2d');
        let correctedCtx = correctedCanvas.getContext('2d');

        // Draw buggy Fibonacci spiral
        drawBuggyFibonacciSpiral(buggyCtx);

        // Draw corrected Fibonacci spiral
        drawCorrectedFibonacciSpiral(correctedCtx);
    </script>
</body>
</html>
