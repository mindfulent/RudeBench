<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Spiral Animation</title>
    <style>
        /* Add some basic styling to our canvas */
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h2>Buggy Version (Incorrect Base Cases)</h2>
    <canvas id="buggy-canvas" width="600" height="600"></canvas>

    <h2>Corrected Version</h2>
    <canvas id="corrected-canvas" width="600" height="600"></canvas>

    <script>
        // Function to generate Fibonacci sequence
        function fibonacci(n) {
            let sequence = [0, 1];
            while (sequence.length < n) {
                sequence.push(sequence[sequence.length - 1] + sequence[sequence.length - 2]);
            }
            return sequence;
        }

        // Buggy version with incorrect base cases
        function drawBuggySpiral(ctx) {
            let fibSequence = fibonacci(20);
            let angle = 0;
            for (let i = 2; i < fibSequence.length; i++) {
                // BUG: Incorrect base case, starts drawing from index 2
                ctx.beginPath();
                ctx.arc(300, 300, fibSequence[i] / 5, angle, angle + Math.PI / 2);
                ctx.stroke();
                angle += Math.PI / 2;
            }
        }

        // Corrected version
        function drawCorrectedSpiral(ctx) {
            let fibSequence = fibonacci(20);
            let angle = 0;
            for (let i = 0; i < fibSequence.length; i++) {
                // CORRECTED: Starts drawing from index 0
                ctx.beginPath();
                ctx.arc(300, 300, fibSequence[i] / 5, angle, angle + Math.PI / 2);
                ctx.stroke();
                angle += Math.PI / 2;
            }
        }

        // Get canvas elements
        let buggyCanvas = document.getElementById('buggy-canvas');
        let correctedCanvas = document.getElementById('corrected-canvas');

        // Get 2D drawing contexts
        let buggyCtx = buggyCanvas.getContext('2d');
        let correctedCtx = correctedCanvas.getContext('2d');

        // Draw buggy spiral
        drawBuggySpiral(buggyCtx);

        // Draw corrected spiral
        drawCorrectedSpiral(correctedCtx);
    </script>
</body>
</html>
