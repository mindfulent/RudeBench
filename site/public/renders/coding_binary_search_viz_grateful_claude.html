<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #e0e0e0;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 0.85rem;
        }

        .legend-box {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .legend-box.range    { background: rgba(99, 179, 237, 0.25); border-color: #63b3ed; }
        .legend-box.mid      { background: rgba(246, 173, 85, 0.4);  border-color: #f6ad55; }
        .legend-box.found    { background: rgba(72, 187, 120, 0.4);  border-color: #48bb78; }
        .legend-box.excluded { background: rgba(255,255,255,0.03);   border-color: #333; }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .controls label {
            color: #ccc;
            font-size: 0.95rem;
        }

        .controls input[type="number"] {
            width: 100px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .controls input[type="number"]:focus {
            border-color: #63b3ed;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active { transform: scale(0.96); }

        .btn-step {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .btn-step:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
            transform: translateY(-1px);
        }

        .btn-step:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            box-shadow: 0 4px 15px rgba(245,87,108,0.4);
        }

        .btn-reset:hover {
            box-shadow: 0 6px 20px rgba(245,87,108,0.6);
            transform: translateY(-1px);
        }

        .btn-auto {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(79,172,254,0.4);
        }

        .btn-auto:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(79,172,254,0.6);
            transform: translateY(-1px);
        }

        .btn-auto:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Array display */
        .array-wrapper {
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .array-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            min-width: max-content;
            padding: 10px 4px;
        }

        .cell-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .cell-index {
            color: #666;
            font-size: 0.72rem;
            font-family: monospace;
        }

        .cell {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            border: 2px solid #333;
            background: rgba(255,255,255,0.04);
            color: #555;
            transition: all 0.4s ease;
            position: relative;
        }

        /* States */
        .cell.in-range {
            background: rgba(99, 179, 237, 0.2);
            border-color: #63b3ed;
            color: #90cdf4;
        }

        .cell.is-mid {
            background: rgba(246, 173, 85, 0.35);
            border-color: #f6ad55;
            color: #fbd38d;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(246,173,85,0.5);
            z-index: 1;
        }

        .cell.is-found {
            background: rgba(72, 187, 120, 0.4);
            border-color: #48bb78;
            color: #9ae6b4;
            transform: scale(1.2);
            box-shadow: 0 0 25px rgba(72,187,120,
