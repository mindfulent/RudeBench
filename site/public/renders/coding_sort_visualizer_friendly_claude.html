<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .controls label {
            color: #aaa;
            font-size: 0.9rem;
        }

        .controls input[type="range"] {
            width: 130px;
            accent-color: #4d96ff;
        }

        .controls select {
            background: #1e1e2e;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        button {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        #btnStart {
            background: linear-gradient(135deg, #6bcb77, #4d96ff);
            color: #fff;
        }

        #btnReset {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #1a1a1a;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .speed-label {
            color: #aaa;
            font-size: 0.85rem;
            min-width: 60px;
        }

        /* Grid of visualizers */
        .visualizers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .viz-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.3s;
        }

        .viz-card.active {
            border-color: #4d96ff88;
        }

        .viz-card.done {
            border-color: #6bcb7788;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .algo-name {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .badge {
            font-size: 0.72rem;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-red    { background: #ff6b6b33; color: #ff6b6b; border: 1px solid #ff6b6b55; }
        .badge-yellow { background: #ffd93d33; color: #ffd93d; border: 1px solid #ffd93d55; }
        .badge-green  { background: #6bcb7733; color: #6bcb77; border: 1px solid #6bcb7755; }
        .badge-blue   { background: #4d96ff33; color: #4d96ff; border: 1px solid #4d96ff55; }

        .complexity-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .complexity-item {
            font-size: 0.78rem;
            color: #999;
        }

        .complexity-item span {
            color: #ccc;
            font-weight: 600;
        }

        .stats-row {
            display: flex;
            gap: 18px;
            font-size: 0.85rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            color: #777;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1rem;
            color: #e0e0e0;
            font-variant-numeric: tabular-nums;
        }

        .bar-chart {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            background: #12121f;
            border-radius: 8px;
            padding: 6px 6px 0 6px;
            overflow: hidden;
        }

        .bar {
            flex: 1;
            border-radius: 3px 3px 0 0;
            transition: height 0.05s;
            min-width: 2px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #666;
            min-height: 18px;
            font-style: italic;
        }

        .status-text.done-text {
            color: #6bcb77;
            font-style: normal;
            font-weight: 600;
        }

        /* Explanation section */
        .explanation {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            padding: 24px;
            max-width: 900px;
            margin: 0 auto 32px;
        }

        .explanation h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #ccc;
        }

        .algo-explain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .algo-explain {
            background: #12121f;
            border-radius: 10px;
            padding: 14px;
            border-left: 3px solid;
        }

        .algo-explain h3 {
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .algo-explain p {
