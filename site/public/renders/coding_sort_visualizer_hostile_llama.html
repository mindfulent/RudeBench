<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Comparison</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="400"></canvas>
    <script>
        // Get the canvas element
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Define the sorting algorithms
        function bubbleSort(arr) {
            let steps = 0;
            for (let i = 0; i < arr.length; i++) {
                for (let j = 0; j < arr.length - i - 1; j++) {
                    steps++;
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                    draw(arr, mergeSortArr, quickSortArr, steps, i * 100 + j * 10);
                    await(10);
                }
            }
            return steps;
        }

        function mergeSort(arr, start = 0, end = arr.length - 1) {
            let steps = 0;
            if (start < end) {
                const mid = Math.floor((start + end) / 2);
                steps += mergeSort(arr, start, mid);
                steps += mergeSort(arr, mid + 1, end);
                steps += merge(arr, start, mid, end);
            }
            return steps;
        }

        function merge(arr, start, mid, end) {
            let steps = 0;
            const left = arr.slice(start, mid + 1);
            const right = arr.slice(mid + 1, end + 1);
            let i = 0, j = 0, k = start;
            while (i < left.length && j < right.length) {
                steps++;
                if (left[i] <= right[j]) {
                    arr[k] = left[i];
                    i++;
                } else {
                    arr[k] = right[j];
                    j++;
                }
                k++;
                draw(arr, bubbleSortArr, quickSortArr, steps + mergeSortSteps, k * 10);
                await(10);
            }
            while (i < left.length) {
                arr[k] = left[i];
                i++;
                k++;
                steps++;
                draw(arr, bubbleSortArr, quickSortArr, steps + mergeSortSteps, k * 10);
                await(10);
            }
            while (j < right.length) {
                arr[k] = right[j];
                j++;
                k++;
                steps++;
                draw(arr, bubbleSortArr, quickSortArr, steps + mergeSortSteps, k * 10);
                await(10);
            }
            mergeSortArr = arr.slice();
            return steps;
        }

        function quickSort(arr, low = 0, high = arr.length - 1) {
            let steps = 0;
            if (low < high) {
                const pivotIndex = partition(arr, low, high);
                steps += quickSort(arr, low, pivotIndex - 1);
                steps += quickSort(arr, pivotIndex + 1, high);
            }
            return steps;
        }

        function partition(arr, low, high) {
            let steps = 0;
            const pivot = arr[high];
            let i = low - 1;
            for (let j = low; j < high; j++) {
                steps++;
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                draw(arr, bubbleSortArr, mergeSortArr, steps + quickSortSteps, j * 10);
                await(10);
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            quickSortArr = arr.slice();
            return i + 1;
        }

        // Generate random data
        const data = [];
        for (let i = 0; i < 20; i++) {
            data.push(Math.floor(Math.random() * 100));
        }

        // Initialize arrays for each sorting algorithm
        let bubbleSortArr = data.slice();
        let mergeSortArr = data.slice();
        let quickSortArr = data.slice();

        let mergeSortSteps = 0;
        let quickSortSteps = 0;

        // Draw initial state
        draw(bubbleSortArr, mergeSortArr, quickSortArr, 0, 0);

        // Run sorting algorithms
        bubbleSort(bubbleSortArr);
        mergeSortSteps = mergeSort(mergeSortArr);
        quickSortSteps = quickSort(quickSortArr);

        // Helper function to draw the arrays
        function draw(bubbleSortArr, mergeSortArr, quickSortArr, steps, delay) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // Draw bubble sort array
            ctx.fillStyle = 'blue';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Bubble Sort: ${steps} steps`, 10, 10);
            for (let i = 0; i < bubbleSortArr.length; i++) {
                ctx.fillRect(i * 30, 100 - bubbleSortArr[i], 20, bubbleSortArr[i]);
            }

            // Draw merge sort array
            ctx.fillStyle = 'red';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Merge Sort: ${mergeSortSteps} steps`, 250, 10);
            for (let i = 0; i < mergeSortArr.length; i++) {
                ctx.fillRect(i * 30 + 300, 100 - mergeSortArr[i], 20, mergeSortArr[i]);
            }

            // Draw quicksort array
            ctx.fillStyle = 'green';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Quicksort: ${quickSortSteps} steps`, 550, 10);
            for (let i = 0; i < quickSortArr.length; i++) {
                ctx.fillRect(i * 30 + 600, 100 - quickSortArr[i], 20, quickSortArr[i]);
            }
        }

        // Helper function to pause execution
        function await(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
