<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Condition Counter Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 6px;
      color: #fff;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* ── Layout ── */
    .panels {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .panel {
      background: #1a1d27;
      border-radius: 16px;
      padding: 28px 24px;
      width: 340px;
      border: 2px solid transparent;
      transition: border-color 0.3s;
    }

    .panel.buggy  { border-color: #ff4757; }
    .panel.fixed  { border-color: #2ed573; }

    .panel-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel.buggy .panel-title { color: #ff4757; }
    .panel.fixed .panel-title { color: #2ed573; }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .badge.bug  { background: #ff475733; color: #ff4757; border: 1px solid #ff4757; }
    .badge.ok   { background: #2ed57333; color: #2ed573; border: 1px solid #2ed573; }

    .panel-desc {
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ── Counter display ── */
    .counter-display {
      background: #12141e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .count-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 6px;
    }

    .count-value {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.1s, color 0.3s;
    }

    .panel.buggy  .count-value { color: #ff6b81; }
    .panel.fixed  .count-value { color: #7bed9f; }

    .count-value.bump {
      transform: scale(1.25);
    }

    .expected-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #1e2030;
    }

    .expected-label { color: #555; }

    .expected-value { font-weight: 700; }

    .drift {
      font-size: 0.72rem;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    .drift.ok   { background: #2ed57322; color: #2ed573; }
    .drift.warn { background: #ff475722; color: #ff4757; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .btn {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:active { transform: scale(0.96); }

    .btn-inc.buggy-btn  { background: #ff4757; color: #fff; }
    .btn-inc.fixed-btn  { background: #2ed573; color: #111; }

    .btn-reset {
      background: #2a2d3e;
      color: #888;
      font-size: 0.85rem;
      flex: 0 0 70px;
    }

    .btn-spam {
      width: 100%;
      padding: 9px 0;
      border: none;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .btn-spam.buggy-spam { background: #ff475722; color: #ff6b81; border: 1px solid #ff4757; }
    .btn-spam.fixed-spam { background: #2ed57322; color: #7bed9f; border: 1px solid #2ed573; }

    /* ── Activity log ── */
    .log-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      margin-bottom: 6px;
    }

    .log-box {
      background: #12141e;
      border-radius: 8px;
      padding: 10px;
      height: 110px;
      overflow-y: auto;
      font-size: 0.72rem;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
    }

    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-track { background: transparent; }
    .log-box::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 4px; }

    .log-entry { color: #555; }
    .log-entry.race  { color: #ff6b81; }
    .log-entry.write { color: #7bed9f; }
    .log-entry.read  { color: #ffa502; }
    .log-entry.info  { color: #70a1ff; }

    /* ── Explanation ── */
    .explanation {
      max-width: 720px;
      margin: 0 auto 32px;
      background: #1a1d27;
      border-radius: 16px;
      padding: 28px 28px;
      border: 1px solid #2a2d3e;
    }

    .explanation h2 {
      font-size: 1
