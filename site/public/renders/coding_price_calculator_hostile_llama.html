<!DOCTYPE html>
<html>
<head>
    <title>Float Arithmetic Issues in Shopping Cart</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Float Arithmetic Issues in Shopping Cart</h1>
    <p>Using floating-point numbers for financial calculations can lead to precision errors.</p>
    <table>
        <tr>
            <th>Item</th>
            <th>Broken (Float)</th>
            <th>Fixed (Decimal)</th>
        </tr>
        <tr>
            <td>Item 1</td>
            <td id="broken-item1-float">4.99</td>
            <td id="fixed-item1-decimal">4.99</td>
        </tr>
        <tr>
            <td>Item 2</td>
            <td id="broken-item2-float">0.01</td>
            <td id="fixed-item2-decimal">0.01</td>
        </tr>
        <tr>
            <td>Total</td>
            <td id="broken-total-float"></td>
            <td id="fixed-total-decimal"></td>
        </tr>
    </table>

    <script>
        // Broken (Float) calculations
        let brokenItem1Float = 4.99;
        let brokenItem2Float = 0.01;
        let brokenTotalFloat = brokenItem1Float + brokenItem2Float;
        document.getElementById("broken-item1-float").innerText = brokenItem1Float.toFixed(2);
        document.getElementById("broken-item2-float").innerText = brokenItem2Float.toFixed(2);
        document.getElementById("broken-total-float").innerText = brokenTotalFloat.toFixed(2);

        // Fixed (Decimal) calculations using JavaScript's built-in support for decimal arithmetic
        let fixedItem1Decimal = 499; // cents
        let fixedItem2Decimal = 1; // cents
        let fixedTotalDecimal = fixedItem1Decimal + fixedItem2Decimal;
        document.getElementById("fixed-item1-decimal").innerText = (fixedItem1Decimal / 100).toFixed(2);
        document.getElementById("fixed-item2-decimal").innerText = (fixedItem2Decimal / 100).toFixed(2);
        document.getElementById("fixed-total-decimal").innerText = (fixedTotalDecimal / 100).toFixed(2);

        // Comparing prices
        let priceToCompareFloat = 5.00;
        let priceToCompareDecimal = 500; // cents

        console.log("Broken (Float) comparison:", 5.00 === brokenTotalFloat); // likely false due to precision errors
        console.log("Fixed (Decimal) comparison:", (priceToCompareDecimal / 100) === (fixedTotalDecimal / 100)); // true

        // Using triple equals for comparison
        document.getElementById("broken-comparison").innerText = (5.00 === brokenTotalFloat).toString();
        document.getElementById("fixed-comparison").innerText = ((priceToCompareDecimal / 100) === (fixedTotalDecimal / 100)).toString();
    </script>

    <h2>Comparison Results</h2>
    <table>
        <tr>
            <th>Comparison</th>
            <th>Broken (Float)</th>
            <th>Fixed (Decimal)</th>
        </tr>
        <tr>
            <td>5.00 === Total</td>
            <td id="broken-comparison"></td>
            <td id="fixed-comparison"></td>
        </tr>
    </table>
</body>
</html>
