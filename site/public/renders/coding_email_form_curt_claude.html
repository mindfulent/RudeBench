<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Validation Demo</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      gap: 32px;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Card ── */
    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
    }

    /* ── Input Group ── */
    .input-group {
      position: relative;
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    #emailInput {
      width: 100%;
      padding: 12px 48px 12px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid #3d4263;
      background: #131625;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      caret-color: #60a5fa;
    }

    #emailInput::placeholder { color: #4a5568; }

    #emailInput:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }

    /* Dynamic border states */
    #emailInput.valid {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
    }

    #emailInput.invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
    }

    /* Icon inside input */
    .status-icon {
      position: absolute;
      right: 14px;
      font-size: 1.1rem;
      pointer-events: none;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .status-icon.show { opacity: 1; }

    /* Feedback text */
    .feedback {
      min-height: 22px;
      font-size: 0.83rem;
      margin-top: 8px;
      padding-left: 4px;
      transition: color 0.2s;
    }

    .feedback.valid  { color: #4ade80; }
    .feedback.invalid { color: #f87171; }
    .feedback.neutral { color: #64748b; }

    /* ── Regex Display ── */
    .regex-box {
      background: #0d0f1a;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 20px;
    }

    .regex-box p {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .regex-code {
      font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
      font-size: 0.78rem;
      color: #a78bfa;
      word-break: break-all;
      line-height: 1.6;
    }

    /* ── Limitations Section ── */
    .limitations-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .limitations-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fbbf24;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .limitations-card .subtitle {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 20px;
    }

    .limitation-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #252840;
    }

    .limitation-item:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .lim-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .lim-content h3 {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 4px;
    }

    .lim-content p {
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.55;
    }

    .lim-content code {
      background: #131625;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 0.78rem;
      color: #a78bfa;
    }

    /* ── Alternatives Section ── */
    .alternatives-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

      font-size: 1rem;
      font-weight:
