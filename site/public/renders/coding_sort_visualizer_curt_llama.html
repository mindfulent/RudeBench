<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Comparison</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .canvas-container {
            display: flex;
        }
        canvas {
            border: 1px solid black;
        }
        .stats {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Sorting Algorithm Comparison</h1>
    <div class="canvas-container">
        <canvas id="bubble-sort-canvas" width="400" height="400"></canvas>
        <canvas id="quick-sort-canvas" width="400" height="400"></canvas>
        <canvas id="merge-sort-canvas" width="400" height="400"></canvas>
    </div>
    <div class="stats">
        <p>Bubble Sort: <span id="bubble-sort-steps">0</span> steps (O(n^2))</p>
        <p>Quick Sort: <span id="quick-sort-steps">0</span> steps (O(n log n) on average)</p>
        <p>Merge Sort: <span id="merge-sort-steps">0</span> steps (O(n log n))</p>
    </div>

    <script>
        // Get canvas elements
        const bubbleSortCanvas = document.getElementById('bubble-sort-canvas');
        const quickSortCanvas = document.getElementById('quick-sort-canvas');
        const mergeSortCanvas = document.getElementById('merge-sort-canvas');

        // Get context
        const bubbleSortCtx = bubbleSortCanvas.getContext('2d');
        const quickSortCtx = quickSortCanvas.getContext('2d');
        const mergeSortCtx = mergeSortCanvas.getContext('2d');

        // Function to draw bars on canvas
        function drawBars(ctx, data) {
            ctx.clearRect(0, 0, 400, 400);
            const barWidth = 400 / data.length;
            data.forEach((val, i) => {
                ctx.fillStyle = 'blue';
                ctx.fillRect(i * barWidth, 400 - val * 2, barWidth, val * 2);
            });
        }

        // Generate random data
        const data = Array(20).fill().map(() => Math.floor(Math.random() * 200) + 1);
        let bubbleSortData = [...data];
        let quickSortData = [...data];
        let mergeSortData = [...data];

        // Draw initial bars
        drawBars(bubbleSortCtx, bubbleSortData);
        drawBars(quickSortCtx, quickSortData);
        drawBars(mergeSortCtx, mergeSortData);

        // Bubble sort
        let bubbleSortSteps = 0;
        const bubbleSortInterval = setInterval(() => {
            let swapped = false;
            for (let i = 0; i < bubbleSortData.length - 1; i++) {
                if (bubbleSortData[i] > bubbleSortData[i + 1]) {
                    [bubbleSortData[i], bubbleSortData[i + 1]] = [bubbleSortData[i + 1], bubbleSortData[i]];
                    swapped = true;
                    bubbleSortSteps++;
                    document.getElementById('bubble-sort-steps').innerText = bubbleSortSteps;
                    drawBars(bubbleSortCtx, bubbleSortData);
                }
            }
            if (!swapped) {
                clearInterval(bubbleSortInterval);
            }
        }, 100);

        // Quick sort
        let quickSortSteps = 0;
        async function quickSort(data, low, high) {
            if (low < high) {
                const pivotIndex = await partition(data, low, high);
                quickSortSteps++;
                document.getElementById('quick-sort-steps').innerText = quickSortSteps;
                drawBars(quickSortCtx, data);
                await new Promise(resolve => setTimeout(resolve, 100));
                await quickSort(data, low, pivotIndex - 1);
                await quickSort(data, pivotIndex + 1, high);
            }
        }
        async function partition(data, low, high) {
            const pivot = data[high];
            let i = low - 1;
            for (let j = low; j < high; j++) {
                if (data[j] < pivot) {
                    i++;
                    [data[i], data[j]] = [data[j], data[i]];
                }
            }
            [data[i + 1], data[high]] = [data[high], data[i + 1]];
            return i + 1;
        }
        quickSort(quickSortData, 0, quickSortData.length - 1);

        // Merge sort
        let mergeSortSteps = 0;
        async function mergeSort(data, low, high) {
            if (low < high) {
                const mid = Math.floor((low + high) / 2);
                await mergeSort(data, low, mid);
                await mergeSort(data, mid + 1, high);
                await merge(data, low, mid, high);
            }
        }
        async function merge(data, low, mid, high) {
            const left = data.slice(low, mid + 1);
            const right = data.slice(mid + 1, high + 1);
            let i = 0;
            let j = 0;
            let k = low;
            while (i < left.length && j < right.length) {
                if (left[i] <= right[j]) {
                    data[k] = left[i];
                    i++;
                } else {
                    data[k] = right[j];
                    j++;
                }
                k++;
                mergeSortSteps++;
                document.getElementById('merge-sort-steps').innerText = mergeSortSteps;
                drawBars(mergeSortCtx, data);
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            while (i < left.length) {
                data[k] = left[i];
                i++;
                k++;
                mergeSortSteps++;
                document.getElementById('merge-sort-steps').innerText = mergeSortSteps;
                drawBars(mergeSortCtx, data);
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            while (j < right.length) {
                data[k] = right[j];
                j++;
                k++;
                mergeSortSteps++;
                document.getElementById('merge-sort-steps').innerText = mergeSortSteps;
                drawBars(mergeSortCtx, data);
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }
        mergeSort(mergeSortData, 0, mergeSortData.length - 1);
    </script>
</body>
</html>
