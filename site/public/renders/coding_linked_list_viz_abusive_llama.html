<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Visualization</title>
    <style>
        .node {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 30px;
            border: 1px solid black;
            border-radius: 5px;
            background-color: #f0f0f0;
            text-align: center;
            line-height: 30px;
            margin: 10px;
        }
        .arrow {
            position: absolute;
            top: 15px;
            left: 55px;
            width: 20px;
            height: 0;
            border-top: 2px solid black;
        }
        .highlight {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="list-container"></div>
    <input id="value-input" type="number" placeholder="Enter value">
    <button id="insert-head-btn">Insert at Head</button>
    <button id="insert-tail-btn">Insert at Tail</button>
    <button id="delete-btn">Delete by Value</button>
    <button id="search-btn">Search</button>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
            }

            insertAtHead(value) {
                const node = new Node(value);
                if (!this.head) {
                    this.head = node;
                    this.tail = node;
                } else {
                    node.next = this.head;
                    this.head = node;
                }
                this.render();
            }

            insertAtTail(value) {
                const node = new Node(value);
                if (!this.tail) {
                    this.head = node;
                    this.tail = node;
                } else {
                    this.tail.next = node;
                    this.tail = node;
                }
                this.render();
            }

            deleteByValue(value) {
                if (!this.head) return;

                if (this.head.value === value) {
                    this.head = this.head.next;
                    if (!this.head) this.tail = null;
                    this.render();
                    return;
                }

                let current = this.head;
                while (current.next) {
                    if (current.next.value === value) {
                        current.next = current.next.next;
                        if (!current.next) this.tail = current;
                        this.render();
                        return;
                    }
                    current = current.next;
                }
            }

            search(value) {
                let current = this.head;
                while (current) {
                    if (current.value === value) {
                        current = null; // reset current to trigger highlight
                        this.render(true, value);
                        return;
                    }
                    current = current.next;
                }
                this.render(true); // clear highlight
            }

            render(highlight = false, value) {
                const container = document.getElementById('list-container');
                container.innerHTML = '';

                let current = this.head;
                let prevNode = null;
                while (current) {
                    const node = document.createElement('div');
                    node.classList.add('node');
                    node.innerText = current.value;
                    if (highlight && current.value === value) node.classList.add('highlight');
                    container.appendChild(node);

                    if (prevNode) {
                        const arrow = document.createElement('div');
                        arrow.classList.add('arrow');
                        prevNode.appendChild(arrow);
                    }
                    prevNode = node;
                    current = current.next;
                }
            }
        }

        const list = new LinkedList();

        document.getElementById('insert-head-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('value-input').value);
            list.insertAtHead(value);
        });

        document.getElementById('insert-tail-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('value-input').value);
            list.insertAtTail(value);
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('value-input').value);
            list.deleteByValue(value);
        });

        document.getElementById('search-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('value-input').value);
            list.search(value);
        });
    </script>
</body>
</html>
