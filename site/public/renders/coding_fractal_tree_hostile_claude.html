<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Tree — Recursion Depth Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 24px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.02em;
  }

  .canvas-wrapper {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  canvas {
    display: block;
    border-radius: 6px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 16px 24px;
    width: 100%;
    max-width: 700px;
  }

  .controls label {
    font-size: 0.95rem;
    color: #8b949e;
    white-space: nowrap;
  }

  #depthSlider {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: #30363d;
    outline: none;
    cursor: pointer;
  }

  #depthSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    border: 2px solid #0d1117;
    box-shadow: 0 0 8px rgba(88,166,255,0.5);
    transition: box-shadow 0.15s;
  }

  #depthSlider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 14px rgba(88,166,255,0.8);
  }

  #depthSlider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    border: 2px solid #0d1117;
  }

  .depth-badge {
    min-width: 36px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: #58a6ff;
    font-variant-numeric: tabular-nums;
  }

  .stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 18px;
    text-align: center;
    min-width: 130px;
  }

  .stat-card .val {
    font-size: 1.3rem;
    font-weight: 700;
    color: #3fb950;
    font-variant-numeric: tabular-nums;
  }

  .stat-card .lbl {
    font-size: 0.72rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .explainer {
    max-width: 700px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px 24px;
  }

  .section h2 {
    font-size: 1.05rem;
    color: #58a6ff;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section h2 .icon { font-size: 1.1rem; }

  .section p, .section li {
    font-size: 0.88rem;
    line-height: 1.75;
    color: #c9d1d9;
  }

  .section ul, .section ol {
    padding-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .section li strong { color: #e6edf3; }

  .warn {
    border-color: #f85149;
    background: #1a0d0d;
  }

  .warn h2 { color: #f85149; }

  .solution {
    border-color: #3fb950;
    background: #0d1a0f;
  }

  .solution h2 { color: #3fb950; }

  code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.82rem;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 1px 6px;
    color: #ffa657;
  }

  pre {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.80rem;
    line-height: 1.6;
    color: #e6edf3;
    margin-top: 12px;
  }

  .kw  { color: #ff7b72; }
  .fn  { color: #d2a8ff; }
  .cm  { color: #8b949e; font-style: italic; }
  .st  { color: #a5d6ff; }
  .nm  { color: #79c0ff; }
  .op  { color: #ffa657; }

  .tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-left: 8px;
    vertical-align: middle;
  }

  .tag-warn { background: #f85149; color: #fff; }
  .tag-good { background: #3fb950; color: #000; }
  .tag-info { background: #58a6ff; color: #000; }

  .divider {
    height: 1px;
    background: #30363d;
    margin: 12px 0;
  }

  .stack-diagram {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.78rem;
    color: #c9d1d9;
