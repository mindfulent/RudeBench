<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithms Comparison</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .bars {
            position: relative;
            width: 400px;
            height: 200px;
            border: 1px solid black;
            display: inline-block;
        }
        .bar {
            position: absolute;
            bottom: 0;
            background-color: blue;
            transition: height 0.5s;
        }
        #steps {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Sorting Algorithms Comparison</h1>

<div id="algorithms">
    <div>
        <div class="bars" id="bubble-bars"></div>
        <p>Bubble Sort (O(n^2))</p>
        <p id="bubble-steps">Steps: 0</p>
    </div>
    <div>
        <div class="bars" id="quick-bars"></div>
        <p>Quick Sort (O(n log n))</p>
        <p id="quick-steps">Steps: 0</p>
    </div>
    <div>
        <div class="bars" id="merge-bars"></div>
        <p>Merge Sort (O(n log n))</p>
        <p id="merge-steps">Steps: 0</p>
    </div>
</div>

<button onclick="startSorting()">Sort</button>

<script>
    let data = Array(20).fill().map(() => Math.floor(Math.random() * 100));
    let bubbleData = [...data];
    let quickData = [...data];
    let mergeData = [...data];

    function startSorting() {
        bubbleSort(bubbleData, 0);
        quickSort(quickData, 0, quickData.length - 1);
        mergeSort(mergeData, 0, mergeData.length - 1);
    }

    function bubbleSort(data, step) {
        if (step < data.length) {
            for (let i = 0; i < data.length - 1; i++) {
                if (data[i] > data[i + 1]) {
                    [data[i], data[i + 1]] = [data[i + 1], data[i]];
                }
            }
            drawBars('bubble-bars', data);
            document.getElementById('bubble-steps').innerText = `Steps: ${step + 1}`;
            setTimeout(() => bubbleSort(data, step + 1), 500);
        }
    }

    function quickSort(data, low, high) {
        if (low < high) {
            let pivotIndex = partition(data, low, high);
            drawBars('quick-bars', data);
            document.getElementById('quick-steps').innerText = `Steps: ${quickData.length - low - high}`;
            setTimeout(() => quickSort(data, low, pivotIndex - 1), 500);
            setTimeout(() => quickSort(data, pivotIndex + 1, high), 500);
        }
    }

    function partition(data, low, high) {
        let pivot = data[high];
        let i = low - 1;
        for (let j = low; j < high; j++) {
            if (data[j] < pivot) {
                i++;
                [data[i], data[j]] = [data[j], data[i]];
            }
        }
        [data[i + 1], data[high]] = [data[high], data[i + 1]];
        return i + 1;
    }

    function mergeSort(data, low, high) {
        if (low < high) {
            let mid = Math.floor((low + high) / 2);
            mergeSort(data, low, mid);
            mergeSort(data, mid + 1, high);
            merge(data, low, mid, high);
            drawBars('merge-bars', data);
            document.getElementById('merge-steps').innerText = `Steps: ${mergeData.length - low - high}`;
        }
    }

    function merge(data, low, mid, high) {
        let left = data.slice(low, mid + 1);
        let right = data.slice(mid + 1, high + 1);
        let i = 0, j = 0, k = low;
        while (i < left.length && j < right.length) {
            if (left[i] <= right[j]) {
                data[k] = left[i];
                i++;
            } else {
                data[k] = right[j];
                j++;
            }
            k++;
        }
        while (i < left.length) {
            data[k] = left[i];
            i++;
            k++;
        }
        while (j < right.length) {
            data[k] = right[j];
            j++;
            k++;
        }
    }

    function drawBars(id, data) {
        let barsContainer = document.getElementById(id);
        barsContainer.innerHTML = '';
        let max = Math.max(...data);
        data.forEach((value, index) => {
            let bar = document.createElement('div');
            bar.classList.add('bar');
            bar.style.left = `${index * 20}px`;
            bar.style.width = '20px';
            bar.style.height = `${200 * value / max}px`;
            barsContainer.appendChild(bar);
        });
    }

    // Initial draw
    drawBars('bubble-bars', bubbleData);
    drawBars('quick-bars', quickData);
    drawBars('merge-bars', mergeData);
</script>

</body>
</html>
