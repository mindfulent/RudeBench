<!DOCTYPE html>
<html>
<head>
  <title>Binary Search Visualization</title>
  <style>
    #array-container {
      display: flex;
      flex-wrap: wrap;
    }
    .box {
      width: 20px;
      height: 20px;
      border: 1px solid black;
      display: inline-block;
      text-align: center;
      line-height: 20px;
      margin: 5px;
    }
    .highlight {
      background-color: yellow;
    }
    .search-range {
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <h1>Binary Search Visualization</h1>
  <div id="array-container"></div>
  <input id="target-input" type="number" placeholder="Target value">
  <button id="step-button">Step</button>
  <button id="reset-button">Reset</button>
  <p id="result"></p>

  <script>
    const array = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91];
    const arrayContainer = document.getElementById('array-container');
    const targetInput = document.getElementById('target-input');
    const stepButton = document.getElementById('step-button');
    const resetButton = document.getElementById('reset-button');
    const resultElement = document.getElementById('result');

    let target;
    let low = 0;
    let high = array.length - 1;

    // Render initial array
    array.forEach((value, index) => {
      const box = document.createElement('div');
      box.classList.add('box');
      box.textContent = value;
      arrayContainer.appendChild(box);
    });

    stepButton.addEventListener('click', () => {
      target = parseInt(targetInput.value);
      if (isNaN(target)) {
        resultElement.textContent = 'Please enter a target value';
        return;
      }

      const mid = Math.floor((low + high) / 2);
      const boxes = arrayContainer.children;

      // Highlight search range
      for (let i = 0; i < boxes.length; i++) {
        boxes[i].classList.remove('search-range');
        if (i >= low && i <= high) {
          boxes[i].classList.add('search-range');
        }
      }

      // Highlight mid element
      boxes[mid].classList.add('highlight');
      setTimeout(() => {
        boxes[mid].classList.remove('highlight');
      }, 1000);

      if (array[mid] === target) {
        resultElement.textContent = `Found ${target} at index ${mid}`;
        stepButton.disabled = true;
      } else if (array[mid] < target) {
        low = mid + 1;
      } else {
        high = mid - 1;
      }

      if (low > high) {
        resultElement.textContent = `${target} not found`;
        stepButton.disabled = true;
      }
    });

    resetButton.addEventListener('click', () => {
      low = 0;
      high = array.length - 1;
      target = null;
      resultElement.textContent = '';
      stepButton.disabled = false;
      const boxes = arrayContainer.children;
      for (let i = 0; i < boxes.length; i++) {
        boxes[i].classList.remove('search-range', 'highlight');
      }
    });
  </script>
</body>
</html>
