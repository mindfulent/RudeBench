<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fractal Tree</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="600"></canvas>
  <input type="range" id="depth-slider" min="1" max="12" value="6">
  <label for="depth-slider">Depth: <span id="depth-label">6</span></label>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const depthSlider = document.getElementById('depth-slider');
    const depthLabel = document.getElementById('depth-label');

    depthSlider.addEventListener('input', () => {
      depthLabel.textContent = depthSlider.value;
      drawTree(parseInt(depthSlider.value));
    });

    function drawTree(depth) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height);
      ctx.rotate(-Math.PI / 2);
      drawBranch(100, depth);
    }

    function drawBranch(length, depth) {
      if (depth === 0) return;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -length);
      ctx.stroke();
      ctx.translate(0, -length);
      ctx.rotate(Math.PI / 6);
      drawBranch(length * 0.7, depth - 1);
      ctx.rotate(-Math.PI / 3);
      drawBranch(length * 0.7, depth - 1);
      ctx.rotate(Math.PI / 6);
      ctx.translate(0, length);
    }

    drawTree(6);
  </script>
</body>
</html>
