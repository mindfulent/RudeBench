<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Table Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<textarea id="csvData" placeholder="Paste your CSV data here..."></textarea>
<button id="parseBtn">Parse CSV</button>
<div id="tableContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/dist/papaparse.min.js"></script>
<script>
    document.getElementById('parseBtn').addEventListener('click', function() {
        const csvData = document.getElementById('csvData').value;
        if (csvData.trim() === '') return; // Don't do anything if textarea is empty

        Papa.parse(csvData, {
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                const table = document.createElement('table');
                if (results.data.length > 0) {
                    // Create table header
                    const headerRow = document.createElement('tr');
                    Object.keys(results.data[0]).forEach(key => {
                        const th = document.createElement('th');
                        th.textContent = key;
                        headerRow.appendChild(th);
                    });
                    table.appendChild(headerRow);

                    // Create table rows
                    results.data.forEach(row => {
                        const rowElement = document.createElement('tr');
                        Object.values(row).forEach(value => {
                            const td = document.createElement('td');
                            td.textContent = value;
                            rowElement.appendChild(td);
                        });
                        table.appendChild(rowElement);
                    });
                }
                document.getElementById('tableContainer').innerHTML = '';
                document.getElementById('tableContainer').appendChild(table);
            }
        });
    });
</script>

</body>
</html>
