<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Example</title>
    <style>
        .widget {
            padding: 10px;
            border: 1px solid black;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Leaking Version</h1>
    <button id="add-widget-leaking">Add Widget (Leaking)</button>
    <button id="remove-widget-leaking">Remove Widget (Leaking)</button>
    <div id="widgets-leaking"></div>
    <p>Widget count: <span id="widget-count-leaking">0</span></p>

    <h1>Fixed Version</h1>
    <button id="add-widget-fixed">Add Widget (Fixed)</button>
    <button id="remove-widget-fixed">Remove Widget (Fixed)</button>
    <div id="widgets-fixed"></div>
    <p>Widget count: <span id="widget-count-fixed">0</span></p>

    <script>
        let widgetCountLeaking = 0;
        let widgetCountFixed = 0;
        const widgetsLeaking = [];
        const widgetsFixed = [];

        // Leaking Version
        document.getElementById('add-widget-leaking').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Widget ${widgetCountLeaking}`;
            document.getElementById('widgets-leaking').appendChild(widget);
            widgetsLeaking.push(widget);
            widgetCountLeaking++;
            document.getElementById('widget-count-leaking').textContent = widgetCountLeaking;

            // Add event listener that is never removed
            widget.addEventListener('click', () => {
                console.log(`Leaking widget ${widgetCountLeaking} clicked`);
            });
        });

        document.getElementById('remove-widget-leaking').addEventListener('click', () => {
            if (widgetsLeaking.length > 0) {
                const widget = widgetsLeaking.pop();
                widget.parentNode.removeChild(widget);
                widgetCountLeaking--;
                document.getElementById('widget-count-leaking').textContent = widgetCountLeaking;
            }
        });

        // Fixed Version
        document.getElementById('add-widget-fixed').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Widget ${widgetCountFixed}`;
            document.getElementById('widgets-fixed').appendChild(widget);
            widgetsFixed.push(widget);
            widgetCountFixed++;
            document.getElementById('widget-count-fixed').textContent = widgetCountFixed;

            // Add event listener that is removed when widget is removed
            const handleClick = () => {
                console.log(`Fixed widget ${widgetCountFixed} clicked`);
            };
            widget.addEventListener('click', handleClick);

            // Store a reference to the event listener so it can be removed
            widget.dataset.handleClick = handleClick.toString();
        });

        document.getElementById('remove-widget-fixed').addEventListener('click', () => {
            if (widgetsFixed.length > 0) {
                const widget = widgetsFixed.pop();
                widget.removeEventListener('click', widget.dataset.handleClick);
                widget.parentNode.removeChild(widget);
                widgetCountFixed--;
                document.getElementById('widget-count-fixed').textContent = widgetCountFixed;
            }
        });
    </script>
</body>
</html>
