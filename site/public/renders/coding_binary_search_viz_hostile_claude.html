<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Search Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #6b7280;
    margin-bottom: 36px;
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls label {
    font-size: 0.9rem;
    color: #9ca3af;
  }

  input[type="number"] {
    background: #1e2130;
    border: 1px solid #374151;
    color: #f0f0f0;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 1rem;
    width: 110px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="number"]:focus {
    border-color: #60a5fa;
  }

  button {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  #startBtn {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
  }
  #startBtn:hover { opacity: 0.88; transform: translateY(-1px); }

  #stepBtn {
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
  }
  #stepBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  #stepBtn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; transform: none; }

  #resetBtn {
    background: #1e2130;
    color: #9ca3af;
    border: 1px solid #374151;
  }
  #resetBtn:hover { background: #2a2f45; color: #e0e0e0; }

  .array-wrapper {
    overflow-x: auto;
    width: 100%;
    max-width: 900px;
    padding-bottom: 12px;
  }

  .array-container {
    display: flex;
    gap: 6px;
    justify-content: center;
    min-width: max-content;
    padding: 20px 10px;
    position: relative;
  }

  .cell {
    width: 54px;
    height: 54px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 700;
    border: 2px solid #2d3348;
    background: #1a1f2e;
    color: #9ca3af;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    flex-shrink: 0;
  }

  .cell .index-label {
    position: absolute;
    bottom: -22px;
    font-size: 0.65rem;
    color: #4b5563;
    font-weight: 400;
  }

  /* States */
  .cell.in-range {
    border-color: #3b82f6;
    background: #1e3a5f;
    color: #93c5fd;
  }

  .cell.mid {
    border-color: #f59e0b;
    background: #3d2c00;
    color: #fcd34d;
    transform: scale(1.18);
    box-shadow: 0 0 18px rgba(245,158,11,0.45);
    z-index: 2;
  }

  .cell.found {
    border-color: #10b981;
    background: #052e16;
    color: #6ee7b7;
    transform: scale(1.22);
    box-shadow: 0 0 24px rgba(16,185,129,0.55);
    z-index: 2;
    animation: pulse-found 0.6s ease;
  }

  .cell.eliminated {
    border-color: #1f2937;
    background: #111318;
    color: #374151;
    transform: scale(0.92);
    opacity: 0.45;
  }

  @keyframes pulse-found {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1.22); }
  }

  /* Pointer labels */
  .pointer-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    min-width: max-content;
    padding: 0 10px;
    height: 28px;
    position: relative;
  }

  .pointer-cell {
    width: 54px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.35s ease;
  }

  .ptr-lo  { color: #60a5fa; }
  .ptr-mid { color: #fbbf24; }
  .ptr-hi  { color: #c084fc; }

  /* Info panel */
  .info-panel {
    background: #1a1f2e;
    border: 1px solid #2d3348;
    border-radius: 12px;
    padding: 18px 28px;
    margin-top: 36px;
    max-width: 600px;
    width: 100%;
    text-align: center;
  }

  .info-panel .step-info {
    font-size: 0.95rem;
    color: #9ca3af;
    line-height: 1.7;
  }

  .info-panel .step-info span { font-weight: 700; }
  .lo-text  { color: #60a5fa !important; }
  .mid-text { color: #fbbf24 !important; }
  .hi-text  { color: #c084fc !important; }

  .result-msg {
    margin-top: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    display: inline-block;
  }

  .result-found {
    background: #052e16;
    color: #6ee7b7;
    border: 1px solid #10b981;
  }

  .result-not-found {
    background: #2d0e0e;
    color: #fca5a5;
    border: 1px solid #ef4444;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.78rem;
    color: #6b7280;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    border: 2px solid;
  }
  .ld-range      { background: #1e3a5f; border-color: #3b82f6; }
  .ld-mid        { background: #3d2c00; border-color: #f59e0b; }
  .ld-found      { background: #052e16; border-color: #10b981; }
  .ld-eliminated { background: #111318; border-color: #1f2937; opacity: 0.6; }

  .step-counter {
    font-size: 0.78rem;
    color: #4b5563;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>Binary Search Visualizer</h1>
<p class="subtitle">Step through the algorithm and watch it work in real time</p>

<div class="controls">
  <label>Target:</label>
  <input type="number" id="targetInput" value="37" min="1" max="99" />
  <button id="startBtn">▶ Start Search</button>
  <button id="stepBtn" disabled>⏭ Next Step</button>
  <button id="resetBtn">↺ Reset</button>
</div>

<div class="array-wrapper">
  <div class="pointer-row" id="pointerRow"></div>
  <div class="array-container" id="arrayContainer"></div>
</div>

<div class="info-panel" id="infoPanel">
  <div class="step-info" id="stepInfo">Enter a target value and press <strong>Start Search</strong> to begin.</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot ld-range"></div> Search Range</div>
  <div class="legend-item"><div class="legend-dot ld-mid"></div> Mid Element</div>
  <div class="legend-item"><div class="legend-dot ld-found"></div> Found</div>
  <div class="legend-item"><div class="legend-dot ld-eliminated"></div> Eliminated</div>
</div>

<script>
  const ARRAY = [3, 7, 11, 15, 19, 23, 27, 31, 37, 42, 46, 51, 55, 60, 67, 73, 79, 84, 91, 97];

  let lo, hi, target, done, steps, stepIndex;

  const arrayContainer = document.getElementById('arrayContainer');
  const pointerRow     = document.getElementById('pointerRow');
  const stepInfo       = document.getElementById('stepInfo');
  const startBtn       = document.getElementById('startBtn');
  const stepBtn        = document.getElementById('stepBtn');
  const resetBtn       = document.getElementById('resetBtn');
  const targetInput    = document.getElementById('targetInput');

  function buildArray() {
    arrayContainer.innerHTML = '';
    pointerRow.innerHTML = '';
    ARRAY.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${i}`;
      cell.innerHTML = `${val}<span class="index-label">${i}</span>`;
      arrayContainer.appendChild(cell);

      const ptr = document.createElement('div');
      ptr.className = 'pointer-cell';
      ptr.id = `ptr-${i}`;
      pointerRow.appendChild(ptr);
    });
  }

  function precomputeSteps(arr, tgt) {
    const s = [];
    let l = 0, h = arr.length - 1;
    while (l <= h) {
      const m = Math.floor((l + h) / 2);
      s.push({ lo: l, hi: h, mid: m, val: arr[m], cmp: arr[m] === tgt ? 0 : arr[m] < tgt ? -1 : 1 });
      if      (arr[m] === tgt) break;
      else if (arr[m] < tgt)   l = m + 1;
      else                      h = m - 1;
    }
    return s;
  }

  function applyStep(stepIdx, finished) {
    const step = steps[stepIdx];

    ARRAY.forEach((_, i) => {
      const cell = document.getElementById(`cell-${i}`);
      const ptr  = document.getElementById(`ptr-${i}`);
      ptr.textContent = '';
      ptr.className = 'pointer-cell';

      if (finished && step.cmp === 0 && i === step.mid) {
        cell.className = 'cell found';
      } else if (i < step.lo || i > step.hi) {
        cell.className = 'cell eliminated';
      } else if (i === step.mid) {
        cell.className = 'cell mid';
      } else {
        cell.className = 'cell in-range';
      }
    });

    // Pointer labels
    const labels = {};
    labels[step.lo]  = (labels[step.lo]  || []).concat(['lo']);
    labels[step.mid] = (labels[step.mid] || []).concat(['mid']);
    labels[step.hi]  = (labels[step.hi]  || []).concat(['hi']);

    Object.entries(labels).forEach(([idx, tags]) => {
      const ptr = document.getElementById(`ptr-${idx}`);
      const parts = tags.map(t => {
        const cls = t === 'lo' ? 'ptr-lo' : t === 'mid' ? 'ptr-mid' : 'ptr-hi';
        return `<span class="${cls}">${t === 'lo' ? '↑ lo' : t === 'mid' ? '↑ mid' : '↑ hi'}</span>`;
      });
      ptr.innerHTML = parts.join(' ');
    });

    // Info text
    let html = `Step <strong>${stepIdx + 1}</strong> of ${steps.length} &nbsp;|&nbsp; `;
    html += `<span class="lo-text">lo=${step.lo}</span>  `;
    html += `<span class="hi-text">hi=${step.hi}</span>  `;
    html += `<span class="mid-text">mid=${step.mid}</span>  `;
    html += `&nbsp;→&nbsp; arr[mid] = <strong>${step.val}</strong>`;

    if (finished) {
      if (step.cmp === 0) {
        html += `<br><span class="result-msg result-found">✓ Found ${target} at index ${step.mid}!</span>`;
      } else {
        html += `<br><span class="result-msg result-not-found">✗ ${target} is not in the array.</span>`;
      }
    } else {
      if (step.cmp < 0)       html += `<br>${step.val} &lt; ${target} → search <strong>right half</strong>`;
      else if (step.cmp > 0)  html += `<br>${step.val} &gt; ${target} → search <strong>left half</strong>`;
    }

    stepInfo.innerHTML = html;
  }

  function showNotFound() {
    ARRAY.forEach((_, i) => {
      document.getElementById(`cell-${i}`).className = 'cell eliminated';
      document.getElementById(`ptr-${i}`).textContent = '';
    });
    stepInfo.innerHTML = `<span class="result-msg result-not-found">✗ ${target} is not in the array. Search space exhausted.</span>`;
  }

  startBtn.addEventListener('click', () => {
    target = parseInt(targetInput.value, 10);
    if (isNaN(target)) { stepInfo.textContent = 'Please enter a valid number.'; return; }

    steps     = precomputeSteps(ARRAY, target);
    stepIndex = 0;
    done      = false;

    buildArray();
    stepBtn.disabled = false;
    startBtn.disabled = true;

    stepInfo.innerHTML = `Searching for <strong>${target}</strong>. Press <strong>Next Step</strong> to begin.`;
  });

  stepBtn.addEventListener('click', () => {
    if (stepIndex >= steps.length) return;

    const step     = steps[stepIndex];
    const isLast   = stepIndex === steps.length - 1;
    const finished = isLast;

    applyStep(stepIndex, finished);

    if (finished) {
      stepBtn.disabled  = true;
      startBtn.disabled = false;
      if (step.cmp !== 0) showNotFound();
    }

    stepIndex++;
  });

  resetBtn.addEventListener('click', () => {
    buildArray();
    stepBtn.disabled  = true;
    startBtn.disabled = false;
    stepInfo.innerHTML = 'Enter a target value and press <strong>Start Search</strong> to begin.';
  });

  buildArray();
</script>
</body>
</html>
