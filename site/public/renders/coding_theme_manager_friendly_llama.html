<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singleton Theme Toggle</title>
    <style>
        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s;
        }

        /* Light Theme */
       .light-theme {
            background-color: #f0f0f0;
            color: #333;
        }

        /* Dark Theme */
        .dark-theme {
            background-color: #333;
            color: #f0f0f0;
        }

        /* Element Styles */
        .header {
            background-color: #ccc;
            padding: 1em;
            text-align: center;
        }

        .dark-theme .header {
            background-color: #555;
            color: #f0f0f0;
        }

        .light-theme .header {
            background-color: #ccc;
            color: #333;
        }

        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 0.5em 1em;
            border: none;
            border-radius: 0.5em;
            cursor: pointer;
        }

        .dark-theme .button {
            background-color: #666;
            color: #f0f0f0;
        }

        .light-theme .button {
            background-color: #4CAF50;
            color: #fff;
        }

        .paragraph {
            padding: 1em;
        }

        .dark-theme .paragraph {
            background-color: #444;
            color: #f0f0f0;
        }

        .light-theme .paragraph {
            background-color: #fff;
            color: #333;
        }
    </style>
</head>
<body class="light-theme">
    <div class="header">Singleton Theme Toggle</div>
    <button class="button" id="theme-toggle">Toggle Theme</button>
    <div class="paragraph">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</div>
    <div class="paragraph">Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</div>

    <script>
        // Singleton Pattern for State Management
        class ThemeState {
            static instance;

            static getInstance() {
                if (!ThemeState.instance) {
                    ThemeState.instance = new ThemeState();
                }
                return ThemeState.instance;
            }

            constructor() {
                this.theme = 'light';
                this.elements = [];
            }

            addElement(element) {
                this.elements.push(element);
            }

            toggleTheme() {
                this.theme = this.theme === 'light' ? 'dark' : 'light';
                this.elements.forEach(element => {
                    element.classList.remove('light-theme', 'dark-theme');
                    element.classList.add(`${this.theme}-theme`);
                });
            }
        }

        // Get the singleton instance
        const themeState = ThemeState.getInstance();

        // Get elements and add them to the theme state
        const body = document.body;
        themeState.addElement(body);
        const header = document.querySelector('.header');
        themeState.addElement(header);
        const paragraphs = document.querySelectorAll('.paragraph');
        paragraphs.forEach(paragraph => themeState.addElement(paragraph));
        const button = document.querySelector('#theme-toggle');
        themeState.addElement(button);

        // Add event listener to the theme toggle button
        button.addEventListener('click', () => {
            themeState.toggleTheme();
        });
    </script>
</body>
</html>
