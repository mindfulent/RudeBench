<!DOCTYPE html>
<html>
<head>
    <title>Concurrency Bug Demonstration</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .version {
            margin-bottom: 20px;
        }
        button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Buggy Version</h2>
        <p>Count: <span id="buggy-count">0</span></p>
        <button onclick="buggyIncrement()">Increment</button>
        <button onclick="resetBuggy()">Reset</button>

        <h2>Fixed Version</h2>
        <p>Count: <span id="fixed-count">0</span></p>
        <button onclick="fixedIncrement()">Increment</button>
        <button onclick="resetFixed()">Reset</button>
    </div>

    <script>
        // Buggy Version
        let buggyCount = 0;
        function buggyIncrement() {
            setTimeout(() => {
                const currentCount = buggyCount;
                // Simulate some work
                setTimeout(() => {
                    buggyCount = currentCount + 1;
                    document.getElementById('buggy-count').innerText = buggyCount;
                }, 10);
            }, 0);
        }
        function resetBuggy() {
            buggyCount = 0;
            document.getElementById('buggy-count').innerText = buggyCount;
        }

        // Fixed Version
        let fixedCount = 0;
        function fixedIncrement() {
            setTimeout(() => {
                // Use a closure to capture the current state and ensure atomicity
                (count) => {
                    // Simulate some work
                    setTimeout(() => {
                        fixedCount = count + 1;
                        document.getElementById('fixed-count').innerText = fixedCount;
                    }, 10);
                }(fixedCount);
            }, 0);
        }
        function resetFixed() {
            fixedCount = 0;
            document.getElementById('fixed-count').innerText = fixedCount;
        }
    </script>
</body>
</html>
