<!DOCTYPE html>
<html>
<head>
  <title>Concurrency Bug Example</title>
  <style>
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .version {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Buggy Version</h2>
    <p>Count: <span id="buggy-count">0</span></p>
    <button id="buggy-inc">Increment</button>
    <h2>Fixed Version</h2>
    <p>Count: <span id="fixed-count">0</span></p>
    <button id="fixed-inc">Increment</button>
  </div>

  <script>
    // Buggy Version
    let buggyCount = 0;
    document.getElementById('buggy-inc').addEventListener('click', () => {
      setTimeout(() => {
        const currentCount = buggyCount;
        buggyCount = currentCount + 1;
        document.getElementById('buggy-count').textContent = buggyCount;
      }, 10); // simulate async delay
    });

    // Fixed Version
    let fixedCount = 0;
    document.getElementById('fixed-inc').addEventListener('click', () => {
      setTimeout(() => {
        fixedCount = (fixedCount + 1) || 0; // atomic update
        document.getElementById('fixed-count').textContent = fixedCount;
      }, 10); // simulate async delay
    });

    // Alternatively, use a more robust approach with a lock or a promise-based approach
    let fixedCountLocked = 0;
    let pendingUpdate = false;
    document.getElementById('fixed-inc').addEventListener('click', () => {
      if (pendingUpdate) return; // or queue the update
      pendingUpdate = true;
      setTimeout(() => {
        fixedCountLocked++;
        document.getElementById('fixed-count').textContent = fixedCountLocked;
        pendingUpdate = false;
      }, 10); // simulate async delay
    });
  </script>
</body>
</html>
