<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linked List Visualizer</title>
<style>
  .node {
    display: inline-block;
    width: 50px;
    height: 30px;
    border: 1px solid black;
    margin: 5px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: lightblue;
  }
  .highlight {
    background-color: yellow;
  }
  .arrow {
    font-size: 20px;
    margin: 0 10px;
  }
</style>
</head>
<body>

<div id="linkedList"></div>

<input id="value" type="number" placeholder="Value">
<button id="insertHead">Insert at Head</button>
<button id="insertTail">Insert at Tail</button>
<button id="delete">Delete by Value</button>
<button id="search">Search</button>

<script>
  class Node {
    constructor(value) {
      this.value = value;
      this.next = null;
    }
  }

  class LinkedList {
    constructor() {
      this.head = null;
      this.tail = null;
      this.size = 0;
      this.div = document.getElementById('linkedList');
    }

    insertAtHead(value) {
      const node = new Node(value);
      if (!this.head) {
        this.head = node;
        this.tail = node;
      } else {
        node.next = this.head;
        this.head = node;
      }
      this.size++;
      this.render();
    }

    insertAtTail(value) {
      const node = new Node(value);
      if (!this.tail) {
        this.head = node;
        this.tail = node;
      } else {
        this.tail.next = node;
        this.tail = node;
      }
      this.size++;
      this.render();
    }

    deleteByValue(value) {
      if (!this.head) return;

      if (this.head.value === value) {
        this.head = this.head.next;
        if (!this.head) this.tail = null;
        this.size--;
        this.render();
        return;
      }

      let current = this.head;
      while (current.next) {
        if (current.next.value === value) {
          current.next = current.next.next;
          if (!current.next) this.tail = current;
          this.size--;
          this.render();
          return;
        }
        current = current.next;
      }
    }

    search(value) {
      let current = this.head;
      let found = false;
      while (current) {
        if (current.value === value) {
          found = true;
          current.div.classList.add('highlight');
          setTimeout(() => current.div.classList.remove('highlight'), 2000);
          break;
        }
        current = current.next;
      }
      if (!found) alert("Value not found");
    }

    render() {
      this.div.innerHTML = '';
      let current = this.head;
      while (current) {
        const nodeDiv = document.createElement('div');
        nodeDiv.className = 'node';
        nodeDiv.textContent = current.value;
        current.div = nodeDiv; // Store the div for highlighting
        this.div.appendChild(nodeDiv);
        if (current.next) {
          const arrow = document.createElement('span');
          arrow.className = 'arrow';
          arrow.textContent = '->';
          this.div.appendChild(arrow);
        }
        current = current.next;
      }
    }
  }

  const list = new LinkedList();

  document.getElementById('insertHead').addEventListener('click', function() {
    const value = parseInt(document.getElementById('value').value);
    if (!isNaN(value)) list.insertAtHead(value);
  });

  document.getElementById('insertTail').addEventListener('click', function() {
    const value = parseInt(document.getElementById('value').value);
    if (!isNaN(value)) list.insertAtTail(value);
  });

  document.getElementById('delete').addEventListener('click', function() {
    const value = parseInt(document.getElementById('value').value);
    if (!isNaN(value)) list.deleteByValue(value);
  });

  document.getElementById('search').addEventListener('click', function() {
    const value = parseInt(document.getElementById('value').value);
    if (!isNaN(value)) list.search(value);
  });
</script>

</body>
</html>
