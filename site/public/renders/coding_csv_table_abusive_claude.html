<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Parser</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 30px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #00d4ff;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    .input-section {
      max-width: 900px;
      margin: 0 auto 30px auto;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #00d4ff44;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #00d4ff;
    }

    textarea::placeholder {
      color: #555a7a;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    #parseBtn {
      background: #00d4ff;
      color: #1a1a2e;
    }

    #parseBtn:hover {
      background: #00b8d9;
    }

    #clearBtn {
      background: #e05c5c;
      color: #fff;
    }

    #clearBtn:hover {
      background: #c94444;
    }

    #loadSampleBtn {
      background: #6c63ff;
      color: #fff;
    }

    #loadSampleBtn:hover {
      background: #574fd6;
    }

    #error {
      max-width: 900px;
      margin: 0 auto 16px auto;
      color: #ff6b6b;
      background: #2a1a1a;
      border: 1px solid #ff6b6b44;
      border-radius: 6px;
      padding: 10px 16px;
      display: none;
      font-size: 0.9rem;
    }

    #info {
      max-width: 900px;
      margin: 0 auto 16px auto;
      color: #90ee90;
      background: #1a2a1a;
      border: 1px solid #90ee9044;
      border-radius: 6px;
      padding: 10px 16px;
      display: none;
      font-size: 0.9rem;
    }

    .table-wrapper {
      max-width: 900px;
      margin: 0 auto;
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #00d4ff22;
      box-shadow: 0 4px 24px #00000055;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead tr {
      background: #00d4ff;
      color: #1a1a2e;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    tbody tr:nth-child(odd) {
      background: #16213e;
    }

    tbody tr:nth-child(even) {
      background: #0f3460;
    }

    tbody tr:hover {
      background: #00d4ff22;
      transition: background 0.15s;
    }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid #ffffff0d;
      word-break: break-word;
    }

    .row-num {
      color: #555a7a;
      font-size: 0.78rem;
      text-align: center;
      user-select: none;
    }

    #tableContainer {
      display: none;
    }
  </style>
</head>
<body>

  <h1>CSV Parser</h1>

  <div class="input-section">
    <textarea id="csvInput" placeholder='Paste CSV here, e.g.:
name,age,city
"Smith, John",30,"New York"
"Jane ""The Great"" Doe",25,London'></textarea>
    <div class="btn-row">
      <button id="parseBtn">Parse CSV</button>
      <button id="loadSampleBtn">Load Sample</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <div id="error"></div>
  <div id="info"></div>

  <div id="tableContainer">
    <div class="table-wrapper">
      <table id="csvTable">
        <thead id="csvHead"></thead>
        <tbody id="csvBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SAMPLE = `name,age,city,notes
"Smith, John",30,"New York","Loves ""pizza"" and coding"
Jane Doe,25,London,Regular field
"Bob
Newline",40,Paris,"Multi-line
field example"
Alice,35,"San Francisco, CA","Quoted, with, many, commas"
"Eve ""Hacker"" Stone",28,Berlin,Escaped quotes test`;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;
      let i = 0;

      // Normalize line endings
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

      while (i < text.length) {
        const ch = text[i];

        if (inQuotes) {
          if (ch === '"') {
            // Peek ahead
            if (text[i + 1] === '"') {
              // Escaped quote: "" -> "
              field += '"';
              i += 2;
            } else {
              // Closing quote
              inQuotes = false;
              i++;
            }
          } else {
            field += ch;
            i++;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
            i++;
          } else if (ch === ',') {
            row.push(field);
            field = '';
            i++;
          } else if (ch === '\n') {
            row.push(field);
            field = '';
            rows.push(row);
            row = [];
            i++;
          } else {
            field += ch;
            i++;
          }
        }
      }

      // Push last field and row
      if (field !== '' || row.length > 0) {
        row.push(field);
        rows.push(row);
      }

      // Remove trailing empty row if CSV ends with newline
      if (rows.length > 0) {
        const last = rows[rows.length - 1];
        if (last.length === 1 && last[0] === '') {
          rows.pop();
        }
      }

      return rows;
    }

    function renderTable(rows) {
      const head = document.getElementById('csvHead');
      const body = document.getElementById('csvBody');
      head.innerHTML = '';
      body.innerHTML = '';

      if (rows.length === 0) return;

      const headers = rows[0];
      const colCount = Math.max(...rows.map(r => r.length));

      // Header row
      const headTr = document.createElement('tr');
      const numTh = document.createElement('th');
      numTh.textContent = '#';
      numTh.className = 'row-num';
      headTr.appendChild(numTh);
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headTr.appendChild(th);
      });
      // Fill missing header columns
      for (let i = headers.length; i < colCount; i++) {
        const th = document.createElement('th');
        th.textContent = `Col ${i + 1}`;
        headTr.appendChild(th);
      }
      head.appendChild(headTr);

      // Data rows
      rows.slice(1).forEach((row, idx) => {
        const tr = document.createElement('tr');
        const numTd = document.createElement('td');
        numTd.textContent = idx + 1;
        numTd.className = 'row-num';
        tr.appendChild(numTd);
        for (let c = 0; c < colCount; c++) {
          const td = document.createElement('td');
          td.textContent = row[c] !== undefined ? row[c] : '';
          tr.appendChild(td);
        }
        body.appendChild(tr);
      });
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('info').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'none';
    }

    function showInfo(msg) {
      const el = document.getElementById('info');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error').style.display = 'none';
    }

    document.getElementById('parseBtn').addEventListener('click', () => {
      const raw = document.getElementById('csvInput').value.trim();
      if (!raw) {
        showError('Please paste some CSV data first.');
        return;
      }

      try {
        const rows = parseCSV(raw);
        if (rows.length === 0) {
          showError('No data found.');
          return;
        }
        renderTable(rows);
        document.getElementById('tableContainer').style.display = 'block';
        showInfo(`Parsed ${rows.length - 1} data row(s) with ${rows[0].length} column(s).`);
      } catch (e) {
        showError('Parse error: ' + e.message);
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('csvInput').value = '';
      document.getElementById('error').style.display = 'none';
      document.getElementById('info').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'none';
    });

    document.getElementById('loadSampleBtn').addEventListener('click', () => {
      document.getElementById('csvInput').value = SAMPLE;
    });
  </script>

</body>
</html>
