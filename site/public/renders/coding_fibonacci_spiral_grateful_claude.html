<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fibonacci Spiral – Bug Debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      gap: 32px;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: #a78bfa;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      text-align: center;
      max-width: 680px;
      line-height: 1.6;
    }

    /* ── Bug explanation card ── */
    .bug-card {
      background: #1e1e2e;
      border: 1px solid #3b3b5c;
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 860px;
      width: 100%;
    }

    .bug-card h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bug-card h2.bad  { color: #f87171; }
    .bug-card h2.good { color: #34d399; }

    .bug-card p { color: #cbd5e1; font-size: 0.9rem; line-height: 1.7; margin-bottom: 8px; }
    .bug-card p:last-child { margin-bottom: 0; }

    .inline-code {
      background: #2d2d44;
      color: #f9a8d4;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85em;
    }

    /* ── Canvas panels ── */
    .panels {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      width: 100%;
      max-width: 1100px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1 1 420px;
      max-width: 500px;
    }

    .panel-label {
      font-size: 1rem;
      font-weight: 600;
      padding: 6px 18px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .panel-label.bad  { background: #3b1f1f; color: #f87171; border: 1px solid #f87171; }
    .panel-label.good { background: #1a3028; color: #34d399; border: 1px solid #34d399; }

    canvas {
      border-radius: 10px;
      display: block;
      width: 100%;
      max-width: 460px;
      height: auto;
    }
    canvas.bad-canvas  { border: 2px solid #f87171; box-shadow: 0 0 20px #f8717140; }
    canvas.good-canvas { border: 2px solid #34d399; box-shadow: 0 0 20px #34d39940; }

    /* ── Sequence display ── */
    .seq-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      width: 100%;
      max-width: 860px;
    }

    .seq-chip {
      background: #1e1e2e;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      border: 1px solid #3b3b5c;
    }
    .seq-chip .idx { color: #64748b; font-size: 0.7rem; }
    .seq-chip .val-bad  { color: #f87171; }
    .seq-chip .val-good { color: #34d399; }

    /* ── Code diff ── */
    .code-block {
      background: #12121f;
      border: 1px solid #3b3b5c;
      border-radius: 10px;
      padding: 18px 20px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.82rem;
      line-height: 1.8;
      width: 100%;
      max-width: 860px;
      overflow-x: auto;
      white-space: pre;
    }

    .line-bad    { color: #f87171; background: #2a1212; display: block; padding: 0 4px; border-radius: 3px; }
    .line-good   { color: #34d399; background: #0d2018; display: block; padding: 0 4px; border-radius: 3px; }
    .line-neutral{ color: #94a3b8; display: block; padding: 0 4px; }
    .line-comment{ color: #6272a4; display: block; padding: 0 4px; }

    /* ── Summary table ── */
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 860px;
      font-size: 0.88rem;
    }
    th {
      background: #1e1e2e;
      color: #a78bfa;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 2px solid #3b3b5c;
    }
    td {
      padding: 9px 14px;
      border-bottom: 1px solid #2a2a40;
      color: #cbd5e1;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1a2e; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .tag.bug  { background: #3b1f1f; color: #f87171; }
    .tag.fix  { background: #1a3028; color: #34d399; }

    footer {
      color: #475569;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>🐛 Fibonacci Spiral — Bug Debug</h1>
<p class="subtitle">
  The developer claimed the <em>Canvas API was bugged</em>. After careful analysis the real culprit is
  the <strong>Fibonacci sequence generator itself</strong>
