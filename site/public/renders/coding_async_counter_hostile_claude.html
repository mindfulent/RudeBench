<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Condition: Real Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: #f8fafc;
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto;
  }

  @media (max-width: 680px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: #1e2130;
    border-radius: 14px;
    padding: 22px;
    border: 1px solid #2d3148;
  }

  .panel.buggy { border-top: 3px solid #ef4444; }
  .panel.fixed  { border-top: 3px solid #22c55e; }

  .panel-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .panel.buggy .panel-title { color: #ef4444; }
  .panel.fixed  .panel-title { color: #22c55e; }

  .panel-desc {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  /* Counter display */
  .counter-box {
    background: #13151f;
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    margin-bottom: 14px;
    border: 1px solid #2d3148;
  }

  .counter-value {
    font-size: 3.5rem;
    font-weight: 800;
    line-height: 1;
    transition: color 0.15s;
  }

  .counter-value.flash-bad  { color: #ef4444; }
  .counter-value.flash-good { color: #22c55e; }
  .counter-value.normal     { color: #f1f5f9; }

  .counter-meta {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 6px;
  }

  .expected {
    font-size: 0.82rem;
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    background: #1a1d2e;
  }

  .expected .label { color: #64748b; }
  .expected .val   { font-weight: 700; }
  .expected .val.match   { color: #22c55e; }
  .expected .val.mismatch { color: #ef4444; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  button {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.96); }

  .btn-inc {
    background: #3b82f6;
    color: #fff;
  }
  .btn-inc:hover { background: #2563eb; }

  .btn-spam {
    background: #f59e0b;
    color: #000;
  }
  .btn-spam:hover { background: #d97706; }

  .btn-reset {
    background: #374151;
    color: #e2e8f0;
    flex: 0 0 auto;
    padding: 10px 14px;
  }
  .btn-reset:hover { background: #4b5563; }

  /* Operation log */
  .log-title {
    font-size: 0.75rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .log {
    background: #13151f;
    border-radius: 8px;
    border: 1px solid #2d3148;
    height: 190px;
    overflow-y: auto;
    padding: 8px;
    font-size: 0.72rem;
    font-family: 'Courier New', monospace;
    scroll-behavior: smooth;
  }

  .log-entry {
    padding: 2px 4px;
    border-radius: 3px;
    margin-bottom: 2px;
    line-height: 1.5;
  }

  .log-entry.read    { color: #60a5fa; }
  .log-entry.write   { color: #a78bfa; }
  .log-entry.stale   { color: #ef4444; background: rgba(239,68,68,0.08); }
  .log-entry.ok      { color: #22c55e; }
  .log-entry.queued  { color: #f59e0b; }
  .log-entry.info    { color: #64748b; }

  /* Race visualiser */
  .race-vis {
    margin-top: 14px;
    background: #13151f;
    border-radius: 8px;
    border: 1px solid #2d3148;
    padding: 10px;
  }

  .race-vis-title {
    font-size: 0.72rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .ops-track {
    position: relative;
    height: 54px;
  }

  .op-bar {
    position: absolute;
    height: 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 0.65rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.3s;
  }

  .op-bar.row0 { top: 0; }
  .op-bar.row1 { top: 20px; }
  .op-bar.row2 { top: 40px; }

  /* Explanation box */
  .explainer {
    margin-top: 22px;
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 14px;
    padding: 20px 24px;
  }

  .explainer h2 {
    font-size: 1rem;
    color: #f1f5f9;
    margin-bottom: 12px;
