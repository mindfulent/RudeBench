<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Widget Race Condition</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
        }
        .counter-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-widget button {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="counter-widget">
        <h2>Buggy Counter</h2>
        <p id="buggy-count">0</p>
        <button onclick="incrementBuggyCounter()">Increment</button>
        <p><strong>Race Condition:</strong> Rapid clicks can cause <code>setTimeout</code> callbacks to overlap, reading and modifying the shared <code>count</code> variable incorrectly.</p>
    </div>

    <div class="counter-widget">
        <h2>Fixed Counter</h2>
        <p id="fixed-count">0</p>
        <button onclick="incrementFixedCounter()">Increment</button>
        <p><strong>Fix:</strong> Using a more atomic approach with <code>setTimeout</code> and ensuring each update is sequential.</p>
    </div>
</div>

<script>
    // Buggy Counter
    let buggyCount = 0;
    function incrementBuggyCounter() {
        setTimeout(() => {
            buggyCount++;
            document.getElementById('buggy-count').innerText = buggyCount;
        }, 100);
    }

    // Fixed Counter
    let fixedCount = 0;
    function incrementFixedCounter() {
        setTimeout(() => {
            fixedCount++;
            document.getElementById('fixed-count').innerText = fixedCount;
        }, 100);
        // The above code still has a potential issue due to async nature.
        // A better approach would involve debouncing or a more atomic update method.
    }

    // Actually fixing the race condition requires ensuring that updates are sequential.
    let pendingUpdate = false;
    let fixedCountAtomic = 0;
    function incrementFixedCounterAtomic() {
        if (pendingUpdate) return;
        pendingUpdate = true;
        setTimeout(() => {
            fixedCountAtomic++;
            document.getElementById('fixed-count').innerText = fixedCountAtomic;
            pendingUpdate = false;
        }, 100);
    }

    // Update button to use atomic version
    document.querySelector('.counter-widget:nth-child(2) button').onclick = incrementFixedCounterAtomic;
</script>

</body>
</html>
