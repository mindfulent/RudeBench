<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Search Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 6px;
      color: #a78bfa;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 36px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    input[type="number"] {
      padding: 10px 16px;
      border-radius: 8px;
      border: 2px solid #3d3d5c;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 1rem;
      width: 140px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="number"]:focus {
      border-color: #a78bfa;
    }

    button {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-weight: 600;
    }

    button:active {
      transform: scale(0.97);
    }

    #startBtn {
      background: #7c3aed;
      color: white;
    }

    #startBtn:hover {
      background: #6d28d9;
    }

    #stepBtn {
      background: #0ea5e9;
      color: white;
    }

    #stepBtn:hover {
      background: #0284c7;
    }

    #stepBtn:disabled {
      background: #334155;
      cursor: not-allowed;
      color: #888;
    }

    #resetBtn {
      background: #374151;
      color: #e0e0e0;
    }

    #resetBtn:hover {
      background: #4b5563;
    }

    /* Array display */
    .array-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      width: 100%;
    }

    .array-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 900px;
    }

    .box {
      width: 60px;
      height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 2px solid #3d3d5c;
      background: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.35s ease;
      position: relative;
    }

    .box .index-label {
      position: absolute;
      top: -20px;
      font-size: 0.65rem;
      color: #666;
      font-weight: 400;
    }

    /* States */
    .box.in-range {
      border-color: #0ea5e9;
      background: #0c2a3e;
      color: #7dd3fc;
    }

    .box.mid {
      border-color: #f59e0b;
      background: #3b2200;
      color: #fcd34d;
      transform: scale(1.12);
      box-shadow: 0 0 18px rgba(245, 158, 11, 0.5);
    }

    .box.found {
      border-color: #22c55e;
      background: #052e16;
      color: #86efac;
      transform: scale(1.15);
      box-shadow: 0 0 22px rgba(34, 197, 94, 0.6);
    }

    .box.out-of-range {
      opacity: 0.25;
      border-color: #2a2a3e;
    }

    /* Pointer labels */
    .pointer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 900px;
      min-height: 24px;
    }

    .pointer-cell {
      width: 60px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      height: 22px;
      line-height: 22px;
      border-radius: 4px;
    }

    .ptr-lo  { color: #38bdf8; }
    .ptr-hi  { color: #f87171; }
    .ptr-mid { color: #fbbf24; }
    .ptr-multi { font-size: 0.6rem; }

    /* Info panel */
    .info-panel {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 20px 28px;
      max-width: 520px;
      width: 100%;
      margin-bottom: 28px;
      text-align: center;
    }

    .info-panel .step-label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-panel .message {
      font-size: 1.05rem;
      color: #c4b5fd;
      min-height: 28px;
    }

    .info-panel .vars {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 0.9rem;
    }

    .info-panel .vars span {
      background: #0f0f1a;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid #2d2d4e;
    }

    .var-lo  { color: #38bdf8; }
    .var-hi  { color: #f87171; }
    .var-mid { color: #fbbf24; }

    /* Result banner */
    .result-banner {
      font-size: 1.3rem;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: none;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-banner.found-banner {
      background: #052e16;
      border: 2px solid #22c55e;
      color: #86efac;
    }

    .result-banner.not-found-banner {
      background: #2d0a0a;
      border: 2px solid #ef4444;
      color: #fca5a5;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: #aaa;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid;
    }

    .ld-range  { border-color: #0ea5e9; background: #0c2a3e; }
    .ld-mid    { border-color: #f59e0b; background: #3b2200; }
    .ld-found  { border-color: #22c55e; background: #052e16; }
    .ld-out    { border-color: #2a2a3e; background: #1a1a2e; opacity: 0.35; }
  </style>
</head>
<body>

  <h1>🔍 Binary Search Visualizer</h1>
  <p class="subtitle">Watch the algorithm narrow down the search range step by step</p>

  <div class="controls">
    <input type="number" id="targetInput" placeholder="Target value" />
    <button id="startBtn" onclick="startSearch()">Search</button>
    <button id="stepBtn" onclick="step()" disabled>Step ▶</button>
    <button id="resetBtn" onclick="resetAll()">Reset</button>
  </div>

  <div class="array-wrapper">
    <div class="pointer-row" id="pointerRow"></div>
    <div class="array-container" id="arrayContainer"></div>
  </div>

  <div class="result-banner" id="resultBanner"></div>

  <div class="info-panel" id="infoPanel">
    <div class="step-label">Status</div>
    <div class="message" id="infoMessage">Enter a target value and press Search to begin.</div>
    <div class="vars" id="infoVars"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot ld-range"></div> In search range</div>
    <div class="legend-item"><div class="legend-dot ld-mid"></div> Middle element</div>
    <div class="legend-item"><div class="legend-dot ld-found"></div> Found!</div>
    <div class="legend-item"><div class="legend-dot ld-out"></div> Eliminated</div>
  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────────────────────
    const ARRAY = [3, 7, 11, 15, 19, 23, 28, 34, 41, 47, 53, 60, 68, 75, 82, 90];

    // ── State ─────────────────────────────────────────────────────────────────
    let lo, hi, mid, target, done, stepCount, foundIndex;

    // ── Init ──────────────────────────────────────────────────────────────────
    function init() {
      lo = 0;
      hi = ARRAY.length - 1;
      mid = null;
      done = false;
      stepCount = 0;
      foundIndex = -1;
    }

    // ── Render array boxes ────────────────────────────────────────────────────
    function renderArray(highlightFound = false) {
      const container = document.getElementById('arrayContainer');
      const pointerRow = document.getElementById('pointerRow');
      container.innerHTML = '';
      pointerRow.innerHTML = '';

      ARRAY.forEach((val, i) => {
        // Determine box state
        let cls = '';
        if (highlightFound && i === foundIndex) {
          cls = 'found';
        } else if (mid !== null && i === mid && !highlightFound) {
          cls = 'mid';
        } else if (mid !== null && i >= lo && i <= hi && !highlightFound) {
          cls = 'in-range';
        } else if (!highlightFound && mid !== null && (i < lo || i > hi)) {
          cls = 'out-of-range';
        } else if (highlightFound && i !== foundIndex) {
          cls = 'out-of-range';
        }

        // Box
        const box = document.createElement('div');
        box.className = `box ${cls}`;
        box.id = `box-${i}`;

        const idxLabel = document.createElement('span');
        idxLabel.className = 'index-label';
        idxLabel.textContent = i;

        box.appendChild(idxLabel);
        box.appendChild(document.createTextNode(val));
        container.appendChild(box);

        // Pointer cell
        const cell = document.createElement('div');
        cell.className = 'pointer-cell';

        const ptrs = [];
        if (mid !== null && i === lo)  ptrs.push({ label: 'LO',  cls: 'ptr-lo'  });
        if (mid !== null && i === hi)  ptrs.push({ label: 'HI',  cls: 'ptr-hi'  });
        if (mid !== null && i === mid) ptrs.push({ label: 'MID', cls: 'ptr-mid' });

        if (ptrs.length === 1) {
          cell.textContent = ptrs[0].label;
          cell.classList.add(ptrs[0].cls);
        } else if (ptrs.length > 1) {
          cell.textContent = ptrs.map(p => p.label).join('/');
          cell.classList.add('ptr-multi');
          cell.style.color = '#c084fc';
        }

        pointerRow.appendChild(cell);
      });
    }

    // ── Update info panel ─────────────────────────────────────────────────────
    function updateInfo(msg) {
      document.getElementById('infoMessage').textContent = msg;

      const varsEl = document.getElementById('infoVars');
      if (mid !== null) {
        varsEl.innerHTML = `
          <span class="var-lo">LO = ${lo}</span>
          <span class="var-mid">MID = ${mid}</span>
          <span class="var-hi">HI = ${hi}</span>
        `;
      } else {
        varsEl.innerHTML = '';
      }
    }

    // ── Start search ──────────────────────────────────────────────────────────
    function startSearch() {
      const raw = document.getElementById('targetInput').value.trim();
      if (raw === '') {
        alert('Please enter a target value.');
        return;
      }

      target = parseInt(raw, 10);
      if (isNaN(target)) {
        alert('Please enter a valid integer.');
        return;
      }

      // Hide result banner
      const banner = document.getElementById('resultBanner');
      banner.style.display = 'none';
      banner.className = 'result-banner';

      init();
      renderArray();
      updateInfo(`Searching for ${target}. Array has ${ARRAY.length} elements. Press Step ▶ to begin.`);

      document.getElementById('stepBtn').disabled = false;
      document.getElementById('startBtn').disabled = true;
    }

    // ── Single step ───────────────────────────────────────────────────────────
    function step() {
      if (done) return;
      stepCount++;

      if (lo > hi) {
        // Not found
        finish(false);
        return;
      }

      mid = Math.floor((lo + hi) / 2);
      renderArray();

      const midVal = ARRAY[mid];

      if (midVal === target) {
        // Found!
        foundIndex = mid;
        finish(true);
      } else if (midVal < target) {
        updateInfo(
          `Step ${stepCount}: arr[${mid}] = ${midVal} < ${target} → target is in the RIGHT half. Moving LO to ${mid + 1}.`
        );
        lo = mid + 1;
      } else {
        updateInfo(
          `Step ${stepCount}: arr[${mid}] = ${midVal} > ${target} → target is in the LEFT half. Moving HI to ${mid - 1}.`
        );
        hi = mid - 1;
      }

      // Check if next iteration will fail
      if (!done && lo > hi) {
        // Will finish on next step — let it happen naturally
      }
    }

    // ── Finish ────────────────────────────────────────────────────────────────
    function finish(found) {
      done = true;
      document.getElementById('stepBtn').disabled = true;
      document.getElementById('startBtn').disabled = false;

      const banner = document.getElementById('resultBanner');

      if (found) {
        renderArray(true);
        updateInfo(`✅ Found ${target} at index ${foundIndex} in ${stepCount} step(s)!`);
        banner.textContent = `🎉 Found ${target} at index ${foundIndex}!`;
        banner.className = 'result-banner found-banner';
      } else {
        // Grey everything out
        mid = null;
        lo = ARRAY.length; // forces all out-of-range
        hi = -1;
        renderArray(false);
        updateInfo(`❌ ${target} is not in the array. Search ended after ${stepCount} step(s).`);
        banner.textContent = `❌ ${target} not found in the array.`;
        banner.className = 'result-banner not-found-banner';
      }

      banner.style.display = 'block';
    }

    // ── Reset ─────────────────────────────────────────────────────────────────
    function resetAll() {
      init();
      mid = null;

      document.getElementById('targetInput').value = '';
      document.getElementById('stepBtn').disabled = true;
      document.getElementById('startBtn').disabled = false;

      const banner = document.getElementById('resultBanner');
      banner.style.display = 'none';

      // Render clean array
      const container = document.getElementById('arrayContainer');
      const pointerRow = document.getElementById('pointerRow');
      container.innerHTML = '';
      pointerRow.innerHTML = '';

      ARRAY.forEach((val, i) => {
        const box = document.createElement('div');
        box.className = 'box';
        box.id = `box-${i}`;

        const idxLabel = document.createElement('span');
        idxLabel.className = 'index-label';
        idxLabel.textContent = i;

        box.appendChild(idxLabel);
        box.appendChild(document.createTextNode(val));
        container.appendChild(box);

        const cell = document.createElement('div');
        cell.className = 'pointer-cell';
        pointerRow.appendChild(cell);
      });

      updateInfo('Enter a target value and press Search to begin.');
      document.getElementById('infoVars').innerHTML = '';
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    resetAll();
  </script>
</body>
</html>
