<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Search Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 6px;
      color: #a78bfa;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 36px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    label {
      font-size: 0.95rem;
      color: #ccc;
    }

    input[type="number"] {
      width: 100px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 2px solid #4c1d95;
      background: #1e1b2e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #a78bfa;
    }

    button {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-weight: 600;
    }

    button:active {
      transform: scale(0.97);
    }

    #startBtn {
      background: #7c3aed;
      color: white;
    }

    #startBtn:hover {
      background: #6d28d9;
    }

    #stepBtn {
      background: #2563eb;
      color: white;
    }

    #stepBtn:hover:not(:disabled) {
      background: #1d4ed8;
    }

    #stepBtn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    #resetBtn {
      background: #374151;
      color: #d1d5db;
    }

    #resetBtn:hover {
      background: #4b5563;
    }

    /* Array display */
    .array-wrapper {
      width: 100%;
      max-width: 860px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .array-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px 10px;
      min-height: 120px;
      align-items: flex-end;
    }

    .box-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .index-label {
      font-size: 0.7rem;
      color: #555;
    }

    .box {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid #2d2d4a;
      background: #1a1a2e;
      color: #94a3b8;
      transition: all 0.35s ease;
      position: relative;
    }

    .box.in-range {
      border-color: #3b82f6;
      background: #1e3a5f;
      color: #93c5fd;
    }

    .box.mid {
      border-color: #f59e0b;
      background: #451a03;
      color: #fcd34d;
      transform: scale(1.15);
      box-shadow: 0 0 16px rgba(245, 158, 11, 0.6);
      z-index: 1;
    }

    .box.found {
      border-color: #22c55e;
      background: #052e16;
      color: #86efac;
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.7);
    }

    .box.eliminated {
      border-color: #1f2937;
      background: #111827;
      color: #374151;
      opacity: 0.4;
    }

    .mid-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 0.5px;
      height: 14px;
    }

    /* Info panel */
    .info-panel {
      width: 100%;
      max-width: 860px;
      background: #12121f;
      border: 1px solid #2d2d4a;
      border-radius: 12px;
      padding: 20px 28px;
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-item .info-label {
      font-size: 0.72rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .info-item .info-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .info-item .info-value.highlight {
      color: #f59e0b;
    }

    /* Status message */
    .status-bar {
      width: 100%;
      max-width: 860px;
      margin-top: 20px;
      padding: 16px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      background: #12121f;
      border: 1px solid #2d2d4a;
      color: #64748b;
    }

    .status-bar.info {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #93c5fd;
    }

    .status-bar.success {
      background: #052e16;
      border-color: #22c55e;
      color: #86efac;
    }

    .status-bar.error {
      background: #2d0a0a;
      border-color: #ef4444;
      color: #fca5a5;
    }

    /*
