<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REST API Design Review</title>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --good:      #22c55e;
      --bad:       #ef4444;
      --warn:      #f59e0b;
      --text:      #e2e8f0;
      --muted:     #8892b0;
      --get:       #3b82f6;
      --post:      #22c55e;
      --put:       #f59e0b;
      --patch:     #a78bfa;
      --delete:    #ef4444;
      --radius:    10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 auto 2.5rem;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .5rem;
    }
    header p {
      color: var(--muted);
      font-size: .95rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Score banner ── */
    .score-banner {
      max-width: 900px;
      margin: 0 auto 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }
    .score-banner h2 { font-size: 1rem; color: var(--muted); font-weight: 500; }
    .badges { display: flex; flex-wrap: wrap; gap: .6rem; }
    .badge {
      padding: .3rem .75rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .badge.bad  { background: #ef444420; color: var(--bad);  border: 1px solid #ef444440; }
    .badge.good { background: #22c55e20; color: var(--good); border: 1px solid #22c55e40; }
    .badge.warn { background: #f59e0b20; color: var(--warn); border: 1px solid #f59e0b40; }

    /* ── Principle cards ── */
    .principles {
      max-width: 900px;
      margin: 0 auto 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: .8rem;
    }
    .principle-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .principle-card .icon { font-size: 1.5rem; margin-bottom: .4rem; }
    .principle-card h3 { font-size: .85rem; color: var(--accent); margin-bottom: .25rem; }
    .principle-card p  { font-size: .78rem; color: var(--muted); line-height: 1.5; }

    /* ── Main content ── */
    main { max-width: 900px; margin: 0 auto; }

    /* ── Expandable card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.2rem;
      overflow: hidden;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.3rem;
      cursor: pointer;
      user-select: none;
      flex-wrap: wrap;
    }
    .card-header:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    .method-badge {
      padding: .28rem .7rem;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      flex-shrink: 0;
    }
    .GET    { background: #3b82f620; color: var(--get);    border: 1px solid #3b82f640; }
    .POST   { background: #22c55e20; color: var(--post);   border: 1px solid #22c55e40; }
    .PUT    { background: #f59e0b20; color: var(--put);    border: 1px solid #f59e0b40; }
    .PATCH  { background: #a78bfa20; color: var(--patch);  border: 1px solid #a78bfa40; }
    .DELETE { background: #ef444420; color: var(--delete); border: 1px solid #ef444440; }

    .endpoint-path {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: .9rem;
      color: var(--text);
      flex: 1;
    }
    .endpoint-desc {
      font-size: .82rem;
      color: var(--muted);
      margin-left: auto;
    }
    .chevron {
      margin-left: auto;
      color: var(--muted);
      transition: transform .3s;
      font-size: .9rem;
      flex-shrink: 0;
    }
    .card.open .chevron { transform: rotate(180deg); }

    /* ── Card body ── */
    .card-body {
      display: none;
      padding: 0 1.3rem 1.3rem;
      border-top: 1px solid var(--border);
    }
    .card.open .card-body { display: block; }

    /* ── Problem / Fix sections ── */
    .section-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin: 1.1rem 0 .6rem;
    }
    .section-label.bad  { color: var(--bad); }
    .section-label.good { color: var(--good); }
    .section-label.info { color: var(--accent); }

    /* Original endpoint display */
    .original-box {
      background: #ef444410;
      border: 1px solid #ef444
