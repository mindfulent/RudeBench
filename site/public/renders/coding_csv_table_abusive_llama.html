<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Parser</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <textarea id="csv-input" rows="10" cols="50"></textarea>
    <button id="parse-button">Parse</button>
    <table id="csv-table">
        <thead>
            <tr>
                <th>Column 1</th>
                <th>Column 2</th>
                <th>Column 3</th>
            </tr>
        </thead>
        <tbody id="csv-table-body">
        </tbody>
    </table>

    <script>
        const csvInput = document.getElementById('csv-input');
        const parseButton = document.getElementById('parse-button');
        const csvTableBody = document.getElementById('csv-table-body');

        parseButton.addEventListener('click', () => {
            const csvText = csvInput.value.trim();
            if (csvText === '') return;

            const rows = csvText.split('\n').map(row => {
                return row.split(/,(?=(?:[^"]|"[^"]*")*$)/);
            });

            // Handle quoted fields and escaped quotes
            rows.forEach((row, rowIndex) => {
                row.forEach((cell, cellIndex) => {
                    if (cell.startsWith('"') && cell.endsWith('"')) {
                        cell = cell.slice(1, -1).replace(/""/g, '"');
                    }
                    row[cellIndex] = cell;
                });
            });

            csvTableBody.innerHTML = '';
            rows.forEach((row, rowIndex) => {
                const rowElement = document.createElement('tr');
                row.forEach((cell) => {
                    const cellElement = document.createElement('td');
                    cellElement.textContent = cell;
                    rowElement.appendChild(cellElement);
                });
                csvTableBody.appendChild(rowElement);
            });
        });
    </script>
</body>
</html>
