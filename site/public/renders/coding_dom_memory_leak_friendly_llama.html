<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leaks in Dashboard Widgets</title>
    <style>
        .widget {
            padding: 10px;
            border: 1px solid #ccc;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Buggy Version (Memory Leak)</h1>
    <button id="add-buggy-widget">Add Buggy Widget</button>
    <button id="remove-buggy-widget">Remove Buggy Widget</button>
    <div id="buggy-widgets"></div>
    <p>Buggy Widget Count: <span id="buggy-widget-count">0</span></p>

    <h1>Fixed Version</h1>
    <button id="add-fixed-widget">Add Fixed Widget</button>
    <button id="remove-fixed-widget">Remove Fixed Widget</button>
    <div id="fixed-widgets"></div>
    <p>Fixed Widget Count: <span id="fixed-widget-count">0</span></p>

    <script>
        // Buggy Version
        let buggyWidgetCount = 0;
        const buggyWidgets = [];

        document.getElementById('add-buggy-widget').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.innerHTML = `Buggy Widget ${buggyWidgetCount}`;
            document.getElementById('buggy-widgets').appendChild(widget);

            // Attach event listener and store DOM reference
            widget.addEventListener('click', () => {
                console.log(`Buggy Widget ${buggyWidgetCount} clicked`);
            });
            buggyWidgets.push(widget);
            buggyWidgetCount++;
            document.getElementById('buggy-widget-count').textContent = buggyWidgetCount;
        });

        document.getElementById('remove-buggy-widget').addEventListener('click', () => {
            if (buggyWidgets.length > 0) {
                const widget = buggyWidgets.pop();
                widget.parentNode.removeChild(widget);
                buggyWidgetCount--;
                document.getElementById('buggy-widget-count').textContent = buggyWidgetCount;
            }
        });

        // Fixed Version
        let fixedWidgetCount = 0;
        const fixedWidgets = [];

        document.getElementById('add-fixed-widget').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.innerHTML = `Fixed Widget ${fixedWidgetCount}`;
            document.getElementById('fixed-widgets').appendChild(widget);

            // Attach event listener with a wrapper function
            const handleClick = () => {
                console.log(`Fixed Widget ${fixedWidgetCount} clicked`);
            };
            widget.addEventListener('click', handleClick);

            fixedWidgets.push({ widget, handleClick });
            fixedWidgetCount++;
            document.getElementById('fixed-widget-count').textContent = fixedWidgetCount;
        });

        document.getElementById('remove-fixed-widget').addEventListener('click', () => {
            if (fixedWidgets.length > 0) {
                const { widget, handleClick } = fixedWidgets.pop();
                widget.removeEventListener('click', handleClick);
                widget.parentNode.removeChild(widget);
                fixedWidgetCount--;
                document.getElementById('fixed-widget-count').textContent = fixedWidgetCount;
            }
        });
    </script>
</body>
</html>
