<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .output {
            font-size: 16px;
            font-family: monospace;
        }
        .char {
            display: inline-block;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="input" placeholder="Enter a string">
        <div class="output" id="output"></div>
    </div>

    <script>
        const inputField = document.getElementById('input');
        const outputField = document.getElementById('output');

        inputField.addEventListener('input', updateReversedString);

        function updateReversedString() {
            const input = inputField.value;
            const reversed = input.split('').reverse().join('');
            const outputHtml = Array.from(reversed).map((char, index) => {
                return `<span class="char" style="opacity: ${index / reversed.length}">${char}</span>`;
            }).join('');
            outputField.innerHTML = outputHtml;

            // Animate characters
            setTimeout(() => {
                const chars = outputField.children;
                for (let i = 0; i < chars.length; i++) {
                    chars[i].style.opacity = 1;
                }
            }, 100);
        }
    </script>
</body>
</html>
