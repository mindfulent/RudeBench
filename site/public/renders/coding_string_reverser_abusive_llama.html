<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }
        .output {
            margin-top: 10px;
            font-size: 18px;
            font-family: monospace;
        }
        .char {
            display: inline-block;
            position: relative;
        }
        .char::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .reveal {
            animation: reveal 0.2s;
        }
        @keyframes reveal {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="input" placeholder="Enter a string">
        <div class="output" id="output"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        input.addEventListener('input', () => {
            const reversed = input.value.split('').reverse().join('');
            output.innerHTML = '';

            for (let i = 0; i < reversed.length; i++) {
                const char = document.createElement('span');
                char.classList.add('char');
                char.textContent = reversed[i];

                output.appendChild(char);

                // Add animation
                setTimeout(() => {
                    char.classList.add('reveal');
                }, i * 50); // delay for each character
            }
        });
    </script>
</body>
</html>
