<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Leak Demo</title>
<style>
  .widget {
    padding: 10px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
  }
</style>

<body>
<h1>Memory Leak Demo</h1>

<h2>Leaking Version</h2>
<button id="add-leaking-widget">Add Leaking Widget</button>
<button id="remove-leaking-widget">Remove Leaking Widget</button>
<div id="leaking-widgets"></div>
<p>Leaking widget count: <span id="leaking-widget-count">0</span></p>

<h2>Fixed Version</h2>
<button id="add-fixed-widget">Add Fixed Widget</button>
<button id="remove-fixed-widget">Remove Fixed Widget</button>
<div id="fixed-widgets"></div>
<p>Fixed widget count: <span id="fixed-widget-count">0</span></p>

<script>
  let leakingWidgetCount = 0;
  let fixedWidgetCount = 0;

  // Leaking version
  const leakingWidgets = document.getElementById('leaking-widgets');
  const addLeakingWidgetButton = document.getElementById('add-leaking-widget');
  const removeLeakingWidgetButton = document.getElementById('remove-leaking-widget');
  const leakingWidgetCountSpan = document.getElementById('leaking-widget-count');

  addLeakingWidgetButton.addEventListener('click', () => {
    const widget = document.createElement('div');
    widget.className = 'widget';
    widget.textContent = `Leaking Widget ${leakingWidgetCount}`;
    leakingWidgets.appendChild(widget);

    // Attach event listener and store DOM reference
    widget.addEventListener('click', () => console.log('Leaking widget clicked'));
    window.leakingWidgetRefs = window.leakingWidgetRefs || [];
    window.leakingWidgetRefs.push(widget);

    leakingWidgetCount++;
    leakingWidgetCountSpan.textContent = leakingWidgetCount;
  });

  removeLeakingWidgetButton.addEventListener('click', () => {
    if (leakingWidgets.children.length > 0) {
      leakingWidgets.removeChild(leakingWidgets.firstChild);
      leakingWidgetCount--;
      leakingWidgetCountSpan.textContent = leakingWidgetCount;
    }
  });

  // Fixed version
  const fixedWidgets = document.getElementById('fixed-widgets');
  const addFixedWidgetButton = document.getElementById('add-fixed-widget');
  const removeFixedWidgetButton = document.getElementById('remove-fixed-widget');
  const fixedWidgetCountSpan = document.getElementById('fixed-widget-count');

  addFixedWidgetButton.addEventListener('click', () => {
    const widget = document.createElement('div');
    widget.className = 'widget';
    widget.textContent = `Fixed Widget ${fixedWidgetCount}`;

    // No event listener or stored reference needed
    fixedWidgets.appendChild(widget);

    fixedWidgetCount++;
    fixedWidgetCountSpan.textContent = fixedWidgetCount;
  });

  removeFixedWidgetButton.addEventListener('click', () => {
    if (fixedWidgets.children.length > 0) {
      fixedWidgets.removeChild(fixedWidgets.firstChild);
      fixedWidgetCount--;
      fixedWidgetCountSpan.textContent = fixedWidgetCount;
    }
  });
</script>

<button onclick="gc();console.log('GC ran')">Run GC</button>
</body>
</html>
