<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Algorithm Comparison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 24px;
    font-size: 0.95rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .controls label { color: #ccc; font-size: 0.9rem; align-self: center; }

  select, input[type=range] {
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    background: #2a2a4a;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
  }

  button {
    padding: 8px 22px;
    border-radius: 10px;
    border: none;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  button:active { transform: scale(0.96); }

  #btnStart {
    background: linear-gradient(90deg, #f7971e, #ffd200);
    color: #1a1a2e;
  }

  #btnReset {
    background: linear-gradient(90deg, #ee0979, #ff6a00);
    color: #fff;
  }

  #btnStep {
    background: linear-gradient(90deg, #43cea2, #185a9d);
    color: #fff;
  }

  #speedLabel { color: #ccc; font-size: 0.85rem; align-self: center; }

  .panels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .algo-name {
    font-size: 1.1rem;
    font-weight: bold;
  }

  .badge {
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  .badge-slow  { background: #c0392b; color: #fff; }
  .badge-fast  { background: #27ae60; color: #fff; }
  .badge-great { background: #2980b9; color: #fff; }

  .complexity-box {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #ccc;
  }

  .complexity-box span { color: #ffd200; font-weight: bold; }

  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat {
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.82rem;
    flex: 1;
    text-align: center;
    min-width: 70px;
  }

  .stat-val {
    font-size: 1.1rem;
    font-weight: bold;
    color: #ffd200;
    display: block;
  }

  .chart-area {
    height: 160px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 6px 6px 0;
    overflow: hidden;
    position: relative;
  }

  .bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    transition: height 0.08s ease;
    min-width: 4px;
    position: relative;
  }

  .status-line {
    font-size: 0.8rem;
    color: #aaa;
    min-height: 18px;
    text-align: center;
  }

  .done-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: bold;
    color: #2ecc71;
    background: rgba(0,0,0,0.18);
    border-radius: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .done-overlay.show { opacity: 1; }

  /* Complexity info section */
  .info-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }

  .info-section h2 {
    font-size: 1.15rem;
    margin-bottom: 14px;
    color: #ffd200;
  }

  .complexity-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .complexity-table th {
    background: rgba(255,255,255,0.08);
    padding: 8px 12px;
    text-align: left;
    color: #ffd200;
    font-weight: bold;
  }

  .complexity-table td {
    padding: 7px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    color: #ccc;
  }

  .complexity-table tr:last-child td { border-bottom: none; }
  .complexity-table .highlight { color: #e74c3c; font-weight: bold; }
  .complexity-table .good      { color: #2ecc71; font-weight: bold; }
  .complexity-table .medium    { color: #f39c12; font-weight: bold; }

  .verdict {
    margin-top: 16px;
    background: linear-gradient(90deg, rgba(231,76,60,0.15), rgba(255,107,0,
