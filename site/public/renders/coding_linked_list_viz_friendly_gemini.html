<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singly Linked List Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            color: #333;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 2.2em;
        }

        .controls {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 25px 35px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 30px;
            width: 80%;
            max-width: 900px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-weight: bold;
            color: #555;
            font-size: 0.95em;
        }

        .controls input[type="number"],
        .controls input[type="text"] {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            width: calc(100% - 30px); /* Adjust for padding */
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        .controls input[type="number"]:focus,
        .controls input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .controls button {
            padding: 12px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .controls button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .controls button:active {
            transform: translateY(0);
        }

        .list-container {
            min-height: 150px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
            width: 80%;
            max-width: 900px;
            display: flex;
            flex-wrap: wrap; /* Allows nodes to wrap if too many */
            justify-content: center;
            align-items: center;
            gap: 40px; /* Space between nodes and arrows */
            position: relative;
            overflow-x: auto; /* Enable horizontal scrolling if needed */
        }

        .empty-list-message {
            color: #7f8c8d;
            font-style: italic;
            font-size: 1.2em;
        }

        .node-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1; /* Ensure nodes are above arrows */
        }

        .node {
            width: 70px;
            height: 70px;
            background-color: #ecf0f1;
            border: 2px solid #34495e;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.3em;
            color: #34495e;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
        }

        .node.highlight {
            background-color: #f1c40f;
            border-color: #e67e22;
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(241, 196, 15, 0.4);
            z-index: 2; /* Bring highlighted node to front */
        }

        .node.deleted {
            background-color: #e74c3c;
            border-color: #c0392b;
            color: white;
            transform: scale(0.8);
            opacity: 0.5;
            transition: background-color 0.5s ease, transform 0.5s ease, opacity 0.5s ease;
        }

        .node-arrow {
            width: 40px; /* Space for the arrow */
            height: 2px;
            background-color: #34495e;
            position: relative;
            margin: 0 10px; /* Add margin to separate node from arrow */
        }

        .node-arrow::after {
            content: '';
            position: absolute;
            right: -5px; /* Position the arrowhead */
            top: -4px; /* Center the arrowhead vertically */
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 10px solid #34495e;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
                padding: 20px;
                width: 95%;
            }
            .list-container {
                width: 95%;
                padding: 15px;
            }
            .node {
                width: 60px;
                height: 60px;
                font-size: 1.1em;
            }
            .node-arrow {
                width: 30px;
            }
        }
    </style>
</head>
<body>
    <h1>Singly Linked List Visualizer</h1>

    <div class="controls">
        <div class="control-group">
            <label for="insertHeadValue">Insert at Head:</label>
            <input type="number" id="insertHeadValue" placeholder="Enter value">
            <button onclick="insertAtHead()">Insert</button>
        </div>

        <div class="control-group">
            <label for="insertTailValue">Insert at Tail:</label>
            <input type="number" id="insertTailValue" placeholder="Enter value">
            <button onclick="insertAtTail()">Insert</button>
        </div>

        <div class="control-group">
            <label for="deleteValue">Delete by Value:</label>
            <input type="number" id="deleteValue" placeholder="Enter value to delete">
            <button onclick="deleteByValue()">Delete</button>
        </div>

        <div class="control-group">
            <label for="searchValue">Search by Value:</label>
            <input type="number" id="searchValue" placeholder="Enter value to search">
            <button onclick="searchByValue()">Search</button>
        </div>
    </div>

    <div id="listContainer" class="list-container">
        <p class="empty-list-message" id="emptyMessage">List is empty. Add some nodes!</p>
    </div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
                this.size = 0;
            }

            insertAtHead(value) {
                const newNode = new Node(value);
                newNode.next = this.head;
                this.head = newNode;
                this.size++;
                this.render();
            }

            insertAtTail(value) {
                const newNode = new Node(value);
                if (!this.head) {
                    this.head = newNode;
                } else {
                    let current = this.head;
                    while (current.next) {
                        current = current.next;
                    }
                    current.next = newNode;
                }
                this.size++;
                this.render();
            }

            deleteByValue(value) {
                if (!this.head) {
                    alert("List is empty. Cannot delete.");
                    return false;
                }

                if (this.head.value === value) {
                    this.head = this.head.next;
                    this.size--;
                    this.render();
                    return true;
                }

                let current = this.head;
                let prev = null;
                while (current && current.value !== value) {
                    prev = current;
                    current = current.next;
                }

                if (current) {
                    prev.next = current.next;
                    this.size--;
                    this.render();
                    return true;
                } else {
                    alert(`Value ${value} not found in the list.`);
                    return false;
                }
            }

            search(value) {
                let current = this.head;
                let foundNode = null;
                while (current) {
                    if (current.value === value) {
                        foundNode = current;
                        break;
                    }
                    current = current.next;
                }
                return foundNode;
            }

            // Renders the list visually
            render(highlightNode = null) {
                const listContainer = document.getElementById('listContainer');
                listContainer.innerHTML = ''; // Clear previous rendering

                if (!this.head) {
                    listContainer.innerHTML = '<p class="empty-list-message" id="emptyMessage">List is empty. Add some nodes!</p>';
                    return;
                }

                document.getElementById('emptyMessage')?.remove(); // Remove empty message if present

                let current = this.head;
                while (current) {
                    const nodeWrapper = document.createElement('div');
                    nodeWrapper.className = 'node-wrapper';

                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = 'node';
                    nodeDiv.textContent = current.value;

                    if (current === highlightNode) {
                        nodeDiv.classList.add('highlight');
                    }

                    nodeWrapper.appendChild(nodeDiv);

                    if (current.next) {
                        const arrowDiv = document.createElement('div');
                        arrowDiv.className = 'node-arrow';
                        nodeWrapper.appendChild(arrowDiv);
                    }

                    listContainer.appendChild(nodeWrapper);
                    current = current.next;
                }
            }
        }

        const linkedList = new LinkedList();

        function insertAtHead() {
            const input = document.getElementById('insertHeadValue');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                linkedList.insertAtHead(value);
                input.value = ''; // Clear input
            } else {
                alert("Please enter a valid number for insert at head.");
            }
        }

        function insertAtTail() {
            const input = document.getElementById('insertTailValue');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                linkedList.insertAtTail(value);
                input.value = ''; // Clear input
            } else {
                alert("Please enter a valid number for insert at tail.");
            }
        }

        function deleteByValue() {
            const input = document.getElementById('deleteValue');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                linkedList.deleteByValue(value);
                input.value = ''; // Clear input
            } else {
                alert("Please enter a valid number for delete by value.");
            }
        }

        async function searchByValue() {
            const input = document.getElementById('searchValue');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                const foundNode = linkedList.search(value);
                if (foundNode) {
                    linkedList.render(foundNode); // Render with the found node highlighted
                    await new Promise(resolve => setTimeout(resolve, 1500)); // Keep highlighted for 1.5 seconds
                    linkedList.render(); // Re-render to remove highlight
                } else {
                    alert(`Value ${value} not found in the list.`);
                    linkedList.render(); // Ensure any previous highlight is removed
                }
                input.value = ''; // Clear input
            } else {
                alert("Please enter a valid number for search by value.");
            }
        }

        // Initial render for empty list message
        linkedList.render();
    </script>
</body>
</html>
