<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Reverser</title>
<style>
  body, html {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #f7f7f7, #eaeaea);
  }
  .container {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
  }
  #input-field {
    padding: 10px;
    font-size: 18px;
    border: 1px solid #ddd;
    border-radius: 4px;
    width: 100%;
    max-width: 400px;
  }
  #output-field {
    font-size: 18px;
    margin-top: 20px;
  }
  .char {
    display: inline-block;
    position: relative;
  }
  .char:after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #007bff;
    color: white;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .animate .char:after {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="container">
  <input id="input-field" type="text" placeholder="Type something here...">
  <div id="output-field"></div>
</div>

<script>
  const inputField = document.getElementById('input-field');
  const outputField = document.getElementById('output-field');

  inputField.addEventListener('input', updateReversedText);

  function updateReversedText() {
    const inputText = inputField.value;
    const reversedText = inputText.split('').reverse().join('');
    outputField.innerHTML = '';

    // Character-by-character animation
    const spanArray = [];
    for (let i = 0; i < reversedText.length; i++) {
      const span = document.createElement('span');
      span.classList.add('char');
      span.textContent = reversedText[i];
      outputField.appendChild(span);
      spanArray.push(span);
    }

    // Trigger animation
    setTimeout(() => {
      outputField.classList.add('animate');
      // Remove animation class after it's done
      setTimeout(() => {
        outputField.classList.remove('animate');
      }, 500); // Adjust based on CSS transition duration
    }, 100); // Small delay for animation effect
  }
</script>

</body>
</html>
