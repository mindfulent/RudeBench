<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverser</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
            overflow: hidden; /* Prevent scrollbar from animation overflow */
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 1px solid #e0e0e0;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.2em;
            font-weight: 600;
        }

        textarea {
            width: calc(100% - 20px);
            padding: 15px;
            margin-bottom: 25px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 1.1em;
            line-height: 1.5;
            box-sizing: border-box;
            resize: vertical; /* Allow vertical resizing */
            min-height: 100px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            color: #333;
            background-color: #fcfcfc;
        }

        textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
            outline: none;
        }

        #outputContainer {
            min-height: 50px; /* Ensure there's always space for output */
            text-align: left;
            padding: 15px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background-color: #e9ecef;
            font-size: 1.3em;
            line-height: 1.6;
            word-wrap: break-word; /* Ensure long words break */
            color: #28a745; /* A nice green for output */
            font-weight: 500;
            overflow-x: auto; /* Allow horizontal scrolling for very long lines */
        }

        /* Animation for individual characters */
        .char-animated {
            display: inline-block; /* Essential for transform on inline elements */
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInSlideUp 0.3s ease-out forwards;
            /* We'll set animation-delay dynamically in JS */
        }

        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>String Reverser</h1>
        <textarea id="inputText" placeholder="Type your text here..." rows="5"></textarea>
        <div id="outputContainer"></div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputContainer = document.getElementById('outputContainer');

        function reverseStringAndAnimate(str) {
            // Split into an array of characters, reverse, and join
            const reversedStr = str.split('').reverse().join('');

            // Clear previous output
            outputContainer.innerHTML = '';

            if (reversedStr.length === 0) {
                return;
            }

            // Create a document fragment to efficiently append characters
            const fragment = document.createDocumentFragment();

            reversedStr.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char;
                span.classList.add('char-animated');
                // Calculate delay for each character
                span.style.animationDelay = `${index * 0.03}s`; // 30ms delay per character
                fragment.appendChild(span);
            });

            outputContainer.appendChild(fragment);
        }

        // Event listener for real-time updates
        inputText.addEventListener('input', (event) => {
            reverseStringAndAnimate(event.target.value);
        });

        // Initialize with an empty string or example text
        reverseStringAndAnimate('');
    </script>

</body>
</html>
