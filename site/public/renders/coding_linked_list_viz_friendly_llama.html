<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linked List Visualizer</title>
<style>
  .node {
    display: inline-block;
    padding: 10px;
    border: 1px solid black;
    margin: 5px;
    border-radius: 5px;
    position: relative;
  }
  .arrow {
    position: absolute;
    top: 50%;
    right: -20px;
    transform: translateY(-50%);
    font-size: 20px;
  }
  .highlight {
    background-color: yellow;
  }
</style>
</head>
<body>

<div id="listContainer"></div>

<input id="valueInput" type="number" placeholder="Value">
<button id="insertHeadBtn">Insert at Head</button>
<button id="insertTailBtn">Insert at Tail</button>
<button id="deleteBtn">Delete by Value</button>
<button id="searchBtn">Search</button>

<script>
  class Node {
    constructor(value) {
      this.value = value;
      this.next = null;
    }
  }

  class LinkedList {
    constructor() {
      this.head = null;
      this.tail = null;
      this.size = 0;
    }

    insertAtHead(value) {
      const node = new Node(value);
      if (!this.head) {
        this.head = node;
        this.tail = node;
      } else {
        node.next = this.head;
        this.head = node;
      }
      this.size++;
    }

    insertAtTail(value) {
      const node = new Node(value);
      if (!this.tail) {
        this.head = node;
        this.tail = node;
      } else {
        this.tail.next = node;
        this.tail = node;
      }
      this.size++;
    }

    deleteByValue(value) {
      if (!this.head) return;

      if (this.head.value === value) {
        this.head = this.head.next;
        if (!this.head) this.tail = null;
        this.size--;
        return;
      }

      let current = this.head;
      while (current.next) {
        if (current.next.value === value) {
          current.next = current.next.next;
          if (!current.next) this.tail = current;
          this.size--;
          return;
        }
        current = current.next;
      }
    }

    search(value) {
      let current = this.head;
      while (current) {
        if (current.value === value) {
          return current;
        }
        current = current.next;
      }
      return null;
    }

    render(container) {
      container.innerHTML = '';
      let current = this.head;
      let nodesHtml = '';
      while (current) {
        nodesHtml += `
          <div class="node" data-value="${current.value}">
            ${current.value}
            ${current.next ? '<div class="arrow">&rarr;</div>' : ''}
          </div>
        `;
        current = current.next;
      }
      if (!nodesHtml) nodesHtml = '<div style="padding: 10px;">List is empty</div>';
      container.innerHTML = nodesHtml;
    }
  }

  const list = new LinkedList();
  const container = document.getElementById('listContainer');
  const valueInput = document.getElementById('valueInput');
  const insertHeadBtn = document.getElementById('insertHeadBtn');
  const insertTailBtn = document.getElementById('insertTailBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const searchBtn = document.getElementById('searchBtn');

  insertHeadBtn.onclick = () => {
    const value = parseInt(valueInput.value);
    if (!isNaN(value)) {
      list.insertAtHead(value);
      list.render(container);
    }
  };

  insertTailBtn.onclick = () => {
    const value = parseInt(valueInput.value);
    if (!isNaN(value)) {
      list.insertAtTail(value);
      list.render(container);
    }
  };

  deleteBtn.onclick = () => {
    const value = parseInt(valueInput.value);
    if (!isNaN(value)) {
      list.deleteByValue(value);
      list.render(container);
    }
  };

  searchBtn.onclick = () => {
    const value = parseInt(valueInput.value);
    if (!isNaN(value)) {
      const foundNode = list.search(value);
      if (foundNode) {
        const nodes = container.children;
        for (let i = 0; i < nodes.length; i++) {
          if (nodes[i].dataset.value == value) {
            nodes[i].classList.add('highlight');
          } else {
            nodes[i].classList.remove('highlight');
          }
        }
      } else {
        alert('Value not found in the list');
      }
    }
  };

  // Initial render
  list.render(container);
</script>

</body>
</html>
