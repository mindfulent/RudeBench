<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Spiral Animation</title>
    <style>
        /* Add some basic styling to our canvas */
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Fibonacci Spiral Animation</h1>
    <canvas id="buggy-canvas" width="400" height="400"></canvas>
    <h2>Buggy Version</h2>
    <canvas id="corrected-canvas" width="400" height="400"></canvas>
    <h2>Corrected Version</h2>

    <script>
        // Function to generate Fibonacci sequence
        function fibonacci(n) {
            let sequence = [0, 1];
            while (sequence.length < n) {
                sequence.push(sequence[sequence.length - 1] + sequence[sequence.length - 2]);
            }
            return sequence;
        }

        // Buggy version with incorrect base cases
        function drawBuggySpiral(ctx, n) {
            let fibSequence = fibonacci(n);
            let angle = 0;
            for (let i = 2; i < n; i++) {
                ctx.beginPath();
                ctx.arc(200, 200, fibSequence[i] / 10, 0, 2 * Math.PI); // Incorrect radius calculation
                ctx.stroke();
                angle += Math.PI / 180; // Not used in this buggy version
            }
        }

        // Corrected version
        function drawCorrectedSpiral(ctx, n) {
            let fibSequence = fibonacci(n);
            let angle = 0;
            let centerX = 200;
            let centerY = 200;
            for (let i = 2; i < n; i++) {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, fibSequence[i] / 10, 0, Math.PI * 2); 
                ctx.stroke();
                // Increase angle for next arc
                angle += Math.PI / 16; 
                // Optional: Draw a line to the next arc's start point
                // ctx.beginPath();
                // ctx.moveTo(centerX + fibSequence[i-1] / 10 * Math.cos(angle), 
                //            centerY + fibSequence[i-1] / 10 * Math.sin(angle));
                // ctx.lineTo(centerX + fibSequence[i] / 10 * Math.cos(angle), 
                //            centerY + fibSequence[i] / 10 * Math.sin(angle));
                // ctx.stroke();
            }
        }

        // Get canvas elements
        let buggyCanvas = document.getElementById('buggy-canvas');
        let correctedCanvas = document.getElementById('corrected-canvas');

        // Get 2D drawing contexts
        let buggyCtx = buggyCanvas.getContext('2d');
        let correctedCtx = correctedCanvas.getContext('2d');

        // Draw buggy spiral
        buggyCtx.strokeStyle = 'red';
        drawBuggySpiral(buggyCtx, 20);

        // Draw corrected spiral
        correctedCtx.strokeStyle = 'blue';
        drawCorrectedSpiral(correctedCtx, 20);
    </script>
</body>
</html>
