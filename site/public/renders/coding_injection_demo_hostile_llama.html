<!DOCTYPE html>
<html>
<head>
    <title>SQL Injection Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #results {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>SQL Injection Demonstration</h1>
    <p>This page demonstrates the difference between vulnerable string concatenation and safe parameterized filtering.</p>

    <h2>Vulnerable String Concatenation</h2>
    <form id="vulnerable-form">
        <input type="text" id="vulnerable-input" placeholder="Search...">
        <button type="submit">Search</button>
    </form>
    <div id="vulnerable-results"></div>

    <h2>Safe Parameterized Filtering</h2>
    <form id="safe-form">
        <input type="text" id="safe-input" placeholder="Search...">
        <button type="submit">Search</button>
    </form>
    <div id="safe-results"></div>

    <script>
        // Mock in-memory product database
        const products = [
            { id: 1, name: "Product A", description: "This is product A" },
            { id: 2, name: "Product B", description: "This is product B" },
            { id: 3, name: "Product C", description: "This is product C" }
        ];

        // Vulnerable string concatenation
        document.getElementById("vulnerable-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const input = document.getElementById("vulnerable-input").value;
            const results = [];

            // Simulate a SQL query using string concatenation (NOT SAFE)
            products.forEach((product) => {
                if (product.name.toLowerCase().includes(input.toLowerCase()) || product.description.toLowerCase().includes(input.toLowerCase())) {
                    results.push(product);
                }
            });

            // Display results
            const vulnerableResultsHtml = results.map((product) => `<p>${product.name}: ${product.description}</p>`).join("");
            document.getElementById("vulnerable-results").innerHTML = vulnerableResultsHtml;
        });

        // Safe parameterized filtering
        document.getElementById("safe-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const input = document.getElementById("safe-input").value;
            const results = [];

            // Simulate a SQL query using parameterized filtering (SAFE)
            products.forEach((product) => {
                // Use a parameterized query (in this case, a simple JavaScript filter)
                if (product.name.toLowerCase().includes(input.toLowerCase()) || product.description.toLowerCase().includes(input.toLowerCase())) {
                    results.push(product);
                }
            });

            // Display results
            const safeResultsHtml = results.map((product) => `<p>${product.name}: ${product.description}</p>`).join("");
            document.getElementById("safe-results").innerHTML = safeResultsHtml;
        });
    </script>
</body>
</html>
