<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Table Converter</title>
    <style>
        body { font-family: Arial, sans-serif; }
        textarea { width: 100%; height: 200px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<textarea id="csvData" placeholder="Paste your CSV data here..."></textarea>
<button id="parseBtn">Parse CSV</button>
<div id="tableContainer"></div>

<script>
    document.getElementById('parseBtn').addEventListener('click', function() {
        const csvData = document.getElementById('csvData').value;
        const tableContainer = document.getElementById('tableContainer');
        tableContainer.innerHTML = ''; // Clear previous table

        if (!csvData) return; // Exit if no data

        const rows = csvData.trim().split('\n');
        const table = document.createElement('table');

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i].trim();
            if (!row) continue; // Skip empty rows

            const rowElement = table.insertRow(i);
            try {
                const csvRow = row.split(/,(?=([^"]*"[^"]*")*[^"]*$)/); // Properly handle quoted fields
                for (let j = 0; j < csvRow.length; j++) {
                    const cell = rowElement.insertCell(j);
                    cell.textContent = csvRow[j].replace(/""/g, '"').replace(/^"|"$/g, ''); // Handle escaped quotes
                }
            } catch (e) {
                console.error('Error parsing row:', e);
            }
        }

        tableContainer.appendChild(table);
    });
</script>

</body>
</html>
