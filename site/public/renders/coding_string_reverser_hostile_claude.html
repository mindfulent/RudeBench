<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>String Reverser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .card {
      position: relative;
      width: min(620px, 95vw);
      background: rgba(15,15,25,0.85);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.1),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 80px rgba(99,102,241,0.08);
    }

    /* Glowing orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      animation: orbFloat 6s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 200px; height: 200px;
      background: rgba(99,102,241,0.15);
      top: -60px; left: -60px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 150px; height: 150px;
      background: rgba(236,72,153,0.12);
      bottom: -40px; right: -40px;
      animation-delay: -3s;
    }

    @keyframes orbFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(20px,15px) scale(1.1); }
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(99,102,241,0.8);
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(99,102,241,0.2);
      border-radius: 14px;
      color: #fff;
      font-size: 1.05rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      caret-color: #818cf8;
    }

    input[type="text"]:focus {
      border-color: rgba(99,102,241,0.6);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.1), 0 0 20px rgba(99,102,241,0.1);
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

    /* Char counter */
    .char-count {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      transition: color 0.3s;
    }

    /* Output area */
    .output-box {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(99,102,241,0.15);
      border-radius: 14px;
      padding: 20px;
      min-height: 80px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 2px;
      position: relative;
      transition: border-color 0.3s;
    }

    .output-box.active {
      border-color: rgba(99,102,241,0.35);
    }

    .placeholder-text {
      color: rgba(255,255,255,0.15);
      font-size: 0.95rem;
      font-style: italic;
      user-select: none;
    }

    /* Each character span */
    .char {
      display: inline-block;
      font-size: 1.05rem;
      color: #e0e7ff;
      position: relative;
      animation: charDrop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0;
      transform: translateY(-12px) scale(0.6);
    }

    .char.space { width: 0.35em; }

    @keyframes charDrop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Stagger delays applied via JS */

    /* Stats row */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .stat {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
      transition: border-color 0.3s, background 0.3s;
    }

    .stat.highlight {
      border-color: rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.06);
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #818cf8;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
      transition: transform 0.2s;
    }

    .stat-value.bump {
      animation: bumpScale 0.25s ease;
    }

    @keyframes bumpScale {
