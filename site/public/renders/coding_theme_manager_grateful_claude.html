<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singleton Theme Manager</title>
  <style>
    /* ─────────────────────────────────────────
       CSS CUSTOM PROPERTIES (Design Tokens)
       The singleton writes to these at runtime.
    ───────────────────────────────────────── */
    :root {
      --bg-primary:      #ffffff;
      --bg-secondary:    #f3f4f6;
      --bg-card:         #ffffff;
      --text-primary:    #111827;
      --text-secondary:  #6b7280;
      --text-muted:      #9ca3af;
      --accent:          #6366f1;
      --accent-hover:    #4f46e5;
      --accent-light:    #e0e7ff;
      --border:          #e5e7eb;
      --shadow:          rgba(0, 0, 0, 0.08);
      --shadow-lg:       rgba(0, 0, 0, 0.15);
      --code-bg:         #f9fafb;
      --code-border:     #e5e7eb;
      --success:         #10b981;
      --warning:         #f59e0b;
      --danger:          #ef4444;
      --transition:      0.3s ease;
    }

    /* Dark theme token overrides */
    :root.dark {
      --bg-primary:      #0f172a;
      --bg-secondary:    #1e293b;
      --bg-card:         #1e293b;
      --text-primary:    #f1f5f9;
      --text-secondary:  #94a3b8;
      --text-muted:      #64748b;
      --accent:          #818cf8;
      --accent-hover:    #a5b4fc;
      --accent-light:    #1e1b4b;
      --border:          #334155;
      --shadow:          rgba(0, 0, 0, 0.4);
      --shadow-lg:       rgba(0, 0, 0, 0.6);
      --code-bg:         #0f172a;
      --code-border:     #334155;
    }

    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background-color var(--transition), color var(--transition);
      min-height: 100vh;
    }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ─────────────────────────────────────────
       NAVBAR
    ───────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      transition: background-color var(--transition), border-color var(--transition);
    }

    .navbar-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .navbar-brand .logo {
      font-size: 1.4rem;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .theme-status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 9999px;
      background-color: var(--accent-light);
      color: var(--accent);
      transition: background-color var(--transition), color var(--transition);
      letter-spacing: 0.03em;
    }

    /* ─────────────────────────────────────────
       TOGGLE BUTTON
    ───────────────────────────────────────── */
    .toggle-btn {
      position: relative;
      width: 56px;
      height: 30px;
      border-radius: 9999px;
      border: 2px solid var(--border);
      background: var(--bg-secondary);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      outline: none;
      flex-shrink: 0;
    }

    .toggle-btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .toggle-btn .knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background var(--transition);
      user-select: none;
    }

    :root.dark .toggle-btn .knob {
      transform: translateX(26px);
    }

    .toggle-btn .track-icons {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
      font-size: 11px;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────
       HERO SECTION
    ───────────────────────────────────────── */
    .hero {
      padding: 3rem 0 2rem;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.3rem 0.9rem;
      border-radius: 9999px;
      margin-bottom: 1.2rem;
      transition: background-color var(--transition), color var(--transition);
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
