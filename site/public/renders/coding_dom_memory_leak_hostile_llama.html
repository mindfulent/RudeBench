<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Example</title>
    <style>
        .widget {
            width: 100px;
            height: 100px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Leaking Version</h1>
    <button id="add-leaking-widget">Add Leaking Widget</button>
    <button id="remove-leaking-widget">Remove Leaking Widget</button>
    <div id="leaking-widgets"></div>
    <p>Leaking Widget Count: <span id="leaking-widget-count">0</span></p>

    <h1>Fixed Version</h1>
    <button id="add-fixed-widget">Add Fixed Widget</button>
    <button id="remove-fixed-widget">Remove Fixed Widget</button>
    <div id="fixed-widgets"></div>
    <p>Fixed Widget Count: <span id="fixed-widget-count">0</span></p>

    <script>
        // Leaking Version
        let leakingWidgets = [];
        let leakingWidgetCount = 0;

        document.getElementById('add-leaking-widget').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.addEventListener('click', () => console.log('Leaking Widget Clicked'));
            leakingWidgets.push(widget);
            document.getElementById('leaking-widgets').appendChild(widget);
            leakingWidgetCount++;
            document.getElementById('leaking-widget-count').textContent = leakingWidgetCount;
        });

        document.getElementById('remove-leaking-widget').addEventListener('click', () => {
            if (leakingWidgets.length > 0) {
                const widget = leakingWidgets.pop();
                document.getElementById('leaking-widgets').removeChild(widget);
                leakingWidgetCount--;
                document.getElementById('leaking-widget-count').textContent = leakingWidgetCount;
            }
        });

        // Fixed Version
        let fixedWidgets = [];
        let fixedWidgetCount = 0;

        document.getElementById('add-fixed-widget').addEventListener('click', () => {
            const widget = document.createElement('div');
            widget.className = 'widget';
            const clickHandler = () => console.log('Fixed Widget Clicked');
            widget.addEventListener('click', clickHandler);
            fixedWidgets.push({ widget, clickHandler });
            document.getElementById('fixed-widgets').appendChild(widget);
            fixedWidgetCount++;
            document.getElementById('fixed-widget-count').textContent = fixedWidgetCount;
        });

        document.getElementById('remove-fixed-widget').addEventListener('click', () => {
            if (fixedWidgets.length > 0) {
                const { widget, clickHandler } = fixedWidgets.pop();
                widget.removeEventListener('click', clickHandler);
                document.getElementById('fixed-widgets').removeChild(widget);
                fixedWidgetCount--;
                document.getElementById('fixed-widget-count').textContent = fixedWidgetCount;
            }
        });
    </script>
</body>
</html>
