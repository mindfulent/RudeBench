<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurrency Bug Demo - Progress Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto 24px auto;
        }

        @media (max-width: 700px) {
            .panels { grid-template-columns: 1fr; }
            h1 { font-size: 1.2rem; }
        }

        .panel {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 22px;
            border: 1px solid #2a2a4a;
            position: relative;
            overflow: hidden;
        }

        .panel.buggy { border-color: #ff4444; }
        .panel.fixed  { border-color: #44cc88; }

        .panel-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .buggy  .panel-badge { background: #ff444422; color: #ff6666; border: 1px solid #ff4444; }
        .fixed  .panel-badge { background: #44cc8822; color: #66ddaa; border: 1px solid #44cc88; }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #fff;
        }

        .panel p.desc {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        /* Task rows */
        .task-list {
            margin-bottom: 14px;
        }

        .task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .task-label {
            font-size: 0.75rem;
            width: 62px;
            flex-shrink: 0;
            color: #bbb;
        }

        .task-bar-wrap {
            flex: 1;
            background: #111128;
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
        }

        .task-bar-fill {
            height: 100%;
            border-radius: 6px;
            width: 0%;
            transition: width 0.15s ease;
        }

        .task-pct {
            font-size: 0.72rem;
            width: 36px;
            text-align: right;
            color: #ccc;
        }

        /* Shared / combined progress bar */
        .shared-label {
            font-size: 0.78rem;
            color: #aaa;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .shared-bar-wrap {
            background: #111128;
            border-radius: 8px;
            height: 22px;
            overflow: hidden;
            margin-bottom: 6px;
            position: relative;
        }

        .shared-bar-fill {
            height: 100%;
            border-radius: 8px;
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #fff;
            transition: width 0.1s ease, background 0.3s;
            white-space: nowrap;
        }

        .buggy .shared-bar-fill  { background: linear-gradient(90deg, #ff4444, #ff8800); }
        .fixed  .shared-bar-fill { background: linear-gradient(90deg, #44cc88, #00aaff); }

        .overflow-indicator {
            display: none;
            font-size: 0.72rem;
            color: #ff6666;
            margin-top: 3px;
            font-weight: 600;
        }

        /* Log */
        .log-box {
            background: #0d0d1f;
            border-radius: 8px;
            padding: 10px 12px;
            height: 130px;
            overflow-y: auto;
            font-size: 0.72rem;
            font-family: 'Courier New', monospace;
            border: 1px solid #222244;
            margin-top: 12px;
        }

        .log-line { margin-bottom: 2px; color: #aaa; }
        .log-line.warn  { color: #ffaa44; }
        .log-line.error { color: #ff5555; }
        .log-line.ok    { color: #55dd99; }
        .log-line.info  { color: #66aaff; }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #111128;
            border-radius: 8px;
            padding: 7px 12px;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-key {
            font-size: 0.65rem;
            color: #777;
            margin-top: 1px;
        }

        .buggy .stat-val.bad  { color: #ff5555; }
        .fixed  .stat-val.good { color: #55dd99; }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
