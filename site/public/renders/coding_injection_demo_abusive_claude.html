<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 20px; }
  h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }

  .query-box .value { color: #a5d6ff; }
  .query-box .safe-value { color: #3fb950; }
  .result-box { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 10px; font-size: 0.8em; min-height: 80px; max-height: 220px; overflow-y: auto; }

  .table-display { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .table-display h3 { color: #58a6ff; font-size: 0.9em; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78em; }
  th { color: #8b949e; text-align: left; padding: 4px 8px; border-bottom: 1px solid #30363d; }
  td { padding: 4px 8px; border-bottom: 1px solid #21262d; }

  .mechanics h3 { color: #e3b341; font-size: 0.9em; margin-bottom: 10px; }
  .mechanics p { font-size: 0.8em; color: #8b949e; line-height: 1.7; margin-bottom: 8px; }
  .mechanics code { color: #a5d6ff; background: #0d1117; padding: 1px 4px; border-radius: 3px; }
  .parse-trace { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 10px; font-size: 0.78em; line-height: 1.8; min-height: 40px; }
  .parse-step { color: #8b949e; }

  .parse-step .neutral { color: #e3b341; }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .db-grid { grid-template-columns: 1fr; }
  }
