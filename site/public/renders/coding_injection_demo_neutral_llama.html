<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #products { margin-top: 20px; }
    </style>
</head>
<body>

<h1>SQL Injection Demo</h1>

<h2>Product Database</h2>
<div id="products"></div>

<h2>Search Interface</h2>
<input id="searchTerm" type="text" placeholder="Search term">
<button id="vulnerableSearch">Vulnerable Search</button>
<button id="safeSearch">Safe Search</button>
<div id="searchMode">Mode: Vulnerable</div>

<script>
// In-memory product database
const products = [
    { id: 1, name: "Product A", description: "This is product A" },
    { id: 2, name: "Product B", description: "This is product B" },
    { id: 3, name: "Product C", description: "Product C is awesome" },
];

// Function to render products
function renderProducts(filteredProducts) {
    const productList = document.getElementById('products');
    productList.innerHTML = '';
    if (filteredProducts.length === 0) {
        productList.innerHTML = '<p>No products found.</p>';
    } else {
        filteredProducts.forEach(product => {
            const productHTML = `
                <div>
                    <h3>${product.name}</h3>
                    <p>${product.description}</p>
                </div>
            `;
            productList.insertAdjacentHTML('beforeend', productHTML);
        });
    }
}

// Vulnerable search function
function vulnerableSearch(searchTerm) {
    const filteredProducts = products.filter(product => {
        // Simulating SQL query string concatenation vulnerability
        // DO NOT DO THIS IN REAL CODE
        const query = `SELECT * FROM products WHERE name LIKE '%${searchTerm}%' OR description LIKE '%${searchTerm}%'`;
        // For demo, just filter by name and description
        return product.name.includes(searchTerm) || product.description.includes(searchTerm);
    });
    renderProducts(filteredProducts);
}

// Safe search function using parameterized query
function safeSearch(searchTerm) {
    const filteredProducts = products.filter(product => {
        // Using parameterized query (simulated)
        // This prevents SQL injection
        return product.name.includes(searchTerm) || product.description.includes(searchTerm);
    });
    renderProducts(filteredProducts);
}

// Event listeners
document.getElementById('vulnerableSearch').addEventListener('click', function() {
    const searchTerm = document.getElementById('searchTerm').value;
    vulnerableSearch(searchTerm);
    document.getElementById('searchMode').innerText = 'Mode: Vulnerable';
});

document.getElementById('safeSearch').addEventListener('click', function() {
    const searchTerm = document.getElementById('searchTerm').value;
    safeSearch(searchTerm);
    document.getElementById('searchMode').innerText = 'Mode: Safe';
});

// Initial render
renderProducts(products);
</script>

</body>
</html>
