<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>String Reverser</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8f0;
    }

    .card {
      width: 100%;
      max-width: 600px;
      padding: 48px 40px;
      background: #1a1a24;
      border-radius: 20px;
      border: 1px solid #2a2a3a;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #555570;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6060a0;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      background: #12121a;
      border: 1.5px solid #2a2a3a;
      border-radius: 12px;
      color: #e8e8f0;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: #7c5cfc;
    }

    textarea::placeholder {
      color: #33334a;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a3a;
    }

    .arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c5cfc, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(124,92,252,0.35);
    }

    .output-box {
      width: 100%;
      min-height: 100px;
      padding: 14px 16px;
      background: #12121a;
      border: 1.5px solid #2a2a3a;
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.6;
      word-break: break-all;
      transition: border-color 0.3s;
    }

    .output-box.has-content {
      border-color: #2a2a4a;
    }

    .char {
      display: inline;
      opacity: 0;
      transform: translateY(4px);
      animation: popIn 0.18s ease forwards;
    }

    @keyframes popIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .char.highlight {
      color: #a78bfa;
      animation: popIn 0.18s ease forwards, fadeToWhite 0.5s ease 0.18s forwards;
    }

    @keyframes fadeToWhite {
      to { color: #e8e8f0; }
    }

    .empty-hint {
      color: #33334a;
      font-size: 0.95rem;
      user-select: none;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #1e1e2e;
    }

    .stat {
      text-align: center;
      flex: 1;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #44445a;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 2px;
    }

    .stat + .stat {
      border-left: 1px solid #1e1e2e;
    }

    .copy-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: transparent;
      border: 1.5px solid #2a2a3a;
      border-radius: 10px;
      color: #6060a0;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: #7c5cfc;
      color: #a78bfa;
      background: rgba(124,92,252,0.06);
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .copy-btn.copied {
      border-color: #34d399;
      color: #34d399;
      background: rgba(52,211,153,0.06);
    }
  </style>
</head>
<body>

<div class="card">
  <h1>String Reverser</h1>
  <p class="subtitle">Type below and watch your text reverse in real time</p>

  <label for="inputText">Input</label>
  <textarea id="inputText" placeholder="Start typing here…" spellcheck="false"></textarea>

  <div class="divider">
    <div class="arrow">↓</div>
  </div>

  <label>Reversed Output</label>
  <div class="output-box" id="outputBox">
    <span class="empty-hint">Your reversed text will appear here…</span>
  </div>

  <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copy Reversed Text</button>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="charCount">0</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="wordCount">0</div>
      <div class="stat-label">Words</div>
    </div>
