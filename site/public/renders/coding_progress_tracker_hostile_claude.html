<!DOCTYPE html>
<html lang="en">

<title>Shared Mutable State — Buggy vs Fixed</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {

    margin-bottom: 0.4rem;
    color: #f8fafc;
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto 2rem;
  }

  @media (max-width: 700px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: #1e2130;
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid #2d3148;
  }

  .panel.buggy  { border-top: 3px solid #f87171; }
  .panel.fixed  { border-top: 3px solid #34d399; }

  .panel h2 {
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel.buggy h2 { color: #f87171; }
  .panel.fixed h2 { color: #34d399; }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.05em;
  }

  .buggy .badge  { background: #7f1d1d; color: #fca5a5; }
  .fixed .badge  { background: #064e3b; color: #6ee7b7; }

  .panel p.desc {
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }

  /* Task list */
  .tasks { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.2rem; }

  .task-row { display: flex; flex-direction: column; gap: 4px; }

  .task-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: #cbd5e1;
  }

  .bar-track {
    height: 10px;
    background: #2d3148;
    border-radius: 999px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 0.15s ease;
  }

  .task-0 .bar-fill { background: #818cf8; }
  .task-1 .bar-fill { background: #f472b6; }
  .task-2 .bar-fill { background: #fb923c; }
  .task-3 .bar-fill { background: #38bdf8; }

  /* Overall bar */
  .overall-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #e2e8f0;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .overall-track {
    height: 16px;
    background: #2d3148;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 0.8rem;
  }

  .overall-fill {
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 0.15s ease;
  }

  .buggy .overall-fill  { background: linear-gradient(90deg, #f87171, #fb923c); }
  .fixed .overall-fill  { background: linear-gradient(90deg, #34d399, #38bdf8); }

  /* Log */
  .log {
    background: #0f1117;
    border-radius: 8px;
    padding: 0.7rem;
    font-size: 0.73rem;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    height: 130px;
    overflow-y: auto;
    color: #94a3b8;
    margin-bottom: 1rem;
    border: 1px solid #2d3148;
  }

  .log .entry { padding: 1px 0; border-bottom: 1px solid #1e2130; }
  .log .entry.warn  { color: #fbbf24; }
  .log .entry.error { color: #f87171; }
  .log .entry.good  { color: #34d399; }
  .log .entry.info  { color: #818cf8; }

  /* Anomaly counter */
  .anomaly-box {
    background: #2d1515;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
    color: #fca5a5;
    margin-bottom: 1rem;
    display: none;
  }

  .anomaly-box.visible { display: block; }
  .anomaly-count { font-size: 1.4rem; font-weight: 700; color: #f87171; }

  /* Buttons */
  .btn {
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .buggy .btn  { background: #f87171; color: #1e0a0a; }
  .fixed .btn  { background: #34d399; color: #022c22; }

  /* Explainer */
  .explainer {
    max-width: 1100px;
    margin: 0 auto;
    background: #1e2130;
    border-radius: 12px;
    border: 1px solid #2d3148;
    padding: 1.5rem;
  }

  .explainer h3 {
    color: #f8fafc;
    margin-bottom: 1rem;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .explain-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
  }
