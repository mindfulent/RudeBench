<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating-Point Shopping Cart Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a2e;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* ── Explanation banner ── */
        .explanation-box {
            background: #1a1a2e;
            color: #e0e0e0;
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .explanation-box h2 {
            color: #f0c040;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .explanation-box code {
            background: #2e2e4e;
            color: #7ec8e3;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .explanation-box .highlight {
            color: #ff6b6b;
            font-weight: bold;
        }

        /* ── Two-column layout ── */
        .carts-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        @media (max-width: 820px) {
            .carts-wrapper { grid-template-columns: 1fr; }
        }

        /* ── Cart card ── */
        .cart-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.09);
            overflow: hidden;
        }

        .cart-header {
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .broken-header  { background: #ffe0e0; color: #c0392b; }
        .fixed-header   { background: #d4edda; color: #1e7e34; }

        .cart-header .tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .broken-header .tag { background: #c0392b; color: #fff; }
        .fixed-header  .tag { background: #1e7e34; color: #fff; }

        /* ── Product list ── */
        .product-list {
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
        }

        .product-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #f0f0f0;
            gap: 8px;
        }

        .product-row:last-child { border-bottom: none; }

        .product-name {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .product-price {
            font-size: 0.88rem;
            color: #555;
            min-width: 70px;
            text-align: right;
        }

        .add-btn {
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.2s;
        }

        .add-btn:hover { background: #357abd; }

        /* ── Cart items ── */
        .cart-items {
            padding: 14px 20px;
            min-height: 90px;
            border-bottom: 1px solid #eee;
        }

        .cart-items-title {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #999;
            margin-bottom: 8px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.87rem;
            padding: 3px 0;
            color: #444;
        }

        .empty-cart {
            color: #bbb;
            font-size: 0.85rem;
            font-style: italic;
        }

        /* ── Totals ── */
        .totals-section {
            padding: 14px 20px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 4px 0;
            color: #555;
        }

        .total-row.grand {
            font-weight: 700;
            font-size: 1.05rem;
            color: #1a1a2e;
            border-top: 2px solid #eee;
            margin-top: 6px;
            padding-top: 8px;
        }

        /* ── Debug / comparison panel ── */
        .debug-panel {
            padding: 12px 20px 16px;
            background: #fafafa;
            border-top: 1px solid #eee;
            font-size: 0.82rem;
            font-family: 'Courier New', monospace;
            color: #444;
            line-height: 1.8;
        }

        .debug-panel .label {
            color: #888;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
        }

        .fail  { color: #e74c3c; font-weight: bold; }
        .pass  { color: #27ae60; font-weight: bold; }
        .warn  { color: #e67e22; font-weight: bold; }

        /* ── Comparison check section ── */
        .check-section {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.09);
            padding: 22px 28px;
            margin-bottom: 30px;
        }

        .check-section h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #1a1a2e;
        }

        .check-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .check-card {
            border-radius: 8px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace
