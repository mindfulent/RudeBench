<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Leak Demonstration</title>
    <style>
        .widget {
            padding: 10px;
            border: 1px solid black;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Memory Leak Demonstration</h1>
    <button id="add-widget-btn">Add Widget</button>
    <button id="remove-widget-btn">Remove Widget</button>
    <button id="switch-btn">Switch to Fixed Version</button>
    <p>Current Widget Count: <span id="widget-count">0</span></p>

    <div id="buggy-version" style="display: block;">
        <h2>Buggy Version</h2>
        <div id="buggy-widget-container"></div>
    </div>

    <div id="fixed-version" style="display: none;">
        <h2>Fixed Version</h2>
        <div id="fixed-widget-container"></div>
    </div>

    <script>
        let widgetCount = 0;
        let buggyWidgets = [];
        let fixedWidgets = [];

        document.getElementById('add-widget-btn').addEventListener('click', () => {
            createBuggyWidget();
            createFixedWidget();
            document.getElementById('widget-count').textContent = widgetCount;
        });

        document.getElementById('remove-widget-btn').addEventListener('click', () => {
            if (buggyWidgets.length > 0) {
                removeBuggyWidget();
            }
            if (fixedWidgets.length > 0) {
                removeFixedWidget();
            }
            document.getElementById('widget-count').textContent = widgetCount;
        });

        document.getElementById('switch-btn').addEventListener('click', () => {
            const buggyVersion = document.getElementById('buggy-version');
            const fixedVersion = document.getElementById('fixed-version');
            if (buggyVersion.style.display === 'block') {
                buggyVersion.style.display = 'none';
                fixedVersion.style.display = 'block';
            } else {
                buggyVersion.style.display = 'block';
                fixedVersion.style.display = 'none';
            }
        });

        function createBuggyWidget() {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Buggy Widget ${widgetCount}`;
            widget.addEventListener('click', () => {
                console.log(`Buggy Widget ${widgetCount} clicked`);
            });
            document.getElementById('buggy-widget-container').appendChild(widget);
            buggyWidgets.push(widget);
            widgetCount++;
        }

        function removeBuggyWidget() {
            if (buggyWidgets.length > 0) {
                const widget = buggyWidgets.pop();
                document.getElementById('buggy-widget-container').removeChild(widget);
                widgetCount--;
            }
        }

        function createFixedWidget() {
            const widget = document.createElement('div');
            widget.className = 'widget';
            widget.textContent = `Fixed Widget ${widgetCount}`;
            widget.addEventListener('click', () => {
                console.log(`Fixed Widget ${widgetCount} clicked`);
            });
            document.getElementById('fixed-widget-container').appendChild(widget);
            fixedWidgets.push(widget);
        }

        function removeFixedWidget() {
            if (fixedWidgets.length > 0) {
                const widget = fixedWidgets.pop();
                widget.removeEventListener('click', () => {
                    console.log(`Fixed Widget ${widgetCount} clicked`);
                });
                document.getElementById('fixed-widget-container').removeChild(widget);
            }
        }
    </script>
</body>
</html>
