<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Condition Demo</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
        }
        .counter-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-widget button {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="counter-widget">
            <h2>Buggy Counter</h2>
            <button id="buggy-inc">Increment</button>
            <p>Count: <span id="buggy-count">0</span></p>
        </div>
        <div class="counter-widget">
            <h2>Fixed Counter</h2>
            <button id="fixed-inc">Increment</button>
            <p>Count: <span id="fixed-count">0</span></p>
        </div>
    </div>

    <script>
        // Buggy Counter
        let buggyCount = 0;
        document.getElementById('buggy-inc').addEventListener('click', () => {
            setTimeout(() => {
                buggyCount = buggyCount + 1; // Read, modify, write
                document.getElementById('buggy-count').textContent = buggyCount;
            }, 100); // Simulate async delay
        });

        // Fixed Counter
        let fixedCount = 0;
        document.getElementById('fixed-inc').addEventListener('click', () => {
            setTimeout(() => {
                // Use a closure to capture the current count
                // or better yet, use a more atomic approach
                fixedCount++;
                document.getElementById('fixed-count').textContent = fixedCount;
            }, 100); // Simulate async delay
        });

        // However, to make it TRULY atomic, consider:
        const trulyFixedCount = { value: 0 };
        document.getElementById('fixed-inc').addEventListener('click', () => {
            setTimeout(() => {
                trulyFixedCount.value++; // No read, just write
                document.getElementById('fixed-count-truly').textContent = 
                    (document.getElementById('fixed-count-truly').textContent || 0) 
                    ? trulyFixedCount.value 
                    : (document.getElementById('fixed-count-truly').textContent = trulyFixedCount.value);
            }, 100); 
        });
        document.getElementById('fixed-inc').addEventListener('click', () => {
            const span = document.createElement('span');
            span.id = 'fixed-count-truly';
            span.textContent = 0;
            document.querySelector('h2:nth-of-type(2)').after(span);
        },{once: true});
    </script>
</body>
</html>
