<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Reverser Tool</title>
<style>
  body, html {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
  }
  .container {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #input-field {
    padding: 10px;
    font-size: 18px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  #reversed-string {
    font-size: 18px;
    margin-top: 20px;
  }
  .char-highlight {
    animation: highlight 1s;
  }
  @keyframes highlight {
    0% {
      background-color: yellow;
    }
    100% {
      background-color: transparent;
    }
  }
</style>
</head>
<body>

<div class="container">
  <input id="input-field" type="text" placeholder="Type something..." oninput="updateReversedString()">
  <div id="reversed-string"></div>
</div>

<script>
  function updateReversedString() {
    const inputField = document.getElementById('input-field');
    const reversedStringDiv = document.getElementById('reversed-string');
    const inputText = inputField.value;
    const reversedText = inputText.split('').reverse().join('');

    reversedStringDiv.innerHTML = '';
    for (let i = 0; i < reversedText.length; i++) {
      const span = document.createElement('span');
      span.textContent = reversedText[i];
      reversedStringDiv.appendChild(span);
      if (i < reversedText.length - 1) {
        const textNode = document.createTextNode('');
        reversedStringDiv.appendChild(textNode);
      }
      // Adding a small delay to highlight each character sequentially
      setTimeout(() => {
        span.classList.add('char-highlight');
      }, i * 100);
    }
  }
</script>

</body>
</html>
