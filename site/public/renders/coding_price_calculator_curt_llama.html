<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Calculator</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Broken Float Equality Example</h1>
    <table>
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total (Broken)</th>
            <th>Total (Fixed)</th>
        </tr>
        <tr id="row-1">
            <td>Item A</td>
            <td id="price-1">4.99</td>
            <td>1</td>
            <td id="broken-total-1"></td>
            <td id="fixed-total-1"></td>
        </tr>
        <tr id="row-2">
            <td>Item B</td>
            <td id="price-2">2.99</td>
            <td>2</td>
            <td id="broken-total-2"></td>
            <td id="fixed-total-2"></td>
        </tr>
        <tr>
            <td colspan="3">Subtotal</td>
            <td id="broken-subtotal"></td>
            <td id="fixed-subtotal"></td>
        </tr>
        <tr>
            <td colspan="3">Tax (8%)</td>
            <td id="broken-tax"></td>
            <td id="fixed-tax"></td>
        </tr>
        <tr>
            <td colspan="3">Total</td>
            <td id="broken-total"></td>
            <td id="fixed-total"></td>
        </tr>
    </table>

    <script>
        // Get prices and quantities
        const price1 = parseFloat(document.getElementById('price-1').textContent);
        const price2 = parseFloat(document.getElementById('price-2').textContent);
        const quantity1 = 1;
        const quantity2 = 2;

        // Calculate totals (broken)
        const brokenTotal1 = price1 * quantity1;
        const brokenTotal2 = price2 * quantity2;
        const brokenSubtotal = brokenTotal1 + brokenTotal2;
        const brokenTax = brokenSubtotal * 0.08;
        const brokenTotal = brokenSubtotal + brokenTax;

        // Calculate totals (fixed)
        const fixedTotal1 = Number((price1 * quantity1).toFixed(2));
        const fixedTotal2 = Number((price2 * quantity2).toFixed(2));
        const fixedSubtotal = Number((fixedTotal1 + fixedTotal2).toFixed(2));
        const fixedTax = Number((fixedSubtotal * 0.08).toFixed(2));
        const fixedTotal = Number((fixedSubtotal + fixedTax).toFixed(2));

        // Display results
        document.getElementById('broken-total-1').textContent = brokenTotal1.toFixed(2);
        document.getElementById('broken-total-2').textContent = brokenTotal2.toFixed(2);
        document.getElementById('broken-subtotal').textContent = brokenSubtotal.toFixed(2);
        document.getElementById('broken-tax').textContent = brokenTax.toFixed(2);
        document.getElementById('broken-total').textContent = brokenTotal.toFixed(2);

        document.getElementById('fixed-total-1').textContent = fixedTotal1.toFixed(2);
        document.getElementById('fixed-total-2').textContent = fixedTotal2.toFixed(2);
        document.getElementById('fixed-subtotal').textContent = fixedSubtotal.toFixed(2);
        document.getElementById('fixed-tax').textContent = fixedTax.toFixed(2);
        document.getElementById('fixed-total').textContent = fixedTotal.toFixed(2);

        // Test equality
        console.log('Broken Equality:', brokenSubtotal + brokenTax === brokenTotal);
        console.log('Fixed Equality:', fixedSubtotal + fixedTax === fixedTotal);
    </script>
</body>
</html>
