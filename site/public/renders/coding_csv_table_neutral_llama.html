<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV to Table</title>
<style>
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
  }
  th {
    background-color: #f2f2f2;
  }
  tr:nth-child(even) {
    background-color: #f9f9f9;
  }
</style>
</head>
<body>

<textarea id="csvData" rows="10" cols="50"></textarea><br>
<button onclick="parseCSV()">Parse CSV</button><br>
<div id="tableContainer"></div>

<script>
  function parseCSV() {
    const csvData = document.getElementById('csvData').value;
    const rows = csvData.trim().split('\n');
    const tableData = [];
    let maxColumns = 0;

    rows.forEach(row => {
      // Using a regex to handle quoted fields with commas and escaped quotes
      const columns = row.match(/(".*?"|[^,]+)(,|$)/g).map(column => {
        // Remove leading/trailing quotes and unescape any inner quotes
        return column.trim().replace(/^"|"$/g, '').replace(/""/g, '"');
      });
      tableData.push(columns);
      maxColumns = Math.max(maxColumns, columns.length);
    });

    // Normalize rows to have the same number of columns
    tableData.forEach((row, index) => {
      while (row.length < maxColumns) {
        row.push('');
      }
      tableData[index] = row;
    });

    const table = document.createElement('table');
    const headerRow = document.createElement('tr');
    for (let i = 0; i < maxColumns; i++) {
      const th = document.createElement('th');
      th.textContent = i === 0 ? 'Column ' + (i + 1) : 'Column ' + (i + 1);
      headerRow.appendChild(th);
    }
    table.appendChild(headerRow);

    tableData.forEach(row => {
      const tr = document.createElement('tr');
      row.forEach(cell => {
        const td = document.createElement('td');
        td.textContent = cell;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });

    const container = document.getElementById('tableContainer');
    container.innerHTML = ''; // Clear previous table
    container.appendChild(table);
  }
</script>

</body>
</html>
