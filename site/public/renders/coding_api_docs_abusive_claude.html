<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1d2e, #16213e);
            border-bottom: 1px solid #2d3748;
            padding: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            color: #63b3ed;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #a0aec0;
            font-size: 0.95rem;
        }

        .issues-banner {
            background: #1a1a2e;
            border: 1px solid #e53e3e;
            border-radius: 8px;
            margin: 2rem auto;
            max-width: 900px;
            padding: 1.5rem;
        }

        .issues-banner h2 {
            color: #fc8181;
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .issues-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .issues-grid {
                grid-template-columns: 1fr;
            }
        }

        .issue-card {
            background: #2d1515;
            border: 1px solid #742a2a;
            border-radius: 6px;
            padding: 1rem;
        }

        .issue-card .bad {
            color: #fc8181;
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-decoration: line-through;
        }

        .issue-card .reason {
            color: #feb2b2;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .issue-card .fixed {
            color: #68d391;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .issue-number {
            display: inline-block;
            background: #e53e3e;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 0.75rem;
            margin-right: 0.4rem;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem 2rem 4rem;
        }

        .section-title {
            font-size: 1.3rem;
            color: #90cdf4;
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #2d3748;
        }

        .endpoint {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .endpoint:hover {
            border-color: #4a5568;
        }

        .endpoint-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .endpoint-header:hover {
            background: #1e2235;
        }

        .method {
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            min-width: 65px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .GET    { background: #1a4731; color: #68d391; border: 1px solid #276749; }
        .POST   { background: #1a3a4a; color: #63b3ed; border: 1px solid #2b6cb0; }
        .PUT    { background: #3d2e0a; color: #f6ad55; border: 1px solid #744210; }
        .DELETE { background: #3d1515; color: #fc8181; border: 1px solid #742a2a; }
        .PATCH  { background: #2d1f4a; color: #b794f4; border: 1px solid #553c9a; }

        .endpoint-path {
            font-family: monospace;
            font-size: 1rem;
            color: #e2e8f0;
            flex: 1;
        }

        .endpoint-summary {
            color: #718096;
            font-size: 0.85rem;
        }

        .chevron {
            color: #4a5568;
            transition: transform 0.2s;
            font-size: 0.8rem;
        }

        .endpoint.open .chevron {
            transform: rotate(180deg);
        }

        .endpoint-body {
            display: none;
            border-top: 1px solid #2d3748;
            padding: 1.5rem;
        }

        .endpoint.open .endpoint-body {
            display: block;
        }

        .endpoint-body p {
            color: #a0aec0;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .fixes-applied {
            background: #0d2318;
            border: 1px solid #276749;
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
        }

        .fixes-applied h4 {
            color: #68d391;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .fixes-applied ul {
            list-style: none;
            padding: 0;
        }

        .fixes-applied ul li {
            color: #9ae6b4;
            font-size: 0.82rem;
            padding: 0.15rem 0;
        }

        .fixes-applied ul li::before {
            content: '✓ ';
            color: #48bb78;
        }

        .tab-group {
            margin-top: 1rem;
        }

        .tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: -1px;
        }

        .tab-btn {
            background: #2d3748;
            border: 1px solid #4a5568;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            color: #a0aec0;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            transition: background 0.2s,
