<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Sort: A Tragedy in Real Time</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 2em;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #ff4444, #ff8800, #ffdd00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.85em;
    margin-bottom: 24px;
    font-style: italic;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  button {
    padding: 10px 22px;
    border: none;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 0.95em;
    cursor: pointer;
    transition: all 0.2s;
  }

  #startBtn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-weight: bold;
    font-size: 1.05em;
  }

  #startBtn:hover { transform: scale(1.05); box-shadow: 0 0 16px #22c55e88; }
  #startBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #resetBtn {
    background: #334155;
    color: #cbd5e1;
  }
  #resetBtn:hover { background: #475569; }

  .size-control {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #94a3b8;
    font-size: 0.9em;
  }

  input[type=range] {
    accent-color: #6366f1;
    width: 100px;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #94a3b8;
    font-size: 0.9em;
  }

  .panels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: #111827;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #1e293b;
    position: relative;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .algo-name {
    font-size: 1.2em;
    font-weight: bold;
  }

  .bubble .algo-name  { color: #f87171; }
  .merge  .algo-name  { color: #34d399; }
  .quick  .algo-name  { color: #60a5fa; }

  .complexity-badge {
    font-size: 0.72em;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: bold;
    white-space: nowrap;
  }

  .bubble .complexity-badge  { background: #7f1d1d; color: #fca5a5; }
  .merge  .complexity-badge  { background: #064e3b; color: #6ee7b7; }
  .quick  .complexity-badge  { background: #1e3a5f; color: #93c5fd; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
    font-size: 0.78em;
  }

  .stat-box {
    background: #1e293b;
    border-radius: 6px;
    padding: 6px 10px;
  }

  .stat-label { color: #64748b; font-size: 0.85em; }
  .stat-value { color: #e2e8f0; font-weight: bold; font-size: 1.1em; margin-top: 1px; }

  .bubble .stat-value { color: #f87171; }
  .merge  .stat-value { color: #34d399; }
  .quick  .stat-value { color: #60a5fa; }

  .chart-container {
    height: 200px;
    display: flex;
    align-items: flex-end;
    gap: 1px;
    background: #0f172a;
    border-radius: 8px;
    padding: 4px;
    overflow: hidden;
  }

  .bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    transition: height 0.05s ease;
    min-width: 2px;
  }

  .bar.comparing { background: #facc15 !important; }
  .bar.swapping   { background: #f97316 !important; }
  .bar.sorted     { background: #22c55e !important; }
  .bar.pivot      { background: #e879f9 !important; }
  .bar.merging    { background: #38bdf8 !important; }

  .status-bar {
    margin-top: 10px;
    font-size: 0.75em;
    color: #64748b;
    min-height: 18px;
    text-align: center;
  }

  .done-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 1em;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    z-index: 10;
  }

  .done-banner.show { opacity: 1; }
  .bubble  .done-banner { color: #f87171; border: 1px solid #f87171; }
  .merge   .done-banner { color: #34d399; border: 1px solid #34d399; }
  .quick   .done-banner { color: #60a5fa; border: 1px solid #60a5fa; }

  .roast-box {
    max-width: 1400px;
    margin: 20px auto 0;
    background: #1a0a0a;
    border: 1px solid #7f1d1d;
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 0.85em;
    color: #fca5a5;
