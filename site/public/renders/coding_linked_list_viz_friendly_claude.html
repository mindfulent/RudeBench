<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 14px;
        }

        .control-group label {
            font-size: 0.78rem;
            color: #aaa;
            white-space: nowrap;
        }

        input[type="number"] {
            width: 70px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        input[type="number"]:focus {
            border-color: #00d4ff;
        }

        button {
            padding: 7px 16px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-head {
            background: linear-gradient(135deg, #00d4ff, #0099bb);
            color: #000;
        }

        .btn-tail {
            background: linear-gradient(135deg, #7b2ff7, #5500cc);
            color: #fff;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff4d6d, #cc0033);
            color: #fff;
        }

        .btn-search {
            background: linear-gradient(135deg, #ffd700, #cc9900);
            color: #000;
        }

        .btn-clear {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }

        button:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .message-bar {
            text-align: center;
            min-height: 28px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .msg-success { color: #4cff91; }
        .msg-error   { color: #ff6b6b; }
        .msg-info    { color: #00d4ff; }
        .msg-warn    { color: #ffd700; }

        .canvas-wrapper {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .list-container {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 20px 10px;
            min-width: max-content;
        }

        .empty-state {
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 1rem;
            padding: 30px;
        }

        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Node styles */
        .node-wrapper {
            display: flex;
            align-items: center;
            animation: nodeIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes nodeIn {
            from { opacity: 0; transform: scale(0.5) translateY(-20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes nodeOut {
            from { opacity: 1; transform: scale(1); }
            to   { opacity: 0; transform: scale(0.4); }
        }

        .node {
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            transition: border-color 0.3s, box-shadow 0.3s;
            cursor: default;
            user-select: none;
            min-width: 90px;
        }

        .node:hover {
            border-color: rgba(255,255,255,0.35);
        }

        .node.highlight-found {
            border-color: #ffd700 !important;
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.6);
            animation: pulse 0.7s ease-in-out 2;
        }

        .node.highlight-new {
            border-color: #4cff91 !important;
            box-shadow: 0 0 18px rgba(76, 255, 145, 0.5);
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }

        .node-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            text-align: center;
        }

        .node-label.head-label {
            background: rgba(0, 212, 255, 0.25);
            color: #00d4ff;
        }

        .node-label.tail-label {
            background: rgba(123, 47, 247, 0.25);
            color: #aa77ff;
        }

        .node-label.mid-label {
            background: rgba(255,255,255,0.05);
            color: #777;
        }

        .node-body {
            display: flex;
