<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            backdrop-filter: blur(10px);
        }

        .control-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            white-space: nowrap;
        }

        input[type="number"] {
            width: 70px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #a78bfa;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }

        button {
            padding: 7px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-head {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
        }

        .btn-head:hover {
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-tail {
            background: linear-gradient(135deg, #0369a1, #38bdf8);
            color: #fff;
        }

        .btn-tail:hover {
            background: linear-gradient(135deg, #0284c7, #7dd3fc);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .btn-delete {
            background: linear-gradient(135deg, #be123c, #fb7185);
            color: #fff;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #e11d48, #fda4af);
            box-shadow: 0 4px 15px rgba(251, 113, 133, 0.4);
        }

        .btn-search {
            background: linear-gradient(135deg, #065f46, #34d399);
            color: #fff;
        }

        .btn-search:hover {
            background: linear-gradient(135deg, #047857, #6ee7b7);
            box-shadow: 0 4px 15px rgba(52, 211, 153, 0.4);
        }

        .btn-clear {
            background: linear-gradient(135deg, #78350f, #fbbf24);
            color: #fff;
        }

        .btn-clear:hover {
            background: linear-gradient(135deg, #92400e, #fcd34d);
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }

        .message-box {
            text-align: center;
            min-height: 32px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .message-box .msg {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            animation: fadeIn 0.3s ease;
        }

        .msg.success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.4);
            color: #6ee7b7;
        }

        .msg.error {
            background: rgba(251, 113, 133, 0.15);
            border: 1px solid rgba(251, 113, 133, 0.4);
            color: #fda4af;
        }

        .msg.info {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.4);
            color: #7dd3fc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .canvas-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            overflow-x: auto;
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 24px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h1>🔗 Linked List Visualizer</h1>
<p class="subtitle">Singly Linked List — Interactive Visualization</p>

<div class="controls">
    <div class="control-group">
        <label>Insert at Head</label>
        <input type="number" id="headVal" placeholder="val" />
        <button class="btn-head" onclick="insertHead()">+ Head</button>
    </div>
    <div class="control-group">
        <label>Insert at Tail</label>
        <input type="number" id="tailVal" placeholder="val" />
        <button class="btn-tail" onclick="insertTail()">+ Tail</button>
    </div>
    <div class="control-group">
        <label>Delete by Value</label>
        <input type="number" id="delVal" placeholder="val" />
        <button class="btn-delete" onclick="deleteNode()">Delete</button>
    </div>
    <div class="control-group">
        <label>Search Value</label>
        <input type="number" id="searchVal" placeholder="val" />
        <button class="btn-search" onclick="searchNode()">Search</button>
    </div>
    <div class="control-group">
        <button class="btn-clear" onclick="clearList()">🗑 Clear All</button>
    </div>
</div>

<div class="message-box" id="messageBox"></div>

<div class="canvas-container">
    <canvas id="llCanvas"></canvas>
</div>

<div class="stats">
    <div class="stat-card">
        <div class="stat-value" id="statSize">0</div>
        <div class="stat-label">Nodes</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="statHead">—</div>
        <div class="stat-label">Head Value</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="statTail">—</div>
        <div class="stat-label">Tail Value</div>
    </div>
</div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-box" style="background: linear-gradient(135deg,#7c3aed,#a78bfa);"></div>
        Normal Node
    </div>
    <div class="legend-item">
        <div class="legend-box" style="background: linear-gradient(135deg,#065f46,#34d399);"></div>
        Found / Highlighted Node
    </div>
    <div class="legend-item">
        <div class="legend-box" style="background: linear-gradient(135deg,#be123c,#fb7185);"></div>
        Head Node
    </div>
    <div class="legend-item">
        <div class="legend-box" style="background: linear-gradient(135deg,#0369a1,#38bdf8);"></div>
        Tail Node
    </div>
</div>

<script>
    // ─── Data Structure ───────────────────────────────────────────────────────
    class Node {
        constructor(val) {
            this.val = val;
            this.next = null;
        }
    }

    class LinkedList {
        constructor() {
            this.head = null;
            this.size = 0;
        }

        insertHead(val) {
            const node = new Node(val);
            node.next = this.head;
            this.head = node;
            this.size++;
        }

        insertTail(val) {
            const node = new Node(val);
            if (!this.head) {
                this.head = node;
            } else {
                let cur = this.head;
                while (cur.next) cur = cur.next;
                cur.next = node;
            }
            this.size++;
        }

        delete(val) {
            if (!this.head) return false;
            if (this.head.val === val) {
                this.head = this.head.next;
                this.size--;
                return true;
            }
            let cur = this.head;
            while (cur.next) {
                if (cur.next.val === val) {
                    cur.next = cur.next.next;
                    this.size--;
                    return true;
                }
                cur = cur.next;
            }
            return false;
        }

        search(val) {
            let cur = this.head, idx = 0;
            while (cur) {
                if (cur.val === val) return idx;
                cur = cur.next;
                idx++;
            }
            return -1;
        }

        toArray() {
            const arr = [];
            let cur = this.head;
            while (cur) { arr.push(cur.val); cur = cur.next; }
            return arr;
        }

        getTail() {
            if (!this.head) return null;
            let cur = this.head;
            while (cur.next) cur = cur.next;
            return cur.val;
        }

        clear() {
            this.head = null;
            this.size = 0;
        }
    }

    // ─── State ────────────────────────────────────────────────────────────────
    const ll = new LinkedList();
    let highlightedIndex = -1;
    let animatingNodes = new Set(); // indices of newly added nodes
    let nodeAnimProgress = {}; // index -> 0..1

    // ─── Canvas Setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('llCanvas');
    const ctx = canvas.getContext('2d');

    const NODE_W = 80;
    const NODE_H = 56;
    const ARROW_GAP = 48;
    const PADDING = 40;
    const ROW_H = 120;
    const NODES_PER_ROW = Math.floor((window.innerWidth - 80) / (NODE_W + ARROW_GAP)) || 6;

    function getCanvasSize(count) {
        if (count === 0) return { w: 400, h: 180 };
        const rows = Math.ceil(count / NODES_PER_ROW);
        const cols = Math.min(count, NODES_PER_ROW);
        const w = Math.max(400, cols * (NODE_W + ARROW_GAP) + PADDING * 2);
        const h = rows * ROW_H + PADDING * 2;
        return { w, h };
    }

    // ─── Drawing Helpers ──────────────────────────────────────────────────────
    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function drawArrow(ctx, x1, y1, x2, y2, color) {
        const headLen = 10;
        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function getNodePos(index) {
        const row = Math.floor(index / NODES_PER_ROW);
        const col = index % NODES_PER_ROW;
        // Alternate row direction (snake layout)
        const rowLen = Math.min(NODES_PER_ROW, ll.size - row * NODES_PER_ROW);
        const actualCol = (row % 2 === 0) ? col : (rowLen - 1 - col);
        const x = PADDING + actualCol * (NODE_W + ARROW_GAP) + NODE_W / 2;
        const y = PADDING + row * ROW_H + NODE_H / 2;
        return { x, y };
    }

    // ─── Main Draw ────────────────────────────────────────────────────────────
    function draw() {
        const arr = ll.toArray();
        const { w, h } = getCanvasSize(arr.length);
        canvas.width = w;
        canvas.height = h;

        // Background
        ctx.clearRect(0, 0, w, h);

        if (arr.length === 0) {
            drawEmptyState(w, h);
            return;
        }

        // Draw arrows first (behind nodes)
        for (let i = 0; i < arr.length - 1; i++) {
            const pos = getNodePos(i);
            const nextPos = getNodePos(i + 1);
            const row = Math.floor(i / NODES_PER_ROW);
            const nextRow = Math.floor((i + 1) / NODES_PER_ROW);

            const scale = nodeAnimProgress[i] !== undefined ? nodeAnimProgress[i] : 1;
            const nextScale = nodeAnimProgress[i + 1] !== undefined ? nodeAnimProgress[i + 1] : 1;
            if (scale < 0.5 || nextScale < 0.5) continue;

            const arrowColor = 'rgba(148,163,184,0.6)';

            if (row === nextRow) {
                // Same row: horizontal arrow
                const fromX = pos.x + NODE_W / 2;
                const toX = nextPos.x - NODE_W / 2;
                drawArrow(ctx, fromX, pos.y, toX, nextPos.y, arrowColor);
            } else {
                // Row wrap: draw a bent arrow going down
                const fromX = pos.x + (row % 2 === 0 ? NODE_W / 2 : -NODE_W / 2);
                const fromY = pos.y;
                const midY = pos.y + ROW_H / 2;
                const toX = nextPos.x + (nextRow % 2 === 0 ? -NODE_W / 2 : NODE_W / 2);
                const toY = nextPos.y;

                ctx.save();
                ctx.strokeStyle = arrowColor;
                ctx.lineWidth = 2.5;
                ctx.setLineDash([5, 4]);
                ctx.beginPath();
                ctx.moveTo(fromX, fromY);
                ctx.lineTo(fromX, midY);
                ctx.lineTo(toX, midY);
                ctx.lineTo(toX, toY - 6);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
                // Arrowhead
                drawArrow(ctx, toX, toY - 14, toX, toY - 2, arrowColor);
            }
        }

        // NULL indicator after last node
        if (arr.length > 0) {
            const lastPos = getNodePos(arr.length - 1);
            const row = Math.floor((arr.length - 1) / NODES_PER_ROW);
            const nullX = lastPos.x + (row % 2 === 0 ? NODE_W / 2 + 30 : -NODE_W / 2 - 30);
            const nullY = lastPos.y;
            const scale = nodeAnimProgress[arr.length - 1] !== undefined ? nodeAnimProgress[arr.length - 1] : 1;
            if (scale > 0.7) {
                drawArrow(ctx,
                    lastPos.x + (row % 2 === 0 ? NODE_W / 2 : -NODE_W / 2),
                    nullY,
                    nullX + (row % 2 === 0 ? -8 : 8),
                    nullY,
                    'rgba(148,163,184,0.5)'
                );
                ctx.save();
                ctx.font = 'bold 11px monospace';
                ctx.fillStyle = 'rgba(148,163,184,0.7)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('NULL', nullX, nullY);
                ctx.restore();
            }
        }

        // Draw nodes
        for (let i = 0; i < arr.length; i++) {
            drawNode(arr[i], i, arr.length);
        }

        updateStats(arr);
    }

    function drawNode(val, index, total) {
        const pos = getNodePos(index);
        const x = pos.x - NODE_W / 2;
        const y = pos.y - NODE_H / 2;

        const scale = nodeAnimProgress[index] !== undefined ? nodeAnimProgress[index] : 1;
        const isHighlighted = index === highlightedIndex;
        const isHead = index === 0;
        const isTail = index === total - 1;

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.scale(scale, scale);
        ctx.translate(-pos.x, -pos.y);

        // Shadow
        ctx.shadowColor = isHighlighted ? 'rgba(52,211,153,0.5)' :
            isHead ? 'rgba(251,113,133,0.4)' :
                isTail ? 'rgba(56,189,248,0.4)' : 'rgba(139,92,246,0.3)';
        ctx.shadowBlur = isHighlighted ? 20 : 12;

        // Gradient fill
        let grad;
        if (isHighlighted) {
            grad = ctx.createLinearGradient(x, y, x + NODE_W, y + NODE_H);
            grad.addColorStop(0, '#065f46');
            grad.addColorStop(1, '#34d399');
        } else if (isHead) {
            grad = ctx.createLinearGradient(x, y, x + NODE_W, y + NODE_H);
            grad.addColorStop(0, '#be123c');
            grad.addColorStop(1, '#fb7185');
        } else if (isTail) {
            grad = ctx.createLinearGradient(x, y, x + NODE_W, y + NODE_H);
            grad.addColorStop(0, '#0369a1');
            grad.addColorStop(1, '#38bdf8');
        } else {
            grad = ctx.createLinearGradient(x, y, x + NODE_W, y + NODE_H);
            grad.addColorStop(0, '#7c3aed');
            grad.addColorStop(1, '#a78bfa');
        }

        roundRect(ctx, x, y, NODE_W, NODE_H, 10);
        ctx.fillStyle = grad;
        ctx.fill();

        // Border
        ctx.shadowBlur = 0;
        roundRect(ctx, x, y, NODE_W, NODE_H, 10);
        ctx.strokeStyle = isHighlighted ? 'rgba(110,231,183,0.8)' : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isHighlighted ? 2.5 : 1.5;
        ctx.stroke();

        // Value text
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${val.toString().length > 4 ? '13' : '18'}px 'Segoe UI', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 4;
        ctx.fillText(val, pos.x, pos.y - 4);

        // Label below value
        ctx.shadowBlur = 0;
        ctx.font = '9px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        const label = isHead && isTail ? 'HEAD · TAIL' : isHead ? 'HEAD' : isTail ? 'TAIL' : `[${index}]`;
        ctx.fillText(label, pos.x, pos.y + 14);

        ctx.restore();

        // Highlighted pulse ring
        if (isHighlighted) {
            ctx.save();
            ctx.strokeStyle = 'rgba(52,211,153,0.35)';
            ctx.lineWidth = 3;
            roundRect(ctx, x - 5, y - 5, NODE_W + 10, NODE_H + 10, 14);
            ctx.stroke();
            ctx.restore();
        }
    }

    function drawEmptyState(w, h) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Icon
        ctx.font = '48px serif';
        ctx.fillText('🔗', w / 2, h / 2 - 28);

        ctx.font = 'bold 16px Segoe UI';
        ctx.fillStyle = 'rgba(148,163,184,0.8)';
        ctx.fillText('The list is empty', w / 2, h / 2 + 20);

        ctx.font = '12px Segoe UI';
        ctx.fillStyle = 'rgba(100,116,139,0.7)';
        ctx.fillText('Use the controls above to insert nodes', w / 2, h / 2 + 44);
        ctx.restore();
    }

    // ─── Animation ────────────────────────────────────────────────────────────
    function animateNewNode(index) {
        nodeAnimProgress[index] = 0;
        let start = null;
        const duration = 350;

        function step(ts) {
            if (!start) start = ts;
            const t = Math.min((ts - start) / duration, 1);
            // Ease out elastic-ish
            nodeAnimProgress[index] = t < 1 ? easeOutBack(t) : 1;
            draw();
            if (t < 1) requestAnimationFrame(step);
            else {
                delete nodeAnimProgress[index];
                draw();
            }
        }
        requestAnimationFrame(step);
    }

    function easeOutBack(t) {
        const c1 = 1.70158, c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    // ─── Message ──────────────────────────────────────────────────────────────
    let msgTimer = null;
    function showMessage(text, type = 'info') {
        const box = document.getElementById('messageBox');
        box.innerHTML = `<span class="msg ${type}">${text}</span>`;
        if (msgTimer) clearTimeout(msgTimer);
        msgTimer = setTimeout(() => box.innerHTML = '', 3000);
    }

    // ─── Stats ────────────────────────────────────────────────────────────────
    function updateStats(arr) {
        document.getElementById('statSize').textContent = arr.length;
        document.getElementById('statHead').textContent = arr.length ? arr[0] : '—';
        document.getElementById('statTail').textContent = arr.length ? arr[arr.length - 1] : '—';
    }

    // ─── Controls ─────────────────────────────────────────────────────────────
    function getVal(id) {
        const v = document.getElementById(id).value.trim();
        if (v === '') return null;
        return parseInt(v, 10);
    }

    function clearInput(id) {
        document.getElementById(id).value = '';
    }

    function insertHead() {
        const val = getVal('headVal');
        if (val === null || isNaN(val)) { showMessage('Please enter a valid number.', 'error'); return; }
        ll.insertHead(val);
        highlightedIndex = -1;
        // Shift existing animation indices
        const newProgress = {};
        for (const k in nodeAnimProgress) newProgress[parseInt(k) + 1] = nodeAnimProgress[k];
        Object.assign(nodeAnimProgress, newProgress);
        clearInput('headVal');
        animateNewNode(0);
        showMessage(`Inserted <b>${val}</b> at head.`, 'success');
    }

    function insertTail() {
        const val = getVal('tailVal');
        if (val === null || isNaN(val)) { showMessage('Please enter a valid number.', 'error'); return; }
        const idx = ll.size; // will be the new tail index
        ll.insertTail(val);
        highlightedIndex = -1;
        clearInput('tailVal');
        animateNewNode(idx);
        showMessage(`Inserted <b>${val}</b> at tail.`, 'success');
    }

    function deleteNode() {
        const val = getVal('delVal');
        if (val === null || isNaN(val)) { showMessage('Please enter a valid number.', 'error'); return; }
        const found = ll.delete(val);
        highlightedIndex = -1;
        clearInput('delVal');
        if (found) {
            showMessage(`Deleted node with value <b>${val}</b>.`, 'success');
        } else {
            showMessage(`Value <b>${val}</b> not found in the list.`, 'error');
        }
        draw();
    }

    function searchNode() {
        const val = getVal('searchVal');
        if (val === null || isNaN(val)) { showMessage('Please enter a valid number.', 'error'); return; }
        const idx = ll.search(val);
        clearInput('searchVal');
        if (idx !== -1) {
            highlightedIndex = idx;
            showMessage(`Found <b>${val}</b> at index <b>${idx}</b>! 🎉`, 'success');
            draw();
            // Auto-clear highlight after 2.5s
            setTimeout(() => { highlightedIndex = -1; draw(); }, 2500);
        } else {
            highlightedIndex = -1;
            showMessage(`Value <b>${val}</b> not found in the list.`, 'error');
            draw();
        }
    }

    function clearList() {
        ll.clear();
        highlightedIndex = -1;
        nodeAnimProgress = {};
        draw();
        showMessage('List cleared.', 'info');
    }

    // ─── Keyboard Shortcuts ───────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') {
            if (e.key === 'Enter') {
                const id = e.target.id;
                if (id === 'headVal') insertHead();
                else if (id === 'tailVal') insertTail();
                else if (id === 'delVal') deleteNode();
                else if (id === 'searchVal') searchNode();
            }
        }
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    // Seed with a few nodes for demo
    [10, 25, 37, 42, 58].forEach(v => ll.insertTail(v));
    draw();
</script>
</body>
</html>
