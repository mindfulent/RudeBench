<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurrency Bug Example</title>
    <style>
        .progress-bar {
            width: 0%;
            height: 20px;
            background-color: #4CAF50;
            text-align: center;
            color: #fff;
        }
        .progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: #ddd;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Shared State Concurrency Bug Example</h1>
    <h2>Buggy Implementation</h2>
    <div class="progress-bar-container">
        <div id="buggy-progress-bar" class="progress-bar">0%</div>
    </div>
    <p id="buggy-progress-text">Progress: 0%</p>

    <h2>Corrected Implementation</h2>
    <div class="progress-bar-container">
        <div id="corrected-progress-bar" class="progress-bar">0%</div>
    </div>
    <p id="corrected-progress-text">Progress: 0%</p>

    <script>
        // Buggy Implementation
        let buggyProgress = 0;
        const buggyProgressBar = document.getElementById('buggy-progress-bar');
        const buggyProgressText = document.getElementById('buggy-progress-text');

        function updateBuggyProgress(percent) {
            buggyProgress += percent;
            buggyProgressBar.style.width = `${buggyProgress}%`;
            buggyProgressBar.textContent = `${buggyProgress}%`;
            buggyProgressText.textContent = `Progress: ${buggyProgress}%`;
        }

        // Simulate concurrent tasks with setTimeout and Promise
        Promise.all([
            new Promise(resolve => setTimeout(() => {
                updateBuggyProgress(30);
                resolve();
            }, 100)),
            new Promise(resolve => setTimeout(() => {
                updateBuggyProgress(40);
                resolve();
            }, 150)),
            new Promise(resolve => setTimeout(() => {
                updateBuggyProgress(50);
                resolve();
            }, 200)),
        ]).then(() => console.log('Buggy implementation completed'));

        // Corrected Implementation
        let correctedProgress = 0;
        let correctedProgressLock = false;
        const correctedProgressBar = document.getElementById('corrected-progress-bar');
        const correctedProgressText = document.getElementById('corrected-progress-text');

        function updateCorrectedProgress(percent) {
            if (correctedProgressLock) return;
            correctedProgressLock = true;
            correctedProgress = Math.min(correctedProgress + percent, 100);
            correctedProgressBar.style.width = `${correctedProgress}%`;
            correctedProgressBar.textContent = `${correctedProgress}%`;
            correctedProgressText.textContent = `Progress: ${correctedProgress}%`;
            correctedProgressLock = false;
        }

        // Simulate concurrent tasks with setTimeout and Promise
        Promise.all([
            new Promise(resolve => setTimeout(() => {
                updateCorrectedProgress(30);
                resolve();
            }, 100)),
            new Promise(resolve => setTimeout(() => {
                updateCorrectedProgress(40);
                resolve();
            }, 150)),
            new Promise(resolve => setTimeout(() => {
                updateCorrectedProgress(50);
                resolve();
            }, 200)),
        ]).then(() => console.log('Corrected implementation completed'));
    </script>
</body>
</html>
