<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management API Reference</title>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-card: #1e2130;
      --bg-hover: #252840;
      --accent-blue: #4f8ef7;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      --accent-purple: #a78bfa;
      --accent-orange: #f97316;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2d3148;
      --border-light: #374162;
      --get: #22c55e;
      --post: #4f8ef7;
      --put: #f59e0b;
      --patch: #a78bfa;
      --delete: #ef4444;
      --bad: #ef4444;
      --good: #22c55e;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 60%, #1a1230 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 1rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .header-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-version { background: rgba(79,142,247,0.15); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.3); }
    .badge-rest    { background: rgba(34,197,94,0.12);  color: var(--accent-green); border: 1px solid rgba(34,197,94,0.3); }

    /* ── LAYOUT ── */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 84px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
    }
    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sidebar a:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .sidebar a .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── MAIN ── */
    main { min-width: 0; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1e2130 0%, #1a1d27 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.2rem 2rem;
      margin-bottom: 2rem;
    }
    .hero h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .hero p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 600px;
    }
    .hero-meta {
      display: flex;
      gap: 1.5rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }
    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .hero-meta-item strong { color: var(--text-secondary); }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.2rem;
      margin-top: 2.5rem;
    }
    .section-header:first-of-type { margin-top: 0; }
    .section-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
