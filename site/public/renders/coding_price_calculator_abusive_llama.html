<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Comparison in Financial Calculations</title>
<style>
  .container {
    display: flex;
    flex-direction: row;
  }
  .section {
    margin: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="section">
    <h2>Broken Version (Using Floats Directly)</h2>
    <p>Items in Cart:</p>
    <ul id="broken-cart">
      <li id="broken-item-1">Item 1: <span id="broken-price-1">4.99</span></li>
      <li id="broken-item-2">Item 2: <span id="broken-price-2">2.01</span></li>
    </ul>
    <p>Total: <span id="broken-total">0.00</span></p>
    <button onclick="calculateBrokenTotal()">Calculate Total</button>
    <p>Is Total $7.00? <span id="broken-result"></span></p>
    <button onclick="checkBrokenResult()">Check</button>
  </div>

  <div class="section">
    <h2>Fixed Version (Using Decimal.js for Decimal Prices)</h2>
    <p>Items in Cart:</p>
    <ul id="fixed-cart">
      <li id="fixed-item-1">Item 1: <span id="fixed-price-1">4.99</span></li>
      <li id="fixed-item-2">Item 2: <span id="fixed-price-2">2.01</span></li>
    </ul>
    <p>Total: <span id="fixed-total">0.00</span></p>
    <button onclick="calculateFixedTotal()">Calculate Total</button>
    <p>Is Total $7.00? <span id="fixed-result"></span></p>
    <button onclick="checkFixedResult()">Check</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.3.1/decimal.min.js"></script>
<script>
  // Broken Version
  function calculateBrokenTotal() {
    let total = 0;
    let prices = [parseFloat(document.getElementById('broken-price-1').innerText),
                  parseFloat(document.getElementById('broken-price-2').innerText)];
    for (let price of prices) {
      total += price;
    }
    document.getElementById('broken-total').innerText = total.toFixed(2);
  }

  function checkBrokenResult() {
    let total = parseFloat(document.getElementById('broken-total').innerText);
    let resultElement = document.getElementById('broken-result');
    if (total === 7.00) {
      resultElement.innerText = 'Yes';
    } else {
      resultElement.innerText = 'No';
    }
  }

  // Fixed Version
  function calculateFixedTotal() {
    let Decimal = window.Decimal;
    let total = new Decimal(0);
    let prices = [new Decimal(document.getElementById('fixed-price-1').innerText),
                  new Decimal(document.getElementById('fixed-price-2').innerText)];
    for (let price of prices) {
      total = total.add(price);
    }
    document.getElementById('fixed-total').innerText = total.toFixed(2);
  }

  function checkFixedResult() {
    let Decimal = window.Decimal;
    let total = new Decimal(document.getElementById('fixed-total').innerText);
    let resultElement = document.getElementById('fixed-result');
    if (total.equals(new Decimal(7.00))) {
      resultElement.innerText = 'Yes';
    } else {
      resultElement.innerText = 'No';
    }
  }
</script>
</body>
</html>
