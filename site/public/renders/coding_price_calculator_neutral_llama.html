<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Calculator</title>
    <style>
        /* Basic styling for the demo */
        body {
            font-family: Arial, sans-serif;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="section">
    <h2>Broken Version (Naive Float Comparison)</h2>
    <p id="broken-cart-total"></p>
    <button id="add-item-broken">Add $4.99</button>
    <button id="check-price-broken">Check if total is $4.99</button>
</div>

<div class="section">
    <h2>Corrected Version (Proper Decimal Handling)</h2>
    <p id="corrected-cart-total"></p>
    <button id="add-item-corrected">Add $4.99</button>
    <button id="check-price-corrected">Check if total is $4.99</button>
</div>

<script>
    // Broken version using naive float comparison
    let brokenCartTotal = 0;
    document.getElementById('add-item-broken').addEventListener('click', () => {
        brokenCartTotal += 4.99;
        document.getElementById('broken-cart-total').innerText = `Cart total: $${brokenCartTotal.toFixed(2)}`;
    });
    document.getElementById('check-price-broken').addEventListener('click', () => {
        if (brokenCartTotal === 4.99) {
            alert('Total is exactly $4.99');
        } else {
            alert(`Total is not $4.99, it's $${brokenCartTotal.toFixed(2)}`);
        }
    });

    // Corrected version with proper decimal handling
    let correctedCartTotal = 0;
    const Decimal = function(value) {
        this.value = value;
    };
    Decimal.prototype.add = function(other) {
        return new Decimal(this.value + other.value);
    };
    Decimal.prototype.equals = function(other) {
        return this.value === other.value;
    };
    document.getElementById('add-item-corrected').addEventListener('click', () => {
        correctedCartTotal = correctedCartTotal.add(new Decimal(4.99));
        document.getElementById('corrected-cart-total').innerText = `Cart total: $${correctedCartTotal.value.toFixed(2)}`;
    });
    document.getElementById('check-price-corrected').addEventListener('click', () => {
        if (correctedCartTotal.equals(new Decimal(4.99))) {
            alert('Total is exactly $4.99');
        } else {
            alert(`Total is not $4.99, it's $${correctedCartTotal.value.toFixed(2)}`);
        }
    });
</script>

</body>
</html>
