<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fractal Tree – Recursion Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 2rem;
      color: #58a6ff;
      margin-bottom: 6px;
      text-align: center;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #8b949e;
      margin-bottom: 22px;
      text-align: center;
    }

    /* ── Canvas card ── */
    .canvas-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
      border-radius: 8px;
      background: #0d1117;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 560px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .slider-row label {
      font-size: 0.95rem;
      color: #8b949e;
      white-space: nowrap;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #30363d;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #58a6ff;
      border: 2px solid #0d1117;
      box-shadow: 0 0 6px #58a6ff88;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #79c0ff;
    }

    .depth-badge {
      min-width: 36px;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      color: #58a6ff;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
      color: #8b949e;
    }

    .stats-row span b {
      color: #e6edf3;
    }

    /* ── Warning banner ── */
    .warning {
      display: none;
      align-items: center;
      gap: 10px;
      background: #2d1b00;
      border: 1px solid #d29922;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.88rem;
      color: #e3b341;
      max-width: 560px;
      width: 100%;
      margin-bottom: 10px;
    }

    .warning.visible { display: flex; }

    .warning-icon { font-size: 1.2rem; }

    /* ── Explanation section ── */
    .explanation {
      max-width: 720px;
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .explanation h2 {
      font-size: 1.3rem;
      color: #58a6ff;
      margin-bottom: 18px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 10px;
    }

    .explanation h3 {
      font-size: 1rem;
      color: #79c0ff;
      margin: 20px 0 8px;
    }

    .explanation p {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #c9d1d9;
      margin-bottom: 10px;
    }

    .explanation ul {
      padding-left: 20px;
      margin-bottom: 10px;
    }

    .explanation ul li {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #c9d1d9;
      margin-bottom: 4px;
    }

    .explanation ul li b {
      color: #e6edf3;
    }

    /* ── Code block ── */
    .code-block {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #e6edf3;
      overflow-x: auto;
      margin: 10px 0 14px;
    }

    .code-block .kw  { color: #ff7b72; }
    .code-block .fn  { color: #d2a8ff; }
    .code-block .cm  { color: #8b949e; font-style: italic; }
    .code-block .nm  { color: #79c0ff; }
    .code-block .st  { color: #a5d6ff; }

    /* ── Depth meter ── */
    .depth-meter {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin: 8px 0 4px;
    }

    .depth-pip {
      width: 28px;
      height: 10px;
      border-radius: 3px;
      background: #21262d;
      border: 1px solid #30363d;
      transition: background 0.25s, border-color 0.25s;
    }

    .depth-pip.active {
      background: #58a6ff;
      border-color: #58a6ff;
      box-shadow: 0 0 6px #58a6ff66;
    }

    .depth-pip.warn {
      background: #d29922;
      border-color: #d29922;
      box-shadow: 0 0 6px #d2992266;
    }

    .depth-pip.danger {
      background: #f85149;
      border-color: #f85149;
      box-shadow: 0 0 6px #f8514966;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      h1 { font-size
