<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Audit Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);
            border-bottom: 1px solid #2d3748;
            padding: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .score-banner {
            background: linear-gradient(135deg, #7f1d1d, #991b1b);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin: 2rem auto;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .score-banner .label {
            font-size: 1.1rem;
            color: #fca5a5;
            font-weight: 600;
        }

        .score-banner .score {
            font-size: 3rem;
            font-weight: 800;
            color: #ef4444;
        }

        .score-banner .summary {
            color: #fca5a5;
            font-size: 0.9rem;
            max-width: 400px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #2d3748;
        }

        /* Principles Reference */
        .principles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .principle-card {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .principle-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
        }

        .principle-card h3 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .principle-card p {
            font-size: 0.82rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* Endpoint Cards */
        .endpoint-card {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 14px;
            margin-bottom: 2rem;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .endpoint-card:hover {
            box-shadow: 0 0 0 1px #4f46e5;
        }

        .endpoint-header {
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            cursor: pointer;
            background: #12152a;
            border-bottom: 1px solid #2d3748;
        }

        .endpoint-header:hover {
            background: #161929;
        }

        .endpoint-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .method-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            font-family: monospace;
        }

        .method-GET    { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
        .method-POST   { background: #1e3a5f; color: #93c5fd; border: 1px solid #1e40af; }
        .method-PUT    { background: #3b2f00; color: #fcd34d; border: 1px solid #92400e; }
        .method-DELETE { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
        .method-PATCH  { background: #2e1065; color: #d8b4fe; border: 1px solid #4c1d95; }

        .endpoint-path {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #e2e8f0;
            font-weight: 600;
        }

        .problem-count {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #ef4444;
            border-radius: 20px;
            padding: 0.25rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .toggle-icon {
            color: #64748b;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .toggle-icon.open {
            transform: rotate(180deg);
        }

        .endpoint-body {
            display: none;
            padding: 1.5rem;
        }

        .endpoint-body.open {
            display: block;
        }

        /* Problems list */
        .problems-list {
            margin-bottom: 1.5rem;
        }

        .problem-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            background: #2d1515;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .problem-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }

        .problem-content h4 {
            font-size: 0.88rem;
            font-weight: 700;
            color: #fca5a5;
            margin-bottom: 0.3rem;
        }

        .
