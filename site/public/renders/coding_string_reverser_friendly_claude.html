<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time String Reverser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    .title {
      text-align: center;
      margin-bottom: 8px;
    }

    .title h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .title p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin: 28px 0;
    }

    .input-section label {
      display: block;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-wrapper {
      position: relative;
    }

    #inputText {
      width: 100%;
      padding: 16px 50px 16px 18px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      caret-color: #a78bfa;
    }

    #inputText::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    #inputText:focus {
      border-color: rgba(167, 139, 250, 0.6);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 50%;
      transition: color 0.2s, background 0.2s;
      display: none;
      line-height: 1;
    }

    .clear-btn:hover {
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.1);
    }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 6px;
      transition: color 0.3s;
    }

    .char-count.active {
      color: rgba(167, 139, 250, 0.7);
    }

    .output-section {
      margin-top: 28px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .output-header label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .copy-btn {
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.3);
      color: rgba(167, 139, 250, 0.9);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .copy-btn:hover {
      background: rgba(167, 139, 250, 0.28);
      border-color: rgba(167, 139, 250, 0.6);
      transform: translateY(-1px);
    }

    .copy-btn.copied {
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.4);
      color: rgba(52, 211, 153, 0.9);
    }

    .output-box {
      min-height: 64px;
      padding: 16px 18px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1px;
      word-break: break-all;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .output-box.has-content {
      border-color: rgba(96, 165, 250, 0.25);
    }

    .output-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.03), rgba(96,165,250,0.03));
      pointer-events: none;
    }

    .placeholder-text {
      color: rgba(255, 255, 255, 0.18);
      font-size: 1rem;
      font-style: italic;
      user-select: none;
    }

    .char-span {
      display: inline-block;
      font-size: 1.1rem;
      font-weight: 500;
      color: #e2e8f0;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2
