<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Search Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 32px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.8rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"] {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 1rem;
      width: 130px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(56,189,248,0.35);
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #475569;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Array display */
    .array-wrapper {
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    .array-container {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      min-width: max-content;
      padding: 12px 4px;
    }

    .box-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .index-label {
      font-size: 0.7rem;
      color: #64748b;
      font-weight: 600;
    }

    .box {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid transparent;
      transition: all 0.35s ease;
      position: relative;
    }

    /* States */
    .box.inactive {
      background: #1e293b;
      border-color: #334155;
      color: #475569;
    }

    .box.active {
      background: #1e3a5f;
      border-color: #38bdf8;
      color: #bae6fd;
    }

    .box.mid {
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-color: #818cf8;
      color: #fff;
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 8px 25px rgba(129,140,248,0.45);
    }

    .box.found {
      background: linear-gradient(135deg, #065f46, #047857);
      border-color: #34d399;
      color: #6ee7b7;
      transform: translateY(-6px) scale(1.12);
      box-shadow: 0 8px 25px rgba(52,211,153,0.45);
      animation: pulse-found 0.6s ease;
    }

    .box.eliminated {
      background: #1e293b;
      border-color: #1e293b;
      color: #334155;
      opacity: 0.45;
    }

    @keyframes pulse-found {
      0%   { transform: translateY(-6px) scale(1.12); }
      50%  { transform: translateY(-10px) scale(1.18); }
      100% { transform: translateY(-6px) scale(1.12); }
    }

    /* Pointer labels */
    .pointer-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 4px;
      min-height: 14px;
    }

    .ptr-low  { color: #fb923c; }
    .ptr-mid  { color: #818cf8; }
    .ptr-high { color: #f472b6; }
    .ptr-found { color: #34d399; }

    /* Info panel */
    .info-panel {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      line-height: 1.7;
      min-height: 72px;
    }

    .info-panel .step-num {
      color: #38bdf8;
      font-weight: 700;
    }

    .info-panel .val {
      color: #f8fafc;
      font-weight: 700;
    }

    .result-found {
      color: #34d399;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .result
