<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Validation Demo</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      line-height: 1.6;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    /* ── Form Card ── */
    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .icon { font-size: 1.2rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="email"] {
      width: 100%;
      padding: 13px 48px 13px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid #2d3148;
      background: #0f1117;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      font-family: inherit;
    }

    input[type="email"]::placeholder { color: #475569; }

    input[type="email"]:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }

    input[type="email"].valid {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
    }

    input[type="email"].invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
    }

    .status-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .feedback {
      min-height: 22px;
      margin-top: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: color 0.25s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feedback.valid  { color: #22c55e; }
    .feedback.invalid{ color: #ef4444; }
    .feedback.neutral{ color: #64748b; }

    /* ── Regex Display ── */
    .regex-box {
      margin-top: 24px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .regex-box p {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .regex-box code {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: #a78bfa;
      word-break: break-all;
    }

    /* ── Submit Button ── */
    button[type="submit"] {
      margin-top: 22px;
      width: 100%;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    button[type="submit"]:hover  { opacity: 0.88; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Explanation Card ── */
    .explanation {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .explanation h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .explanation h3 {
      font-size: 0.92rem;
      font-weight: 700;
      color: #cbd5e1;
      margin:
