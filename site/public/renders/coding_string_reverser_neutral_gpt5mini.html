<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactive String Reverser</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --muted:#9aa4b2;
      --accent:#6ee7b7;
      --accent2:#7cc3ff;
      --glass: rgba(255,255,255,0.03);
      --focus: rgba(124,195,255,0.15);
      --shadow: 0 6px 20px rgba(2,6,23,0.6);
      --radius:14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
      --ease:cubic-bezier(.2,.9,.2,1);
    }

    html,body{
      height:100%;
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(1200px 800px at 10% 20%, rgba(124,195,255,0.06), transparent 6%),
                  radial-gradient(900px 600px at 90% 80%, rgba(110,231,183,0.04), transparent 6%),
                  var(--bg);
      color: #e6eef6;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
      box-sizing:border-box;
    }

    .card{
      width:100%;
      max-width:920px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      padding:28px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(8px) saturate(120%);
    }

    .header{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:14px;
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      color:#032025;
      font-weight:700;
      font-family:var(--mono);
      font-size:20px;
      box-shadow: 0 6px 18px rgba(108,182,255,0.08), inset 0 -6px 18px rgba(0,0,0,0.12);
    }

    h1{
      margin:0;
      font-size:18px;
      letter-spacing: -0.2px;
    }
    p.lead{
      margin:6px 0 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .controls{
      display:flex;
      gap:12px;
      margin-top:18px;
      align-items:center;
      flex-wrap:wrap;
    }

    .input-wrap{
      flex:1 1 460px;
      min-width:220px;
      background:var(--glass);
      padding:10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.03);
      display:flex;
      align-items:center;
      gap:10px;
    }

    input[type="text"]{
      background:transparent;
      border:0;
      outline:0;
      color:inherit;
      font-size:16px;
      padding:8px 6px;
      flex:1;
    }

    input[type="text"]::placeholder{ color: rgba(230,238,246,0.45); }

    .actions{
      display:flex;
      gap:8px;
    }

    button{
      appearance:none;
      border:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      color:var(--accent2);
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      font-size:13px;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease);
      border:1px solid rgba(255,255,255,0.03);
    }
    button.primary{
      background: linear-gradient(180deg, rgba(124,195,255,0.12), rgba(124,195,255,0.06));
      color: #eaf6ff;
      box-shadow: 0 8px 26px rgba(124,195,255,0.08);
    }
    button:active{ transform:translateY(1px) scale(.996); }
    button:focus{ box-shadow:0 0 0 6px var(--focus); outline:0; }

    .display-area{
      margin-top:22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.015), transparent);
      padding:22px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.02);
      min-height:120px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      justify-content:center;
    }

    .source-row, .result-row{
      width:100%;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }

    .label{
      font-size:12px;
      color:var(--muted);
      min-width:76px;
      text-align:center;
    }

    .chars{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
      max-width:100%;
    }

    .char{
      min-width:26px;
      min-height:36px;
      padding:6px 8px;
      border-radius:8px;
      display:inline-grid;
      place-items:center;
      font-family:var(--mono);
      font-size:16px;
      background: rgba(255,255,255,0.02);
      color: #dff8ff;
      border:1px solid rgba(255,255,255,0.03);
      transform-origin:center;
      transition: transform .36s var(--ease), background .28s var(--ease), color .28s var(--ease), box-shadow .28s var(--ease);
      box-shadow: 0 6px 18px rgba(3,6,16,0.45);
    }

    .char.empty{
      min-width:40px;
      color:var(--muted);
      background:transparent;
      border:1px dashed rgba(255,255,255,0.03);
    }

    /* animation states */
    .char.in{
      transform: translateY(-8px) scale(1.06);
      background: linear-gradient(180deg, rgba(110,231,183,0.12), rgba(124,195,255,0.06));
      color: #032025;
      box-shadow: 0 18px 30px rgba(124,195,255,0.08), inset 0 -6px 18px rgba(0,0,0,0.06);
    }
    .char.out{
      transform: translateY(8px) scale(.94) rotateX(12deg);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      color: rgba(230,238,246,0.62);
      box-shadow: none;
      opacity:0.9;
    }

    .char.flash{
      animation: pulse 900ms var(--ease) 1;
    }

    @keyframes pulse{
      0%{ box-shadow: 0 8px 20px rgba(124,195,255,0.12); transform: scale(1.08) translateY(-4px); }
      50%{ box-shadow: 0 22px 36px rgba(124,195,255,0.12); transform: scale(1.02) translateY(-2px); }
      100%{ box-shadow: 0 8px 20px rgba(124,195,255,0.08); transform: scale(1) translateY(0); }
    }

    .muted-note{
      color:var(--muted);
      font-size:13px;
      text-align:center;
      margin-top:8px;
    }

    /* small responsive tweaks */
    @media (max-width:640px){
      .card{ padding:18px; border-radius:12px; }
      .logo{ width:48px; height:48px; font-size:18px; }
      .input-wrap{ flex-basis:100%; }
      .label{ display:none; }
      .chars{ gap:6px; }
      .char{ min-width:22px; min-height:34px; padding:6px; font-size:14px;}
    }
  </style>
</head>
<body>
  <div class="card" role="application" aria-label="Interactive string reverser">
    <div class="header">
      <div class="logo">R⇆S</div>
      <div>
        <h1>Interactive String Reverser</h1>
        <p class="lead">Type text and watch it reverse in real time. Each character animates to show how the result is formed.</p>
      </div>
    </div>

    <div class="controls" aria-hidden="false">
      <div class="input-wrap" title="Type any text here">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="opacity:.9">
          <path d="M21 21l-4.35-4.35" stroke="rgba(255,255,255,0.6)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 11a6 6 0 1 1-12 0 6 6 0 0 1 12 0z" stroke="rgba(255,255,255,0.6)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input id="textInput" type="text" placeholder="Type something — emoji, punctuation, whitespace all supported" aria-label="Source text input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      </div>

      <div class="actions" role="group" aria-label="Actions">
        <button id="clearBtn" title="Clear input">Clear</button>
        <button id="copyBtn" class="primary" title="Copy reversed to clipboard">Copy Reversed</button>
      </div>
    </div>

    <div class="display-area" aria-live="polite" aria-atomic="false">
      <div class="source-row" id="sourceRow">
        <div class="label">Source</div>
        <div class="chars" id="sourceChars" aria-hidden="true"></div>
      </div>

      <div class="result-row" id="resultRow">
        <div class="label">Reversed</div>
        <div class="chars" id="resultChars" aria-hidden="true"></div>
      </div>

      <div class="muted-note">Characters animate individually — try typing, pasting, or holding a key to see continuous updates.</div>
    </div>
  </div>

  <script>
    (function(){
      const input = document.getElementById('textInput');
      const sourceChars = document.getElementById('sourceChars');
      const resultChars = document.getElementById('resultChars');
      const clearBtn = document.getElementById('clearBtn');
      const copyBtn = document.getElementById('copyBtn');

      // Utility: split string into array of user-perceived characters (grapheme clusters)
      // Uses Intl.Segmenter if available; fallback to Array.from which handles many emoji reasonably.
      const splitter = (() => {
        if (typeof Intl !== 'undefined' && Intl.Segmenter) {
          const seg = new Intl.Segmenter(undefined, {granularity: 'grapheme'});
          return (s) => Array.from(seg.segment(s), item => item.segment);
        }
        return (s) => Array.from(s);
      })();

      let lastSrc = '';
      let animId = 0;

      function renderChars(container, arr, options = {}) {
        // Efficiently update DOM by diffing lengths & contents minimally.
        // We'll rebuild for simplicity because arrays are short; animation classes handle per-char feedback.
        container.innerHTML = '';
        const frag = document.createDocumentFragment();
        arr.forEach((ch, i) => {
          const el = document.createElement('div');
          el.className = 'char';
          if (ch === '') el.classList.add('empty');
          el.textContent = ch === ' ' ? '␣' : ch; // show visible marker for space
          el.setAttribute('data-index', i);
          frag.appendChild(el);
        });
        // If empty, show a single empty placeholder
        if (arr.length === 0) {
          const ph = document.createElement('div');
          ph.className = 'char empty';
          ph.textContent = '(empty)';
          frag.appendChild(ph);
        }
        container.appendChild(frag);
        if (options.onRender) options.onRender();
      }

      function animateTransition(prevArr, nextArr, srcContainer, destContainer){
        // Add "out" to previous items in source, "in" to result, plus a flash effect staggered.
        const id = ++animId;
        const srcEls = Array.from(srcContainer.children);
        const destEls = Array.from(destContainer.children);

        const len = Math.max(srcEls.length, destEls.length);
        for (let i = 0; i < len; i++){
          const sEl = srcEls[i];
          const dEl = destEls[i];
          // stagger timing: characters further from center animate slightly later
          const delay = i * 36;
          if (sEl){
            sEl.classList.remove('in','out','flash');
            setTimeout(()=> {
              if (id !== animId) return;
              sEl.classList.add('out');
            }, delay);
          }
          if (dEl){
            dEl.classList.remove('in','out','flash');
            setTimeout(()=> {
              if (id !== animId) return;
              dEl.classList.add('in','flash');
              // remove flash after animation completes
              setTimeout(()=> {
                dEl.classList.remove('flash');
              }, 900);
            }, delay + 60);
          }
        }
      }

      function updateAll() {
        const raw = input.value || '';
        // avoid unnecessary updates for identical string
        if (raw === lastSrc) return;
        lastSrc = raw;

        const srcArr = splitter(raw);
        const revArr = [...srcArr].reverse();

        // render source and reversed result
        renderChars(sourceChars, srcArr);
        renderChars(resultChars, revArr);

        // animate them
        animateTransition([], [], sourceChars, resultChars);

        // update copy button state
        copyBtn.textContent = revArr.join('') ? 'Copy Reversed' : 'Copy Reversed';
      }

      // Event listeners
      input.addEventListener('input', () => {
        updateAll();
      });

      // Support initial state empty
      updateAll();

      clearBtn.addEventListener('click', () => {
        input.value = '';
        input.focus();
        updateAll();
      });

      copyBtn.addEventListener('click', async () => {
        const reversed = [...splitter(input.value || '')].reverse().join('');
        try {
          await navigator.clipboard.writeText(reversed);
          copyBtn.textContent = 'Copied!';
          setTimeout(()=> { copyBtn.textContent = 'Copy Reversed'; }, 1200);
        } catch (e) {
          // fallback: select and copy via textarea
          const ta = document.createElement('textarea');
          ta.value = reversed;
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy');
            copyBtn.textContent = 'Copied!';
            setTimeout(()=> { copyBtn.textContent = 'Copy Reversed'; }, 1200);
          } catch (ee) {
            alert('Copy failed — here is the reversed text:\\n\\n' + reversed);
          }
          ta.remove();
        }
      });

      // keyboard: Ctrl/Cmd+K focuses input
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          input.focus();
          input.select();
        }
      });

      // Accessibility: announce changes by updating aria-live region (the display-area has aria-live)
      // But we also provide a brief visually-hidden text when copy happens.
      // No extra code needed beyond existing attributes.

      // Optional: handle paste to animate quickly
      input.addEventListener('paste', () => {
        setTimeout(updateAll, 20);
      });

      // Animation for continuous typing: when keydown happens, add small highlight for newly added char
      input.addEventListener('keydown', (e) => {
        // allow default; we will animate after input event runs
        // small debounce to ensure input.value is updated
        setTimeout(() => {
          const srcArr = splitter(input.value || '');
          const revArr = [...srcArr].reverse();
          // re-render and animate with a tighter stagger based on caret pos
          renderChars(sourceChars, srcArr);
          renderChars(resultChars, revArr);
          animateTransition([], [], sourceChars, resultChars);
        }, 10);
      });

    })();
  </script>
</body>
</html>
