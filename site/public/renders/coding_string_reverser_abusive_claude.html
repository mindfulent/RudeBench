<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Reverser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 40px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #0f3460, #533483);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 35px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 30px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 1px;
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.3);
    }

    input[type="text"]:focus {
      border-color: #e94560;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.25);
    }

    .label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }

    .output-section {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 25px 20px;
      min-height: 80px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .output-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      align-self: flex-start;
    }

    .chars-wrapper {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      min-height: 40px;
      align-items: center;
    }

    .char-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #e94560, #533483);
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      opacity: 0;
      transform: translateY(15px) scale(0.7);
      animation: popIn 0.3s ease forwards;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
      transition: background 0.3s;
    }

    .char-box.space {
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      border: 1px dashed rgba(255,255,255,0.2);
    }

    @keyframes popIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .placeholder-text {
      color: rgba(255,255,255,0.2);
      font-size: 0.95rem;
      font-style: italic;
    }

    .stats {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #e94560;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
    }

    .clear-btn {
      margin-top: 25px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .clear-btn:hover {
      background: rgba(233, 69, 96, 0.15);
      border-color: #e94560;
      color: #e94560;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>String Reverser</h1>
    <p class="subtitle">Type below to see your text reversed in real time</p>

    <span class="label">Input</span>
    <div class="input-wrapper">
      <input type="text" id="inputField" placeholder="Start typing..." autocomplete="off" />
    </div>

    <div class="output-section">
      <span class="output-label">Reversed Output</span>
      <div class="chars-wrapper" id="charsWrapper">
        <span class="placeholder-text">Your reversed text appears here...</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words</div>
      </div>
    </div>

    <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
  </div>
