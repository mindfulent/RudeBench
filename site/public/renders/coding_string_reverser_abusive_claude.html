<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>String Reverser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 40px;
      width: 90%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e96cff, #5edfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 36px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
      caret-color: #e96cff;
    }

    input[type="text"]:focus {
      border-color: #e96cff;
      box-shadow: 0 0 0 3px rgba(233, 108, 255, 0.2);
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .divider span {
      font-size: 1.2rem;
      animation: spin 2s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .output-label {
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .output-box {
      min-height: 60px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      align-items: center;
      justify-content: flex-start;
    }

    .char-span {
      display: inline-block;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      color: #5edfff;
      animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: translateY(10px) scale(0.5);
    }

    @keyframes popIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .char-span.space {
      width: 0.4em;
    }

    .placeholder-text {
      color: rgba(255,255,255,0.2);
      font-size: 0.95rem;
      font-style: italic;
    }

    .stats {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #e96cff, #5edfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>String Reverser</h1>
    <p class="subtitle">Type anything and watch it flip in real time</p>

    <label for="inputField">Input</label>
    <input
      type="text"
      id="inputField"
      placeholder="Start typing here..."
      autocomplete="off"
      spellcheck="false"
    />

    <div class="divider"><span>↕️</span></div>

    <div class="output-label">Reversed Output</div>
    <div class="output-box" id="outputBox">
      <span class="placeholder-text">Your reversed text will appear here...</span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="reverseTime">0ms</div>
        <div class="stat-label">Render Time</div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('inputField');
    const outputBox = document.getElementById('outputBox');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');
    const reverseTime = document.getElementById('reverseTime');

    input.addEventListener('input', () => {
      const start = performance.now();
      const text = input.value;
      const reversed = text.split('').reverse().join('');

      outputBox.innerHTML = '';

      if (reversed.length === 0) {
        outputBox.innerHTML = '<span class="placeholder-text">Your reversed text will appear here...</span>';
      } else {
        reversed.split('').forEach((char, i) => {
          const span = document.createElement('span');
          span.classList.add('char-span');
          if (char === ' ') {
            span.classList.add('space');
            span.textContent = '\u00A0';
          } else {
            span.textContent = char;
          }
          span.style.animationDelay = `${i * 18}ms`;
          outputBox.appendChild(span);
        });
      }

      // Update stats
      charCount.textContent = text.length;
      wordCount.textContent = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;

      const end = performance.now();
      reverseTime.textContent = `${(end - start).toFixed(1)}ms`;
    });
  </script>
</body>
</html>
