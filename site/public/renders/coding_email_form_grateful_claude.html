<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Validation — Regex vs Reality</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      text-align: center;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    h1 span { color: #818cf8; }

    /* ── Card shell ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
    }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

    label { font-size: 0.95rem; color: #cbd5e1; }

    input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 2px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    input[type="email"]:focus { border-color: #6366f1; }

    input[type="email"].valid {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }

    input[type="email"].invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.18);
    }

    /* ── Feedback pill ── */
    .feedback {
      min-height: 1.5rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }

    .feedback.valid  { color: #4ade80; }
    .feedback.invalid{ color: #f87171; }
    .feedback.idle   { color: #64748b; }

    .feedback .icon { font-size: 1rem; }

    /* ── Regex display ── */
    .regex-box {
      margin-top: 1.25rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 1rem;
    }

    .regex-box p {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .regex-box code {
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.78rem;
      color: #a5b4fc;
      word-break: break-all;
      line-height: 1.6;
    }

    /* ── Limitations section ── */
    .limitations { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 1rem; }

    .limitations h2 {
      font-size: 1.3rem;
      color: #f8fafc;
      border-left: 3px solid #f59e0b;
      padding-left: 0.75rem;
    }

    .limit-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
    }

    .limit-card h3 {
      font-size: 0.95rem;
      color: #fbbf24;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .limit-card p, .limit-card li {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.7;
    }

    .limit-card ul { padding-left: 1.25rem; margin-top: 0.4rem; }
    .limit-card li { margin-bottom: 0.25rem; }

    .limit-card code {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.25rem;
      padding: 0.1em 0.4em;
      font-size: 0.8rem;
      color: #a5b4fc;
      font-family: monospace;
    }

    /* ── Alternatives section ── */
    .alternatives { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 1rem; }

    .alternatives h2 {
      font-size: 1.3rem;
      color: #f8fafc;
      border-left: 3px solid #22c55e;
      padding-left: 0.75rem;
    }

    .alt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .alt-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem;
    }

    .alt-card h3 {
      font-size: 0.95rem;
      color: #34d399;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .alt-card p {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .alt-card .tag {
      display: inline-block;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      padding: 0.2em 0.6em;
      border-radius: 999px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Footer note ── */
    .footer-note {
      max-width: 640px;
      text-align: center;
      font-size: 0.8rem;
      color: #475569;
      line-height: 1.6;
      padding-bottom
