<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Visualizer</title>
    <style>
        /* Style the SVG */
        svg {
            border: 1px solid black;
        }
        
        /* Style the nodes */
        .node {
            fill: lightblue;
            stroke: black;
            stroke-width: 2;
        }
        
        /* Style the arrows */
        .arrow {
            stroke: black;
            stroke-width: 2;
            fill: none;
        }
        
        /* Style the highlighted node */
        .highlighted {
            fill: yellow;
        }
    </style>
</head>
<body>
    <svg id="svg" width="800" height="200"></svg>
    <input id="value" type="number" placeholder="Value">
    <button id="insert-head">Insert at Head</button>
    <button id="insert-tail">Insert at Tail</button>
    <button id="delete">Delete by Value</button>
    <button id="search">Search</button>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
            }

            insertAtHead(value) {
                const node = new Node(value);
                if (!this.head) {
                    this.head = node;
                    this.tail = node;
                } else {
                    node.next = this.head;
                    this.head = node;
                }
            }

            insertAtTail(value) {
                const node = new Node(value);
                if (!this.tail) {
                    this.head = node;
                    this.tail = node;
                } else {
                    this.tail.next = node;
                    this.tail = node;
                }
            }

            deleteByValue(value) {
                if (!this.head) return;

                if (this.head.value === value) {
                    this.head = this.head.next;
                    if (!this.head) this.tail = null;
                    return;
                }

                let current = this.head;
                while (current.next) {
                    if (current.next.value === value) {
                        current.next = current.next.next;
                        if (!current.next) this.tail = current;
                        return;
                    }
                    current = current.next;
                }
            }

            search(value) {
                let current = this.head;
                while (current) {
                    if (current.value === value) return true;
                    current = current.next;
                }
                return false;
            }
        }

        const list = new LinkedList();
        const svg = document.getElementById('svg');
        const valueInput = document.getElementById('value');
        const insertHeadButton = document.getElementById('insert-head');
        const insertTailButton = document.getElementById('insert-tail');
        const deleteButton = document.getElementById('delete');
        const searchButton = document.getElementById('search');

        function drawList() {
            svg.innerHTML = '';
            let current = list.head;
            let x = 50;
            while (current) {
                const node = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                node.setAttribute('x', x);
                node.setAttribute('y', 50);
                node.setAttribute('width', 50);
                node.setAttribute('height', 50);
                node.classList.add('node');
                svg.appendChild(node);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x + 25);
                text.setAttribute('y', 75);
                text.setAttribute('text-anchor', 'middle');
                text.textContent = current.value;
                svg.appendChild(text);

                if (current.next) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x + 50);
                    line.setAttribute('y1', 75);
                    line.setAttribute('x2', x + 100);
                    line.setAttribute('y2', 75);
                    line.classList.add('arrow');
                    svg.appendChild(line);
                }

                current = current.next;
                x += 100;
            }
        }

        function highlightNode(value) {
            const nodes = svg.querySelectorAll('rect');
            nodes.forEach(node => {
                const text = node.nextSibling;
                if (text.textContent == value) {
                    node.classList.add('highlighted');
                } else {
                    node.classList.remove('highlighted');
                }
            });
        }

        insertHeadButton.addEventListener('click', () => {
            list.insertAtHead(parseInt(valueInput.value));
            drawList();
        });

        insertTailButton.addEventListener('click', () => {
            list.insertAtTail(parseInt(valueInput.value));
            drawList();
        });

        deleteButton.addEventListener('click', () => {
            list.deleteByValue(parseInt(valueInput.value));
            drawList();
        });

        searchButton.addEventListener('click', () => {
            const found = list.search(parseInt(valueInput.value));
            if (found) {
                highlightNode(valueInput.value);
            } else {
                highlightNode('');
            }
        });
    </script>
</body>
</html>
