<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSV to Table Converter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 30px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 6px;
    }

    header p {
      color: #666;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: #2c3e50;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      border: 2px solid #dde1e7;
      border-radius: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.88rem;
      resize: vertical;
      transition: border-color 0.2s;
      color: #333;
      background: #fafbfc;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #4a90d9;
      background: #fff;
    }

    .options-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #555;
    }

    .option-group label {
      font-weight: 500;
      margin: 0;
      color: #555;
    }

    select {
      padding: 6px 10px;
      border: 2px solid #dde1e7;
      border-radius: 6px;
      font-size: 0.88rem;
      background: #fafbfc;
      color: #333;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #4a90d9;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: #4a90d9;
      color: #fff;
      box-shadow: 0 2px 6px rgba(74,144,217,0.35);
    }

    .btn-primary:hover {
      background: #357abd;
      box-shadow: 0 4px 10px rgba(74,144,217,0.4);
    }

    .btn-secondary {
      background: #eef0f3;
      color: #555;
    }

    .btn-secondary:hover {
      background: #e0e3e8;
    }

    .btn-sample {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .btn-sample:hover {
      background: #c8e6c9;
    }

    /* Status / error message */
    .message {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .message.error {
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6c2;
      display: block;
    }

    .message.info {
      background: #e8f4fd;
      color: #1a6fa8;
      border: 1px solid #b8ddf5;
      display: block;
    }

    /* Table wrapper */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
    }

    .table-meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 400px;
    }

    thead tr {
      background: #2c3e50;
      color: #fff;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.03em;
      border: 1px solid #1a252f;
      white-space: nowrap;
      position: relative;
    }

    thead th .col-index {
      font-size: 0.72rem;
      opacity: 0.6;
      display: block;
      font-weight: 400;
      margin-top: 2px;
    }

    tbody tr:nth-child(even) {
      background: #f4f7fb;
    }

    tbody tr:nth-child(odd) {
      background: #ffffff;
    }

    tbody tr:hover {
      background: #dbeafe;
      transition: background 0.15s;
    }

    tbody td {
      padding: 10px 16px;
      border: 1px solid #dde1e7;
      vertical-align: top;
      word-break: break-word;
      max-width: 300px;
    }

    tbody td.empty-cell {
      color: #bbb;
      font-style: italic;
      font-size: 0.82rem;
    }

    tbody td.mismatched {
      background: #fff8e1;
      border-color: #ffe082;
    }

    .row-num {
      color: #aaa;
      font-size: 0.8rem;
      text-align: center !important;
      user-select: none;
      min-width: 36px;
      background: #f8f9fa !important;
      border-color: #dde1e7 !important;
    }

    thead .row-num-header {
      background: #1a252f;
      color: #aaa;
      font-size: 0.78rem;
      font-weight: 400;
      text-align: center;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #aaa;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .btn-row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>📊 CSV to Table Converter</h1>
    <p>Paste your CSV data below and click <strong>Parse CSV</strong> to render a formatted table.</p>
  </header>

  <!-- Input Card -->
  <div class="card">
    <label for="csvInput">CSV Input</label>
    <textarea id="csvInput" placeholder='Paste CSV here, e.g.:
Name, Age, City
"Smith, John", 30, "New York"
"Jane ""JJ"" Doe", 25, London'></textarea>

    <div class="options-row">
      <div class="option-group">
        <label for="delimiterSelect">Delimiter:</label>
        <select id="delimiterSelect">
          <option value=",">Comma (,)</option>
          <option value=";">Semicolon (;)</option>
          <option value="	">Tab (\t)</option>
          <option value="|">Pipe (|)</option>
        </select>
      </div>

      <label class="checkbox-group">
        <input type="checkbox" id="firstRowHeader" checked />
        First row as header
      </label>

      <label class="checkbox-group">
        <input type="checkbox" id="showRowNumbers" checked />
        Show row numbers
      </label>

      <label class="checkbox-group">
        <input type="checkbox" id="trimWhitespace" checked />
        Trim whitespace
      </label>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="parseCSV()">▶ Parse CSV</button>
      <button class="btn-sample" onclick="loadSample()">📋 Load Sample</button>
      <button class="btn-secondary" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>

  <!-- Message -->
  <div class="message" id="message"></div>

  <!-- Output Card -->
  <div class="card" id="outputCard">
    <div class="empty-state" id="emptyState">
      <div class="icon">📂</div>
      <p>Your table will appear here after parsing.</p>
    </div>
    <div id="tableContainer" style="display:none;">
      <div class="table-meta" id="tableMeta"></div>
      <div class="table-wrapper">
        <table id="outputTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  // ─── CSV Parser ───────────────────────────────────────────────────────────────
  // Fully RFC-4180 compliant parser supporting:
  //   • Quoted fields (may contain delimiter, newlines, escaped quotes)
  //   • Escaped double-quotes ("")
  //   • Varying column counts per row
  //   • CRLF and LF line endings

  function parseCSVText(text, delimiter) {
    const rows = [];
    let row = [];
    let i = 0;
    const len = text.length;

    while (i < len) {
      // ── Quoted field ──────────────────────────────────────────────────────
      if (text[i] === '"') {
        i++; // skip opening quote
        let field = '';
        while (i < len) {
          if (text[i] === '"') {
            if (i + 1 < len && text[i + 1] === '"') {
              // Escaped quote: "" → "
              field += '"';
              i += 2;
            } else {
              // Closing quote
              i++;
              break;
            }
          } else {
            field += text[i];
            i++;
          }
        }
        row.push(field);

        // After closing quote, expect delimiter or newline
        if (i < len && text[i] === delimiter) {
          i++;
          // If delimiter is the last char on line, push empty field next iteration
        }
      }
      // ── Newline ───────────────────────────────────────────────────────────
      else if (text[i] === '\r' || text[i] === '\n') {
        // Handle CRLF
        if (text[i] === '\r' && i + 1 < len && text[i + 1] === '\n') {
          i++;
        }
        i++;
        rows.push(row);
        row = [];
      }
      // ── Delimiter (empty field) ───────────────────────────────────────────
      else if (text[i] === delimiter) {
        row.push('');
        i++;
        // If next char is also delimiter or newline, we already pushed empty
        // and the loop will handle the next field correctly
      }
      // ── Unquoted field ────────────────────────────────────────────────────
      else {
        let field = '';
        while (i < len && text[i] !== delimiter && text[i] !== '\r' && text[i] !== '\n') {
          field += text[i];
          i++;
        }
        row.push(field);
        if (i < len && text[i] === delimiter) {
          i++; // consume delimiter; next iteration handles next field
        }
      }
    }

    // Push final row if non-empty
    if (row.length > 0) {
      rows.push(row);
    }

    return rows;
  }

  // ─── Main Parse & Render ──────────────────────────────────────────────────────
  function parseCSV() {
    const raw = document.getElementById('csvInput').value;
    const delimiter = document.getElementById('delimiterSelect').value;
    const firstRowHeader = document.getElementById('firstRowHeader').checked;
    const showRowNumbers = document.getElementById('showRowNumbers').checked;
    const trimWS = document.getElementById('trimWhitespace').checked;

    hideMessage();

    if (!raw.trim()) {
      showMessage('Please paste some CSV data first.', 'error');
      return;
    }

    let rows = parseCSVText(raw, delimiter);

    // Trim whitespace from each cell if requested
    if (trimWS) {
      rows = rows.map(row => row.map(cell => cell.trim()));
    }

    // Remove completely empty trailing rows
    while (rows.length > 0 && rows[rows.length - 1].every(c => c === '')) {
      rows.pop();
    }

    if (rows.length === 0) {
      showMessage('No data found after parsing.', 'error');
      return;
    }

    // Determine max column count across all rows
    const maxCols = Math.max(...rows.map(r => r.length));

    let headers = [];
    let dataRows = rows;

    if (firstRowHeader && rows.length > 0) {
      headers = rows[0];
      dataRows = rows.slice(1);
    }

    // Pad headers to maxCols
    while (headers.length < maxCols) {
      headers.push('');
    }

    renderTable(headers, dataRows, maxCols, firstRowHeader, showRowNumbers);

    const totalRows = dataRows.length;
    const totalCols = maxCols;
    showMessage(
      `✅ Parsed successfully: ${totalRows} data row${totalRows !== 1 ? 's' : ''}, ${totalCols} column${totalCols !== 1 ? 's' : ''}.`,
      'info'
    );
  }

  function renderTable(headers, dataRows, maxCols, hasHeader, showRowNumbers) {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    thead.innerHTML = '';
    tbody.innerHTML = '';

    // ── Header row ────────────────────────────────────────────────────────────
    const headTr = document.createElement('tr');

    if (showRowNumbers) {
      const th = document.createElement('th');
      th.className = 'row-num-header';
      th.textContent = '#';
      headTr.appendChild(th);
    }

    for (let c = 0; c < maxCols; c++) {
      const th = document.createElement('th');
      if (hasHeader) {
        const label = headers[c] !== undefined && headers[c] !== '' ? headers[c] : `Column ${c + 1}`;
        th.innerHTML = escapeHtml(label) + `<span class="col-index">col ${c + 1}</span>`;
      } else {
        th.innerHTML = `Column ${c + 1}<span class="col-index">col ${c + 1}</span>`;
      }
      headTr.appendChild(th);
    }
    thead.appendChild(headTr);

    // ── Data rows ─────────────────────────────────────────────────────────────
    if (dataRows.length === 0) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = maxCols + (showRowNumbers ? 1 : 0);
      td.style.textAlign = 'center';
      td.style.color = '#aaa';
      td.style.padding = '20px';
      td.textContent = '(No data rows)';
      tr.appendChild(td);
      tbody.appendChild(tr);
    } else {
      dataRows.forEach((row, rowIdx) => {
        const tr = document.createElement('tr');
        const isMismatched = row.length !== maxCols;

        if (showRowNumbers) {
          const td = document.createElement('td');
          td.className = 'row-num';
          td.textContent = rowIdx + 1;
          tr.appendChild(td);
        }

        for (let c = 0; c < maxCols; c++) {
          const td = document.createElement('td');
          const cellVal = row[c];

          if (cellVal === undefined) {
            // Column count mismatch — highlight cell
            td.className = 'empty-cell mismatched';
            td.textContent = '—';
            td.title = 'Missing field (row has fewer columns than expected)';
          } else if (cellVal === '') {
            td.className = 'empty-cell';
            td.textContent = '(empty)';
          } else {
            td.textContent = cellVal;
            if (isMismatched && c >= row.length) {
              td.classList.add('mismatched');
            }
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });
    }

    // Show table, hide empty state
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('tableContainer').style.display = 'block';
    document.getElementById('tableMeta').textContent =
      `${dataRows.length} row${dataRows.length !== 1 ? 's' : ''} × ${maxCols} column${maxCols !== 1 ? 's' : ''}`;
  }

  // ─── Helpers ──────────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
  }

  function hideMessage() {
    const el = document.getElementById('message');
    el.className = 'message';
    el.textContent = '';
  }

  function clearAll() {
    document.getElementById('csvInput').value = '';
    document.getElementById('tableHead').innerHTML = '';
    document.getElementById('tableBody').innerHTML = '';
    document.getElementById('tableContainer').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    hideMessage();
  }

  function loadSample() {
    document.getElementById('csvInput').value =
`Name,Age,City,Occupation,Notes
"Smith, John",30,New York,Engineer,"Loves ""coding"" and coffee"
"Jane ""JJ"" Doe",25,London,Designer,
Bob,42,Sydney,Manager,"Manages a team of 10"
Alice,28,Toronto,Developer,"Enjoys hiking
and outdoor activities"
Charlie,,Berlin,Analyst,"Missing age above"
"Extra, Comma, Test",35,Paris,Chef,"Has, multiple, commas"`;
    hideMessage();
  }

  // Allow Ctrl+Enter to parse
  document.getElementById('csvInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      parseCSV();
    }
  });
</script>
</body>
</html>
