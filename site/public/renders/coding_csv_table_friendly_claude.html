<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSV to Table Converter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    header p {
      color: #666;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px;
      margin-bottom: 28px;
    }

    .card label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: #2c3e50;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 14px;
      border: 2px solid #dde1e7;
      border-radius: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.88rem;
      resize: vertical;
      transition: border-color 0.2s;
      color: #333;
      background: #fafbfc;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #4a90e2;
      background: #fff;
    }

    .options-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #555;
    }

    .option-group label {
      font-weight: 500;
      margin-bottom: 0;
      color: #555;
    }

    select {
      padding: 6px 10px;
      border: 2px solid #dde1e7;
      border-radius: 6px;
      font-size: 0.88rem;
      background: #fafbfc;
      color: #333;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #4a90e2;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #4a90e2;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 26px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #4a90e2;
      color: #fff;
    }

    .btn-primary:hover {
      background: #357abd;
    }

    .btn-secondary {
      background: #e8eaed;
      color: #444;
    }

    .btn-secondary:hover {
      background: #d5d8dc;
    }

    .btn-sample {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .btn-sample:hover {
      background: #c8e6c9;
    }

    /* Status / error messages */
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }

    .message.error {
      background: #fdecea;
      color: #c0392b;
      border-left: 4px solid #e74c3c;
      display: block;
    }

    .message.info {
      background: #e8f4fd;
      color: #1a6fa8;
      border-left: 4px solid #4a90e2;
      display: block;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #666;
    }

    .stat-item {
      background: #f0f2f5;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    .stat-item span {
      color: #4a90e2;
      font-weight: 700;
    }

    /* Table wrapper */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid #dde1e7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead tr {
      background: #2c3e50;
      color: #fff;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      border-right: 1px solid #3d5166;
      position: relative;
    }

    thead th:last-child {
      border-right: none;
    }

    thead th .col-index {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: #a0b4c8;
      margin-bottom: 2px;
    }

    tbody tr:nth-child(even) {
      background: #f7f9fc;
    }

    tbody tr:nth-child(odd) {
      background: #ffffff;
    }

    tbody tr:hover {
      background: #eaf2fb;
    }

    tbody td {
      padding: 10px 16px;
      border-right: 1px solid #e8eaed;
      border-bottom: 1px solid #e8eaed;
      vertical-align: top;
      word-break: break-word;
      max-width: 300px;
    }

    tbody td:last-child {
      border-right: none;
    }

    tbody td.empty-cell {
      color: #bbb;
      font-style: italic;
      font-size: 0.8
