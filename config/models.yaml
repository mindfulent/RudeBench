models:
  - id: claude-sonnet-4.6
    litellm_model: anthropic/claude-sonnet-4-6
    parallel: 16             # asyncio.Semaphore limit
    env_key: ANTHROPIC_API_KEY

  - id: gpt-5.2
    litellm_model: gpt-5.2
    parallel: 32
    max_tokens: 16384         # Reasoning model: needs headroom for internal reasoning + 2048 visible output
    env_key: OPENAI_API_KEY

  - id: gemini-2.5-pro
    litellm_model: gemini/gemini-2.5-pro
    parallel: 16
    rpm_limit: 14           # Gemini free tier: 15 RPM, leave headroom
    env_key: GEMINI_API_KEY

  - id: llama-4-scout
    litellm_model: groq/meta-llama/llama-4-scout-17b-16e-instruct
    parallel: 32
    rpm_limit: 28           # Groq free tier: 30 RPM, leave headroom
    env_key: GROQ_API_KEY

  - id: grok-3
    litellm_model: xai/grok-3-beta
    parallel: 16
    env_key: XAI_API_KEY
